<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Budget App</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="budget-screens.jsx"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#080810; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  ::-webkit-scrollbar { display:none; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
</style>
</head>
<body>
<script type="text/babel">

// ─── Seed data ────────────────────────────────────────────
const SEED = [
  {id:1, type:'income',  amount:3200, category:'salary',     note:'Monthly salary',   date:'2026-04-01'},
  {id:2, type:'income',  amount:450,  category:'freelance',  note:'Web project',      date:'2026-04-05'},
  {id:3, type:'expense', amount:85,   category:'food',       note:'Groceries',        date:'2026-04-06'},
  {id:4, type:'expense', amount:120,  category:'bills',      note:'Electric bill',    date:'2026-04-07'},
  {id:5, type:'expense', amount:45,   category:'transport',  note:'Metro card',       date:'2026-04-08'},
  {id:6, type:'expense', amount:200,  category:'shopping',   note:'Clothes',          date:'2026-04-10'},
  {id:7, type:'income',  amount:180,  category:'investment', note:'Dividends',        date:'2026-04-12'},
  {id:8, type:'expense', amount:60,   category:'entertainment', note:'Concert',       date:'2026-04-14'},
  {id:9, type:'expense', amount:95,   category:'health',     note:'Pharmacy',         date:'2026-04-15'},
  {id:10,type:'expense', amount:30,   category:'food',       note:'Restaurant',       date:'2026-04-17'},
  {id:11,type:'income',  amount:500,  category:'freelance',  note:'Logo design',      date:'2026-04-18'},
  {id:12,type:'expense', amount:75,   category:'education',  note:'Udemy course',     date:'2026-04-19'},
];

// ─── Tab bar ──────────────────────────────────────────────
const TABS = [
  { icon: (a) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M3 12L12 3l9 9" stroke={a?GOLD:'#666'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke={a?GOLD:'#666'} strokeWidth="2" strokeLinecap="round"/>
    </svg>
  ), label:'Home'},
  { icon: (a) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="9" stroke={a?GOLD:'#666'} strokeWidth="2"/>
      <path d="M12 8v8M8 12h8" stroke={a?GOLD:'#666'} strokeWidth="2.5" strokeLinecap="round"/>
    </svg>
  ), label:'Add'},
  { icon: (a) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <rect x="2" y="3" width="20" height="18" rx="3" stroke={a?GOLD:'#666'} strokeWidth="2"/>
      <path d="M7 8h2v8H7zM11 11h2v5h-2zM15 6h2v10h-2z" fill={a?GOLD:'#666'}/>
    </svg>
  ), label:'Portfolio'},
  { icon: (a) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" stroke={a?GOLD:'#666'} strokeWidth="2"/>
      <rect x="9" y="3" width="6" height="4" rx="1" stroke={a?GOLD:'#666'} strokeWidth="2"/>
      <path d="M9 12h6M9 16h4" stroke={a?GOLD:'#666'} strokeWidth="2" strokeLinecap="round"/>
    </svg>
  ), label:'History'},
  { icon: (a) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" stroke={a?GOLD:'#666'} strokeWidth="2" strokeLinecap="round"/>
      <path d="M13.73 21a2 2 0 01-3.46 0" stroke={a?GOLD:'#666'} strokeWidth="2" strokeLinecap="round"/>
    </svg>
  ), label:'Alerts'},
];

// ─── Main App ─────────────────────────────────────────────
function App() {
  const [tab, setTab] = React.useState(() => parseInt(localStorage.getItem('budget_tab')||'0'));
  const [transactions, setTransactions] = React.useState(() => {
    try {
      const saved = localStorage.getItem('budget_txns');
      return saved ? JSON.parse(saved) : SEED;
    } catch { return SEED; }
  });

  // Tweaks
  const [tweaks, setTweaks] = React.useState(false);
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accentColor": "#f5a623",
    "darkMode": false,
    "fontSize": 14
  }/*EDITMODE-END*/;
  const [twkVals, setTwkVals] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => {
    localStorage.setItem('budget_tab', tab);
  }, [tab]);

  React.useEffect(() => {
    localStorage.setItem('budget_txns', JSON.stringify(transactions));
  }, [transactions]);

  // Tweaks host protocol
  React.useEffect(() => {
    const handler = (e) => {
      if(e.data?.type === '__activate_edit_mode') setTweaks(true);
      if(e.data?.type === '__deactivate_edit_mode') setTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (k,v) => {
    const next = {...twkVals,[k]:v};
    setTwkVals(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}},'*');
  };

  const addTransaction = (t) => setTransactions(prev => [t, ...prev]);
  const delTransaction = (id) => setTransactions(prev => prev.filter(t=>t.id!==id));

  const navTo = (i) => setTab(i);

  // Viewport scaling
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const resize = () => {
      const s = Math.min(window.innerWidth / 402, window.innerHeight / 874) * 0.96;
      setScale(Math.min(s, 1.2));
    };
    resize();
    window.addEventListener('resize', resize);
    return () => window.removeEventListener('resize', resize);
  }, []);

  const screens = [
    <HomeScreen transactions={transactions} onNav={navTo}/>,
    <AddScreen onSave={(t)=>{ addTransaction(t); setTab(0); }}/>,
    <PortfolioScreen transactions={transactions}/>,
    <HistoryScreen transactions={transactions} onDelete={delTransaction}/>,
    <NotificationsScreen/>,
  ];

  return (
    <div style={{display:'flex', alignItems:'center', justifyContent:'center', width:'100vw', height:'100vh', background:'#080810', position:'relative'}}>
      <div style={{transform:`scale(${scale})`, transformOrigin:'center center'}}>
        <IOSDevice width={402} height={874} dark={true}>
          {/* Screen content */}
          <div style={{position:'relative', height:'100%', background:'#0d0d12', overflow:'hidden'}}>
            <div style={{position:'absolute', inset:0, overflowY:'auto', WebkitOverflowScrolling:'touch'}}>
              {screens[tab]}
            </div>

            {/* Tab Bar */}
            <div style={{
              position:'absolute', bottom:0, left:0, right:0, zIndex:100,
              background:'rgba(10,10,18,0.92)',
              backdropFilter:'blur(20px)',
              WebkitBackdropFilter:'blur(20px)',
              borderTop:'0.5px solid rgba(255,255,255,0.08)',
              paddingBottom:28, paddingTop:10,
              display:'flex', justifyContent:'space-around', alignItems:'center',
            }}>
              {TABS.map((t,i) => (
                <button key={i} onClick={()=>setTab(i)} style={{
                  background:'none', border:'none', cursor:'pointer',
                  display:'flex', flexDirection:'column', alignItems:'center', gap:3,
                  padding:'4px 8px', borderRadius:12,
                  opacity: tab===i ? 1 : 0.55,
                  transition:'opacity 0.18s',
                }}>
                  {t.icon(tab===i)}
                  <span style={{
                    fontSize:10, fontFamily:'-apple-system,system-ui',
                    color: tab===i ? twkVals.accentColor : '#666',
                    fontWeight: tab===i ? 700 : 400,
                  }}>{t.label}</span>
                </button>
              ))}
            </div>
          </div>
        </IOSDevice>
      </div>

      {/* Tweaks Panel */}
      {tweaks && (
        <div style={{
          position:'fixed', bottom:24, right:24, zIndex:9999,
          background:'#1a1a26', border:'1px solid rgba(255,255,255,0.12)',
          borderRadius:20, padding:'16px 18px', width:220,
          fontFamily:'-apple-system,system-ui', color:'#f0f0f8',
          boxShadow:'0 8px 32px rgba(0,0,0,0.5)',
        }}>
          <div style={{fontSize:13, fontWeight:700, marginBottom:14, color:'#f5a623'}}>Tweaks</div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11, color:'#7878a0', marginBottom:6}}>Accent Color</div>
            <div style={{display:'flex', gap:8}}>
              {['#f5a623','#30d158','#4e9af1','#af52de','#ff453a'].map(c=>(
                <div key={c} onClick={()=>updateTweak('accentColor',c)} style={{
                  width:24, height:24, borderRadius:'50%', background:c, cursor:'pointer',
                  border: twkVals.accentColor===c ? '2px solid #fff' : '2px solid transparent',
                }}/>
              ))}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11, color:'#7878a0', marginBottom:6}}>Font Size: {twkVals.fontSize}px</div>
            <input type="range" min={12} max={18} value={twkVals.fontSize}
              onChange={e=>updateTweak('fontSize', parseInt(e.target.value))}
              style={{width:'100%', accentColor:'#f5a623'}}/>
          </div>
          <div>
            <div style={{fontSize:11, color:'#7878a0', marginBottom:6}}>Mode</div>
            <div style={{display:'flex', gap:6}}>
              {['Dark','Light'].map(m=>(
                <button key={m} onClick={()=>updateTweak('darkMode',m==='Dark')} style={{
                  flex:1, padding:'6px', borderRadius:8, border:'none', cursor:'pointer',
                  background: (m==='Dark')===twkVals.darkMode ? '#f5a623' : '#2a2a38',
                  color: (m==='Dark')===twkVals.darkMode ? '#000' : '#888',
                  fontSize:12, fontWeight:600,
                }}>{m}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0d0d12"/>
    <rect x="20" y="20" width="60" height="60" rx="10" fill="#1a1a24"/>
    <text x="50" y="58" text-anchor="middle" font-size="28" fill="#f5a623">💰</text>
  </svg>
</template>
</body>
</html>
