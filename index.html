    +'<td style="background:#f9fafb;border-radius:16px;padding:22px;border:1px solid #f3f4f6">'
    +'<p style="margin:0 0 16px;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:1.5px">&#x1F4CA; '+ml+'</p>'
    +'<table width="100%" cellpadding="0" cellspacing="0" border="0">'
    +sRow('&#x1F49A;','Income',fmtAmt(mi,currency),'#059669')
    +sRow('&#x2764;&#xFE0F;','Expenses',fmtAmt(me,currency),'#dc2626')
    +sRow('&#x1F4C8;','Net This Month',fmtNet(net,currency),net>=0?'#059669':'#dc2626')
    +'<tr><td style="padding:10px 0 6px;font-size:15px;font-weight:700;color:#1f2937">&#x1F4B0; Total Balance</td>'
    +'<td style="padding:10px 0 6px;text-align:right;font-size:20px;font-weight:900;color:'+(bal>=0?'#059669':'#dc2626')+'">'+fmtNet(bal,currency)+'</td></tr>'
    +'</table>'
    +'<table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:6px">'
    +'<tr><td style="padding-bottom:6px"><table width="100%" cellpadding="0" cellspacing="0" border="0"><tr>'
    +'<td style="font-size:12px;color:#6b7280">&#x1F4CB; '+mn.length+' transaction'+(mn.length!==1?'s':'')+' logged</td>'
    +'<td style="text-align:right;font-size:12px;color:'+pc+';font-weight:700">'+pct+'% of income spent</td>'
    +'</tr></table></td></tr>'
    +'<tr><td style="background:#e5e7eb;border-radius:99px;height:8px;overflow:hidden">'
    +'<table cellpadding="0" cellspacing="0" border="0" style="width:'+Math.max(pct,2)+'%;height:8px"><tr><td style="background:'+pc+';border-radius:99px"></td></tr></table>'
    +'</td></tr>'
    +'<tr><td style="padding-top:6px;font-size:12px;color:#9ca3af">&#x1F4C5; '+dl+' day'+(dl!==1?'s':'')+' remaining this month</td></tr>'
    +'</table></td></tr></table>'
    +'<table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:4px"><tr>'
    +'<td style="background:#fffbeb;border:1px solid #fcd34d;border-radius:14px;padding:18px">'
    +'<p style="margin:0 0 12px;font-size:11px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:1.5px">&#x1F4C5; Upcoming Scheduled</p>'
    +'<table width="100%" cellpadding="0" cellspacing="0" border="0">'+ur+'</table>'
    +'</td></tr></table>'+ctaBtn('Add Transactions Now &rarr;')
    +'<p style="margin:20px 0 0;font-size:12px;color:#9ca3af;text-align:center">You set this reminder for <strong style="color:#6b7280">'+remindTime+'</strong> daily &middot; Manage in Settings &rarr; Notifications</p>';
  return sendEmail(toEmail,subj,eShell(body));
}

function applyTheme(th){
  const s=document.documentElement.style;
  [['--bg',th.bg],['--card',th.card],['--card2',th.card2],['--text',th.text],['--sub',th.sub||'#a0a0c0'],['--muted',th.muted],['--muted2',th.muted2],['--accent',th.accent],['--hero-a',th.heroA],['--hero-b',th.heroB],['--border',th.isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.08)'],['--border2',th.isDark?'rgba(255,255,255,.13)':'rgba(0,0,0,.14)'],['--green',th.isDark?'#30d158':'#1a8040'],['--red',th.isDark?'#ff453a':'#cc1010']].forEach(([k,v])=>s.setProperty(k,v));
  const hex=th.accent.replace('#','');const[r,g,b]=[0,2,4].map(i=>parseInt(hex.slice(i,i+2),16));
  s.setProperty('--a10',`rgba(${r},${g},${b},.10)`);s.setProperty('--a20',`rgba(${r},${g},${b},.20)`);
  s.setProperty('--g10','rgba(48,209,88,.10)');s.setProperty('--r10','rgba(255,69,58,.10)');
  document.body.style.background=th.bg;
  document.querySelector('meta[name=theme-color]').content=th.bg;
}

// Mini donut chart
function Donut({data,size=110}){
  const total=data.reduce((s,d)=>s+d.v,0);
  if(!total)return<div style={{width:size,height:size,borderRadius:'50%',background:'var(--card2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'var(--muted)'}}>No data</div>;
  const r=44,cx=60,cy=60,sw=13,circ=2*Math.PI*r;let off=0;
  const sl=data.map((d,i)=>{const pct=d.v/total,dash=Math.max(circ*pct-1.5,0),gap=circ-dash;const s=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={sw} strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-off+circ/4}/>;off+=circ*pct;return s;});
  return<svg width={size} height={size} viewBox="0 0 120 120"><circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--card2)" strokeWidth={sw}/>{sl}</svg>;
}
function Bars({weeks,height=100}){
  const mx=Math.max(...weeks.flatMap(w=>[w.i,w.e]),1);
  const bw=18,gp=8;const W=weeks.length*(bw*2+gp+6)+6;
  return<svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="xMidYMid meet">
    {weeks.map((w,i)=>{const x=4+i*(bw*2+gp+6);const ih=(w.i/mx)*(height-22),eh=(w.e/mx)*(height-22);return<g key={i}><rect x={x} y={height-22-ih} width={bw} height={Math.max(ih,2)} rx={4} fill="var(--green)" opacity=".85"/><rect x={x+bw+3} y={height-22-eh} width={bw} height={Math.max(eh,2)} rx={4} fill="var(--red)" opacity=".85"/><text x={x+bw} y={height-5} textAnchor="middle" fill="var(--muted)" fontSize={9}>{w.l}</text></g>;})}
  </svg>;
}
function Line({pts,height=70}){
  if(pts.length<2)return null;
  const vals=pts.map(p=>p.y),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1,pad=8,W=300;
  const pp=pts.map((p,i)=>({x:pad+i*(W-pad*2)/(pts.length-1),y:pad+(1-(p.y-mn)/rng)*(height-pad*2)}));
  const d=pp.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  return<svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--accent)" stopOpacity=".3"/><stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/></linearGradient></defs>
    <path d={`${d} L${pp[pp.length-1].x},${height} L${pp[0].x},${height} Z`} fill="url(#lg)"/>
    <path d={d} fill="none" stroke="var(--accent)" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

function parseVoice(text){
  const t=text.toLowerCase();const am=text.match(/[\$]?(\d+(?:[.]\d{1,2})?)/);
  const amount=am?parseFloat(am[1]):null;
  const isInc=/earn|receiv|got paid|income|salary|deposit|freelan|invest|dividend|gift/i.test(t);
  const type=isInc?'income':'expense';
  const cm=[{id:'food',w:['food','lunch','dinner','breakfast','restaurant','coffee','pizza','grocery','chipotle','starbucks']},{id:'transport',w:['uber','lyft','bus','metro','gas','fuel','parking','train']},{id:'bills',w:['bill','electric','water','internet','rent','netflix','spotify']},{id:'shopping',w:['shop','cloth','amazon','online','store','bought']},{id:'health',w:['doctor','pharmacy','medicine','gym','health','dental']},{id:'entertainment',w:['movie','concert','game','fun','show','ticket']},{id:'education',w:['course','book','school','tuition','study']},{id:'travel',w:['travel','hotel','flight','vacation','trip']},{id:'salary',w:['salary','paycheck','wage']},{id:'freelance',w:['freelance','project','client','invoice']},{id:'investment',w:['dividend','stock','crypto','invest']}];
  let category='other';for(const c of cm){if(c.w.some(w=>t.includes(w))){category=c.id;break;}}
  const note=text.replace(/[\$]?\d+(?:[.]\d{1,2})?\s*(?:dollars?|bucks?)?/gi,'').replace(/\b(spent|paid|bought|received|earned|got|on|for|at|the|a|an|i|my|just)\b/gi,'').replace(/\s+/g,' ').trim().slice(0,40)||null;
  return{amount,type,category,note};
}
function VoiceButton({onResult,toast}){
  const [listening,setL]=useState(false);
  const sup='webkitSpeechRecognition' in window||'SpeechRecognition' in window;
  const recRef=useRef(null);
  const go=()=>{
    if(!sup){toast({icon:'X',title:'Not supported',body:'Try Chrome on Android or desktop.',err:true});return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR();recRef.current=r;r.lang='en-US';r.interimResults=false;r.maxAlternatives=1;
    r.onstart=()=>setL(true);r.onend=()=>setL(false);
    r.onerror=e=>{setL(false);toast({icon:'X',title:'Mic error',body:e.error==='not-allowed'?'Microphone blocked - check browser settings':e.error,err:true});};
    r.onresult=e=>{const t=e.results[0][0].transcript;toast({icon:'mic',title:'Heard: "'+t+'"',body:'Parsing your transaction...'});onResult(parseVoice(t),t);};
    r.start();
  };
  const stop=()=>{recRef.current?.stop();setL(false);};
  if(!sup)return null;
  return<button onClick={listening?stop:go} style={{width:'100%',padding:'14px',borderRadius:16,border:'1.5px solid '+(listening?'var(--red)':'var(--border2)'),background:listening?'var(--r10)':'var(--card)',color:listening?'var(--red)':'var(--sub)',fontSize:14,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:10,transition:'all .2s'}}>

  </button>;
}

    else{toast({icon:'⚠️',title:`Code: ${otp}`,body:`Email failed (${res.err||'check EmailJS'}). Use this code to sign in.`,warn:true});}
    return true;
  };

  const sendPhoneOTP=async(fullPhone,otp)=>{
    // SMS: open the messages app pre-filled — user sends to themselves
    const msg=`Your LedgrTrack code is: ${otp}\nValid 5 mins. Do not share.`;
    window.open(`sms:${fullPhone}?body=${encodeURIComponent(msg)}`);
    // Show code clearly on screen so user can copy it
    toast({icon:'💬',title:`SMS opened — Code: ${otp}`,body:`Send the pre-filled SMS to yourself, then come back and enter the code above.`,warn:true});
    return true;
  };

  const handleEmailSubmit=async()=>{
    if(!email.includes('@')){toast({icon:'❌',title:'Invalid email',body:'Enter a valid email address.',err:true});return;}
    if(!isLogin&&!name.trim()){toast({icon:'❌',title:'Name required',body:'Please enter your full name.',err:true});return;}
    setLoading(true);
    const otp=genOTP();setGenOtp(otp);
    await sendEmailOTP(email,otp,!isLogin);
    setOtpChannel('email');setMode('otp');setLoading(false);
  };

  const handlePhoneSubmit=async()=>{
    if(phone.length<6){toast({icon:'❌',title:'Invalid phone',body:'Enter a valid phone number.',err:true});return;}
    if(!isLogin&&!name.trim()){toast({icon:'❌',title:'Name required',body:'Please enter your full name.',err:true});return;}
    setLoading(true);
    const otp=genOTP();setGenOtp(otp);
    const fullPhone=`${countryCode.code}${phone}`;
    await sendPhoneOTP(fullPhone,otp);
    setOtpChannel('phone');setMode('otp');setLoading(false);
  };

  const handleOtpVerify=()=>{
    if(otpInput===generatedOtp){
      const user={name:name||email.split('@')[0]||`User`,email:otpChannel==='email'?email:'',phone:otpChannel==='phone'?`${countryCode.code}${phone}`:'',countryCode:countryCode.code,verified:true,uid:`user_${Date.now()}`};
      LS.set('auth_user',user);
      toast({icon:'🎉',title:`Welcome${name?`, ${name}`:''}!`,body:'You\'re signed in to Ledgr.'});
      onAuth(user);
    }else{
      toast({icon:'❌',title:'Wrong code',body:'The verification code is incorrect. Try again.',err:true});
      setOtpInput('');otpRefs[0].current?.focus();
    }
  };

  const handleOtpKey=(i,v)=>{
    const digits=v.replace(/\D/g,'');
    if(digits.length>1){
      // Paste
      const full=digits.slice(0,6);setOtpInput(full);
      otpRefs[Math.min(full.length,5)].current?.focus();return;
    }
    const arr=otpInput.split('');arr[i]=digits;const next=arr.join('').slice(0,6);setOtpInput(next);
    if(digits&&i<5)otpRefs[i+1].current?.focus();
    if(!digits&&i>0)otpRefs[i-1].current?.focus();
  };

  const filteredCC=COUNTRY_CODES.filter(c=>`${c.name} ${c.code} ${c.flag}`.toLowerCase().includes(ccSearch.toLowerCase()));

  return<div style={{minHeight:'100%',minHeight:'-webkit-fill-available',display:'flex',flexDirection:'column',background:'var(--bg)',color:'var(--text)',padding:'0 24px',paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 24px)'}}>
    {/* Header */}
    <div style={{paddingTop:`calc(env(safe-area-inset-top,0px) + 60px)`,textAlign:'center',marginBottom:40}}>
      <svg width="72" height="72" viewBox="0 0 100 100" style={{borderRadius:18,marginBottom:16,boxShadow:'0 12px 40px rgba(245,166,35,.25)'}}>
        <rect width="100" height="100" rx="20" fill="#0a0a12"/>
        <rect x="8" y="8" width="84" height="84" rx="15" fill="url(#ag)"/>
        <defs><linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#f5a623"/><stop offset="100%" stopColor="#c8720a"/></linearGradient></defs>
        <text x="50" y="68" textAnchor="middle" fontSize="48" fontWeight="800" fill="white" fontFamily="-apple-system,sans-serif">$</text>
      </svg>
      <div style={{fontSize:32,fontWeight:900,letterSpacing:-1}}>Ledgr</div>
      <div style={{fontSize:14,color:'var(--sub)',marginTop:6}}>{isLogin?'Sign in to your account':'Create your account'}</div>
    </div>

    {/* Mode: Choose */}
    {mode==='choose'&&<div>
      <button onClick={()=>setMode('email')} style={{width:'100%',padding:'16px',borderRadius:18,border:'1px solid var(--border2)',background:'var(--card)',color:'var(--text)',fontSize:16,fontWeight:700,display:'flex',alignItems:'center',gap:14,marginBottom:12,textAlign:'left'}}>
        <div style={{width:44,height:44,borderRadius:12,background:'var(--a10)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>📧</div>
        <div><div style={{fontSize:15,fontWeight:700}}>Continue with Email</div><div style={{fontSize:12,color:'var(--sub)',marginTop:2}}>Get a one-time code by email</div></div>
        <span style={{marginLeft:'auto',color:'var(--muted)',fontSize:18}}>›</span>
      </button>
      <button onClick={()=>setMode('phone')} style={{width:'100%',padding:'16px',borderRadius:18,border:'1px solid var(--border2)',background:'var(--card)',color:'var(--text)',fontSize:16,fontWeight:700,display:'flex',alignItems:'center',gap:14,marginBottom:32,textAlign:'left'}}>
        <div style={{width:44,height:44,borderRadius:12,background:'var(--g10)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>📱</div>
        <div><div style={{fontSize:15,fontWeight:700}}>Continue with Phone</div><div style={{fontSize:12,color:'var(--sub)',marginTop:2}}>Get a one-time code by SMS</div></div>
        <span style={{marginLeft:'auto',color:'var(--muted)',fontSize:18}}>›</span>
      </button>
      <div style={{textAlign:'center',color:'var(--muted)',fontSize:13}}>
        {isLogin?'New to Ledgr? ':'Already have an account? '}
        <span onClick={()=>setIsLogin(!isLogin)} style={{color:'var(--accent)',fontWeight:700,cursor:'pointer'}}>{isLogin?'Sign up':'Sign in'}</span>
      </div>
      <div style={{marginTop:24,padding:'14px 16px',borderRadius:14,background:'var(--card2)',border:'1px solid var(--border)',textAlign:'center'}}>
        <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>🔒 Your data stays on your device. We use OTP codes for secure, password-free login.</div>
      </div>
    </div>}

    {/* Mode: Email */}
    {mode==='email'&&<div>
      <button onClick={()=>setMode('choose')} style={{background:'none',border:'none',color:'var(--accent)',fontSize:14,fontWeight:700,marginBottom:24,display:'flex',alignItems:'center',gap:6}}>‹ Back</button>
      {!isLogin&&<div style={{marginBottom:14}}>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:6,fontWeight:600}}>FULL NAME</div>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" style={{width:'100%',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:14,color:'var(--text)',fontSize:16,padding:'14px 16px',outline:'none'}}/>
      </div>}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:6,fontWeight:600}}>EMAIL ADDRESS</div>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" style={{width:'100%',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:14,color:'var(--text)',fontSize:16,padding:'14px 16px',outline:'none'}}/>
      </div>
      <button onClick={handleEmailSubmit} disabled={loading} style={{width:'100%',padding:'16px',borderRadius:16,border:'none',background:'var(--accent)',color:'#000',fontSize:16,fontWeight:800,opacity:loading?.7:1}}>
        {loading?'Sending OTP…':'Send Verification Code →'}
      </button>
    </div>}

    {/* Mode: Phone */}
    {mode==='phone'&&<div>
      <button onClick={()=>setMode('choose')} style={{background:'none',border:'none',color:'var(--accent)',fontSize:14,fontWeight:700,marginBottom:24,display:'flex',alignItems:'center',gap:6}}>‹ Back</button>
      {!isLogin&&<div style={{marginBottom:14}}>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:6,fontWeight:600}}>FULL NAME</div>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" style={{width:'100%',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:14,color:'var(--text)',fontSize:16,padding:'14px 16px',outline:'none'}}/>
      </div>}
      <div style={{fontSize:12,color:'var(--sub)',marginBottom:6,fontWeight:600}}>PHONE NUMBER</div>
      <div style={{display:'flex',gap:8,marginBottom:20,position:'relative'}}>
        <button onClick={()=>setShowCC(!showCC)} style={{padding:'14px 12px',borderRadius:14,border:'1px solid var(--border2)',background:'var(--card)',color:'var(--text)',fontSize:15,fontWeight:700,display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap',flexShrink:0}}>
          {countryCode.flag} {countryCode.code} <span style={{fontSize:10,color:'var(--muted)'}}>▾</span>
        </button>
        <input type="tel" value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,''))} placeholder="Phone number" style={{flex:1,background:'var(--card)',border:'1px solid var(--border2)',borderRadius:14,color:'var(--text)',fontSize:16,padding:'14px 14px',outline:'none'}}/>
      </div>
      {/* Country code dropdown */}
      {showCC&&<div style={{background:'var(--card)',border:'1px solid var(--border2)',borderRadius:18,padding:'12px',marginBottom:12,maxHeight:280,overflowY:'auto'}}>
        <input value={ccSearch} onChange={e=>setCCSearch(e.target.value)} placeholder="Search country…" style={{width:'100%',background:'var(--card2)',border:'1px solid var(--border)',borderRadius:10,color:'var(--text)',fontSize:14,padding:'10px 12px',outline:'none',marginBottom:10}}/>
        {filteredCC.map(c=><div key={c.country} onClick={()=>{setCC(c);setShowCC(false);setCCSearch('');}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,cursor:'pointer',background:'transparent'}} onMouseEnter={e=>e.currentTarget.style.background='var(--card2)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <span style={{fontSize:18}}>{c.flag}</span>
          <span style={{flex:1,fontSize:14,fontWeight:600}}>{c.name}</span>
          <span style={{fontSize:13,color:'var(--muted)',fontWeight:700}}>{c.code}</span>
        </div>)}
      </div>}
      <button onClick={handlePhoneSubmit} disabled={loading} style={{width:'100%',padding:'16px',borderRadius:16,border:'none',background:'var(--green)',color:'#000',fontSize:16,fontWeight:800,opacity:loading?.7:1}}>
        {loading?'Sending OTP…':'Send Verification Code →'}
      </button>
      <div style={{marginTop:14,fontSize:12,color:'var(--muted)',textAlign:'center',lineHeight:1.6}}>📝 Your SMS app will open pre-filled. Send the code to yourself, then enter it here.</div>
    </div>}

    {/* Mode: OTP */}
    {mode==='otp'&&<div>
      <button onClick={()=>setMode(otpChannel)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:14,fontWeight:700,marginBottom:20,display:'flex',alignItems:'center',gap:6}}>‹ Back</button>

      {/* Email OTP — code comes via email, NOT shown on screen */}
      {otpChannel==='email'&&<div style={{textAlign:'center',marginBottom:24}}>
        <div style={{width:72,height:72,borderRadius:20,background:'rgba(78,154,241,.12)',border:'1px solid rgba(78,154,241,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 14px'}}>📧</div>
        <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>Check your email</div>
        <div style={{fontSize:14,color:'var(--sub)',lineHeight:1.6,marginBottom:6}}>We sent a 6-digit code to</div>
        <div style={{fontSize:15,fontWeight:700,color:'var(--accent)',marginBottom:4}}>{email}</div>
        <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>Check your inbox (and spam folder).<br/>The code expires in 5 minutes.</div>
      </div>}

      {/* Phone OTP — code shown prominently since SMS goes to themselves */}
      {otpChannel==='phone'&&<div style={{textAlign:'center',marginBottom:24}}>
        <div style={{width:72,height:72,borderRadius:20,background:'var(--g10)',border:'1px solid rgba(48,209,88,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 14px'}}>💬</div>
        <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>Check your SMS</div>
        <div style={{fontSize:13,color:'var(--sub)',lineHeight:1.6,marginBottom:14}}>Your SMS app opened with the code pre-filled.<br/>Send it to <strong style={{color:'var(--text)'}}>{countryCode.code} {phone}</strong>, then enter the code below.</div>
        {/* Show code visibly for phone since user sends SMS to themselves */}
        <div style={{background:'var(--card2)',borderRadius:16,padding:'16px 20px',border:'1px solid var(--border2)',marginBottom:6,display:'inline-block'}}>
          <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,fontWeight:700,marginBottom:8}}>Your verification code</div>
          <div style={{fontSize:36,fontWeight:900,letterSpacing:8,color:'var(--accent)',fontFamily:'monospace'}}>{generatedOtp}</div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>Expires in 5 minutes</div>
        </div>
      </div>}

      {/* 6-digit input boxes */}
      <div style={{display:'flex',gap:10,justifyContent:'center',marginBottom:20}}>
        {[0,1,2,3,4,5].map(i=><input key={i} ref={otpRefs[i]} type="tel" maxLength={6} value={otpInput[i]||''} onChange={e=>handleOtpKey(i,e.target.value)} onKeyDown={e=>{if(e.key==='Backspace'&&!otpInput[i]&&i>0)otpRefs[i-1].current?.focus();}} style={{width:46,height:56,borderRadius:14,border:`2px solid ${otpInput[i]?'var(--accent)':'var(--border2)'}`,background:'var(--card)',color:'var(--text)',fontSize:24,fontWeight:800,textAlign:'center',outline:'none',caretColor:'var(--accent)',transition:'border-color .2s'}}/>)}
      </div>
      <button onClick={handleOtpVerify} disabled={otpInput.length<6} style={{width:'100%',padding:'16px',borderRadius:16,border:'none',background:otpInput.length===6?'var(--accent)':'var(--card2)',color:otpInput.length===6?'#000':'var(--muted)',fontSize:16,fontWeight:800,transition:'all .2s'}}>
        Verify & Sign In ✓
      </button>
      <button onClick={()=>{const otp=genOTP();setGenOtp(otp);setOtpInput('');otpChannel==='email'?sendEmailOTP(email,otp):sendPhoneOTP(`${countryCode.code}${phone}`,otp);}} style={{width:'100%',padding:'12px',borderRadius:14,border:'none',background:'transparent',color:'var(--accent)',fontSize:14,fontWeight:700,marginTop:10}}>
        Resend code
      </button>
    </div>}
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TX SHEET (Add/Edit)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function TxSheet({tx,onSave,onClose,defSched=false,toast,cur='USD',lang='en',voiceDefaults=null}){
  const ed=!!tx;
  const [type,setType]=useState(tx?.type||voiceDefaults?.type||'expense');
  const [amt,setAmt]=useState(tx?String(tx.amount):voiceDefaults?.amount?String(voiceDefaults.amount):'');
  const [cat,setCat]=useState(tx?.category||voiceDefaults?.category||'');
  const [note,setNote]=useState(tx?.note||voiceDefaults?.note||'');
  const [date,setDate]=useState(tx?.date||todayStr());
  const [remindTime,setRemindTime]=useState(tx?.remindTime||'09:00');
  const [sched,setSched]=useState(tx?.scheduled||defSched);
  const [notify,setNotify]=useState(tx?.notifyWhenDue!==false);
  const cats=type==='income'?INC_CATS:EXP_CATS;
  const numK=[['7','8','9'],['4','5','6'],['1','2','3'],['.',  '0','⌫']];
  const tap=v=>{if(v==='⌫'){setAmt(a=>a.slice(0,-1));return;}if(v==='.'&&amt.includes('.'))return;if(amt.replace('.','').length>=9)return;setAmt(a=>a===''&&v==='.'?'0.':a+v);};
  const save=()=>{
    const n=parseFloat(amt);if(!n||n<=0){toast({icon:'⚠️',title:'Enter amount',body:'Please type an amount.',warn:true});return;}
    if(!cat){toast({icon:'⚠️',title:'Pick category',body:'Select a category below.',warn:true});return;}
    onSave({...(tx||{}),id:tx?.id||Date.now(),type,amount:n,category:cat,note:note.trim(),date,remindTime,scheduled:sched,notifyWhenDue:sched&&notify});
    onClose();
  };
  const cs=CURRENCIES.find(c=>c.code===cur)?.symbol||'$';
  const disp=amt?`${cs}${parseFloat(amt||0).toLocaleString('en-US',{minimumFractionDigits:amt.includes('.')&&amt.split('.')[1]?.length>0?Math.min(amt.split('.')[1].length,2):0})}`:`${cs}0.00`;

  return<Modal onBg={onClose} ch={<>
    <div style={{display:'flex',justifyContent:'center',padding:'10px 0 2px'}}><div style={{width:36,height:4,borderRadius:2,background:'var(--muted2)'}}/></div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 20px 12px'}}>
      <div style={{fontSize:19,fontWeight:800}}>{ed?'Edit':'Add'} Transaction</div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>setSched(!sched)} style={{padding:'6px 12px',borderRadius:10,border:`1px solid ${sched?'var(--accent)':'var(--border2)'}`,background:sched?'var(--a10)':'transparent',color:sched?'var(--accent)':'var(--muted)',fontSize:12,fontWeight:700}}>📅 {sched?'Sched':'Future'}</button>
        <button onClick={onClose} style={{width:30,height:30,borderRadius:15,background:'var(--card2)',border:'none',color:'var(--muted)',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
      </div>
    </div>
    {/* Type */}
    <div style={{display:'flex',background:'var(--card2)',borderRadius:14,padding:4,gap:4,margin:'0 16px 12px'}}>
      {['expense','income'].map(tp=><button key={tp} onClick={()=>{setType(tp);setCat('');}} style={{flex:1,padding:'11px',borderRadius:10,border:'none',background:type===tp?(tp==='income'?'var(--green)':'var(--red)'):'transparent',color:type===tp?'#fff':'var(--muted)',fontSize:15,fontWeight:800,transition:'all .18s'}}>{tp==='income'?'💚 Income':'❤️ Expense'}</button>)}
    </div>
    {/* Amount */}
    <div style={{textAlign:'center',padding:'6px 16px 10px'}}>
      <div style={{fontSize:amt.length>8?34:52,fontWeight:900,letterSpacing:-2,color:amt?(type==='income'?'var(--green)':'var(--red)'):'var(--muted2)',minHeight:62,display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>{disp}</div>
    </div>
    {/* Numpad */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,padding:'0 16px 12px'}}>
      {numK.flat().map(k=><button key={k} onClick={()=>tap(k)} style={{height:52,borderRadius:14,border:'1px solid var(--border)',background:k==='⌫'?'var(--card2)':'var(--card)',color:'var(--text)',fontSize:k==='⌫'?16:22,fontWeight:700,transition:'transform .08s'}}>{k}</button>)}
    </div>
    {/* Category */}
    <div style={{padding:'0 16px 12px'}}>
      <div style={{fontSize:10,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Category</div>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(cats.length,5)},1fr)`,gap:6}}>
        {cats.map(c=><button key={c.id} onClick={()=>setCat(c.id)} style={{padding:'8px 4px',borderRadius:12,border:`1.5px solid ${cat===c.id?c.color:'var(--border)'}`,background:cat===c.id?c.color+'22':'var(--card2)',display:'flex',flexDirection:'column',alignItems:'center',gap:2,transition:'all .15s'}}>
          <span style={{fontSize:20}}>{c.icon}</span>
          <span style={{fontSize:9,color:cat===c.id?c.color:'var(--muted)',fontWeight:700}}>{c.label}</span>
        </button>)}
      </div>
    </div>
    {/* Note + Date */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'0 16px 10px'}}>
      {[{label:'Note',el:<input value={note} onChange={e=>setNote(e.target.value)} placeholder="Optional…" style={{background:'none',border:'none',color:'var(--text)',fontSize:14,width:'100%',outline:'none'}}/>},{label:sched?'Due Date':'Date',el:<input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{background:'none',border:'none',color:'var(--text)',fontSize:13,width:'100%',outline:'none'}}/>}].map((f,i)=><div key={i} style={{background:'var(--card2)',borderRadius:12,padding:'10px 14px',border:'1px solid var(--border)'}}>
        <div style={{fontSize:9,color:'var(--muted)',marginBottom:5,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>{f.label}</div>
        {f.el}
      </div>)}
    </div>
    {sched&&<div style={{padding:'0 16px 12px'}}>
      <div style={{background:'var(--card2)',borderRadius:14,padding:'12px 14px',border:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:notify?12:0}}>
          <div><div style={{fontSize:14,fontWeight:700}}>Email reminder when due</div><div style={{fontSize:11,color:'var(--sub)',marginTop:2}}>Get an email on the due date</div></div>
          <Tog on={notify} fn={()=>setNotify(!notify)}/>
        </div>
        {notify&&<div>
          <div style={{fontSize:10,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Send reminder at</div>
          <input type="time" value={remindTime} onChange={e=>setRemindTime(e.target.value)} style={{width:'100%',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:10,color:'var(--text)',fontSize:16,padding:'10px 14px',outline:'none',fontWeight:700}}/>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:6}}>An email will be sent at this exact time on the due date</div>
        </div>}
      </div>
    </div>}
    <div style={{padding:'4px 16px 12px'}}>
      <button onClick={save} style={{width:'100%',padding:'16px',borderRadius:16,border:'none',background:!amt||!cat?'var(--card2)':'var(--accent)',color:!amt||!cat?'var(--muted)':'#000',fontSize:16,fontWeight:800,transition:'all .2s'}}>{ed?'Update':'Save Transaction'}</button>
    </div>
  </>}/>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HOME SCREEN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function HomeScreen({txns,onNav,onAdd,onSched,user,budgetGoal,incomeGoal,cur,lang}){
  const t=k=>T(lang,k);
  const now=new Date();
  const live=txns.filter(x=>!x.scheduled);
  const mn=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const inc=mn.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=mn.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const bal=live.reduce((s,x)=>x.type==='income'?s+x.amount:s-x.amount,0);
  const recent=[...live].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  const upcoming=txns.filter(x=>x.scheduled).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,3);
  const hr=now.getHours();
  const greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const isDemo=txns.length>=35;

  return<div style={{color:'var(--text)',padding:'0 16px',paddingBottom:`calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 20px)`}}>
    <div style={{paddingTop:'var(--hdr)',paddingBottom:4}}>
      <div style={{fontSize:13,color:'var(--sub)',marginBottom:2}}>{greet}{user?.name?`, ${user.name}`:''} 👋</div>
      <div style={{fontSize:28,fontWeight:900,letterSpacing:-.5}}>{t('home')}</div>
    </div>
    {isDemo&&<div style={{background:'linear-gradient(90deg,var(--a10),rgba(0,0,0,0))',border:'1px solid rgba(245,166,35,.2)',borderRadius:14,padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
      <span>✨</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>{t('demoData')}</div><div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>Settings → Reset when ready for real data</div></div>
    </div>}
    {/* Hero balance */}
    <div style={{background:'linear-gradient(135deg,var(--hero-a),var(--hero-b))',borderRadius:26,padding:'22px 22px',marginBottom:12,position:'relative',overflow:'hidden',border:'1px solid var(--border)'}}>
      <div style={{position:'absolute',top:-50,right:-50,width:160,height:160,borderRadius:'50%',background:'var(--a10)'}}/>
      <div style={{position:'absolute',bottom:-70,left:-20,width:140,height:140,borderRadius:'50%',background:'var(--a10)',opacity:.4}}/>
      <div style={{fontSize:11,color:'var(--sub)',textTransform:'uppercase',letterSpacing:.8,fontWeight:700,marginBottom:6}}>{t('totalBalance')}</div>
      <div style={{fontSize:44,fontWeight:900,letterSpacing:-2,color:bal>=0?'var(--text)':'var(--red)',lineHeight:1}}>{bal<0?'-':''}{fmtMoney(Math.abs(bal),cur)}</div>
      <div style={{fontSize:12,color:'var(--sub)',marginTop:6}}>{monthLbl(now.getFullYear(),now.getMonth())}</div>
    </div>
    {/* Income/Expense */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      {[{label:t('income'),val:inc,col:'var(--green)',goal:incomeGoal},{label:t('expenses'),val:exp,col:'var(--red)',goal:budgetGoal}].map(s=><div key={s.label} style={{background:'var(--card)',borderRadius:18,padding:'14px 16px',border:'1px solid var(--border)'}}>
        <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,fontWeight:700,marginBottom:6}}>{s.label}</div>
        <div style={{fontSize:22,fontWeight:900,color:s.col}}>{fmtK(s.val,cur)}</div>
        {s.goal>0&&<div style={{marginTop:8}}><div style={{height:4,borderRadius:2,background:'var(--card2)',overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,s.val/s.goal*100)}%`,background:s.label===t('expenses')&&s.val/s.goal>.85?'var(--red)':s.col,borderRadius:2}}/></div><div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>{Math.round(s.val/s.goal*100)}%</div></div>}
      </div>)}
    </div>
    {/* Actions */}
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:10,marginBottom:20}}>
      <button onClick={onAdd} style={{padding:'14px',borderRadius:16,background:'var(--accent)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:15,fontWeight:800,color:'#000'}}>＋ {t('addTransaction')}</button>
      <button onClick={onSched} style={{padding:'14px',borderRadius:16,background:'var(--card)',border:'1px solid var(--accent)',fontSize:13,fontWeight:700,color:'var(--accent)'}}>📅 {t('schedule')}</button>
    </div>
    {/* Upcoming */}
    {upcoming.length>0&&<div style={{marginBottom:20}}>
      <div style={{fontSize:15,fontWeight:800,marginBottom:10}}>📅 {t('upcoming')}</div>
      <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',padding:'4px 0'}}>
        {upcoming.map((x,i)=>{const cat=getCat(x.type,x.category);const days=Math.ceil((new Date(x.date)-new Date())/864e5);return<div key={x.id} style={{display:'flex',alignItems:'center',padding:'12px 16px',borderBottom:i<upcoming.length-1?'1px solid var(--border)':'none'}}>
          <div style={{width:38,height:38,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:12,flexShrink:0}}>{cat.icon}</div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.note||cat.label}</div><div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>in {days} day{days!==1?'s':''}</div></div>
          <div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)'}}>{x.type==='income'?'+':'-'}{fmtMoney(x.amount,cur)}</div>{x.notifyWhenDue&&<div style={{fontSize:10,color:'var(--accent)',marginTop:1}}>🔔</div>}</div>
        </div>;})}
      </div>
    </div>}
    {/* Recent */}
    {recent.length>0&&<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:15,fontWeight:800}}>{t('recent')}</div>
        <button onClick={()=>onNav(3)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:13,fontWeight:700}}>{t('seeAll')} →</button>
      </div>
      <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',padding:'4px 0'}}>
        {recent.map((x,i)=>{const cat=getCat(x.type,x.category);return<div key={x.id} style={{display:'flex',alignItems:'center',padding:'12px 16px',borderBottom:i<recent.length-1?'1px solid var(--border)':'none'}}>
          <div style={{width:38,height:38,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:12,flexShrink:0}}>{cat.icon}</div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.note||cat.label}</div><div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>{dayStr(x.date)}</div></div>
          <div style={{fontSize:15,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)',marginLeft:8}}>{x.type==='income'?'+':'-'}{fmtMoney(x.amount,cur)}</div>
        </div>;})}
      </div>
    </div>}
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CHARTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function ChartsScreen({txns,cur,lang}){
  const t=k=>T(lang,k);
  const now=new Date();
  const [vm,setVm]=useState(now.getMonth());
  const [vy,setVy]=useState(now.getFullYear());
  const nav=d=>{let m=vm+d,y=vy;if(m<0){m=11;y--;}if(m>11){m=0;y++;}setVm(m);setVy(y);};
  const live=txns.filter(x=>!x.scheduled);
  const mn=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===vm&&d.getFullYear()===vy;});
  const inc=mn.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=mn.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const weeks=['W1','W2','W3','W4'].map((l,wi)=>{const w=mn.filter(x=>Math.floor((new Date(x.date+'T12:00:00').getDate()-1)/7)===wi);return{l,i:w.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0),e:w.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0)};});
  const cats=EXP_CATS.map(c=>({...c,v:mn.filter(x=>x.type==='expense'&&x.category===c.id).reduce((s,x)=>s+x.amount,0)})).filter(c=>c.v>0).sort((a,b)=>b.v-a.v);
  const dim=new Date(vy,vm+1,0).getDate(),fd=new Date(vy,vm,1).getDay();
  const days=Array.from({length:dim},(_,i)=>{const d=i+1,dt=mn.filter(x=>new Date(x.date+'T12:00:00').getDate()===d);const ni=dt.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);const ne=dt.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);return{d,net:ni-ne,has:dt.length>0};});
  const sorted=[...mn].sort((a,b)=>new Date(a.date)-new Date(b.date));let run=0;
  const runPts=[{y:0},...sorted.map(x=>{run+=x.type==='income'?x.amount:-x.amount;return{y:run};})];

  return<div style={{color:'var(--text)',padding:'0 16px',paddingBottom:`calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 20px)`}}>
    <div style={{paddingTop:'var(--hdr)',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{fontSize:26,fontWeight:900,letterSpacing:-.5}}>{t('charts')}</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button onClick={()=>nav(-1)} style={{width:32,height:32,borderRadius:10,background:'var(--card)',border:'1px solid var(--border)',color:'var(--text)',fontSize:16}}>‹</button>
        <div style={{fontSize:12,color:'var(--sub)',minWidth:90,textAlign:'center',fontWeight:700}}>{monthLbl(vy,vm)}</div>
        <button onClick={()=>nav(1)} style={{width:32,height:32,borderRadius:10,background:'var(--card)',border:'1px solid var(--border)',color:'var(--text)',fontSize:16}}>›</button>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
      {[{l:t('income'),v:inc,c:'var(--green)'},{l:t('expenses'),v:exp,c:'var(--red)'},{l:'Net',v:inc-exp,c:(inc-exp)>=0?'var(--green)':'var(--red)'}].map(s=><div key={s.l} style={{background:'var(--card)',borderRadius:16,padding:'10px 12px',textAlign:'center',border:'1px solid var(--border)'}}>
        <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,fontWeight:700,marginBottom:4}}>{s.l}</div>
        <div style={{fontSize:13,fontWeight:800,color:s.c}}>{fmtK(s.v,cur)}</div>
      </div>)}
    </div>
    <div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:10,display:'flex',gap:12}}><span>Weekly</span><span style={{color:'var(--green)',fontSize:11}}>● Inc</span><span style={{color:'var(--red)',fontSize:11}}>● Exp</span></div>
      <Bars weeks={weeks} height={100}/>
    </div>
    {cats.length>0&&<div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Expense Breakdown</div>
      <div style={{display:'flex',gap:14,alignItems:'center'}}>
        <Donut data={cats.map(c=>({...c,v:c.v}))} size={100}/>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:7}}>
          {cats.slice(0,5).map(c=><div key={c.id} style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:14}}>{c.icon}</span>
            <div style={{flex:1}}><div style={{fontSize:11,color:'var(--sub)',fontWeight:600}}>{c.label}</div><div style={{height:3,borderRadius:2,background:'var(--card2)',marginTop:2,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.round(c.v/exp*100)}%`,background:c.color}}/></div></div>
            <div style={{fontSize:12,fontWeight:700,color:'var(--red)',flexShrink:0}}>{fmtK(c.v,cur)}</div>
          </div>)}
        </div>
      </div>
    </div>}
    {runPts.length>2&&<div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>Running Balance</div>
      <Line pts={runPts} height={70}/>
    </div>}
    <div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)'}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Day-by-Day</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
        {['Su','Mo','Tu','We','Th','Fr','Sa'].map((d,i)=><div key={i} style={{fontSize:9,color:'var(--muted)',textAlign:'center',fontWeight:700,padding:'2px 0'}}>{d}</div>)}
        {Array.from({length:fd}).map((_,i)=><div key={'e'+i}/>)}
        {days.map(d=><div key={d.d} title={d.has?`${d.d}: ${d.net>=0?'+':''}${fmtMoney(d.net,cur)}`:'—'} style={{aspectRatio:'1',borderRadius:7,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',background:!d.has?'transparent':d.net>=0?'var(--g10)':'var(--r10)',color:!d.has?'var(--muted2)':d.net>=0?'var(--green)':'var(--red)',border:d.d===now.getDate()&&vm===now.getMonth()&&vy===now.getFullYear()?'1.5px solid var(--accent)':'1px solid transparent'}}>{d.d}</div>)}
      </div>
    </div>
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HISTORY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function HistoryScreen({txns,onEdit,onDelete,onAddSched,toast,cur,lang}){
  const t=k=>T(lang,k);
  const [view,setView]=useState('history');
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [start,setStart]=useState('');
  const [end,setEnd]=useState('');
  const [editTx,setEditTx]=useState(null);
  const [delTx,setDelTx]=useState(null);
  const [showAddS,setAddS]=useState(false);

  const live=txns.filter(x=>!x.scheduled);
  const sched=txns.filter(x=>x.scheduled).sort((a,b)=>new Date(a.date)-new Date(b.date));

  const filtered=useMemo(()=>{
    let l=live;
    if(filter!=='all')l=l.filter(x=>x.type===filter);
    if(search.trim())l=l.filter(x=>(x.note||'').toLowerCase().includes(search.toLowerCase())||(x.category||'').toLowerCase().includes(search.toLowerCase()));
    if(start)l=l.filter(x=>x.date>=start);
    if(end)l=l.filter(x=>x.date<=end);
    return [...l].sort((a,b)=>new Date(b.date)-new Date(a.date));
  },[live,filter,search,start,end]);

  const groups=useMemo(()=>{const g=[];filtered.forEach(x=>{const last=g[g.length-1];if(last&&last.date===x.date)last.items.push(x);else g.push({date:x.date,items:[x]});});return g;},[filtered]);
  const total=filtered.reduce((s,x)=>x.type==='income'?s+x.amount:s-x.amount,0);

  return<div style={{color:'var(--text)',padding:'0 16px',paddingBottom:`calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 20px)`}}>
    {editTx&&<TxSheet tx={editTx} onSave={x=>{onEdit(x);setEditTx(null);}} onClose={()=>setEditTx(null)} toast={toast} cur={cur} lang={lang}/>}
    {delTx&&<Confirm title={t('delete')+' Transaction'} body={`"${delTx.note||delTx.category}" ${fmtMoney(delTx.amount,cur)}`} ok={t('delete')} danger onOk={()=>{onDelete(delTx.id);setDelTx(null);}} onCancel={()=>setDelTx(null)}/>}
    {showAddS&&<TxSheet onSave={x=>{onAddSched(x);setAddS(false);}} onClose={()=>setAddS(false)} defSched toast={toast} cur={cur} lang={lang}/>}

    <div style={{paddingTop:'var(--hdr)',marginBottom:12}}>
      <div style={{fontSize:26,fontWeight:900,letterSpacing:-.5,marginBottom:12}}>{t('history')}</div>
      <div style={{display:'flex',background:'var(--card2)',borderRadius:14,padding:4,gap:4,marginBottom:12}}>
        {[{v:'history',l:`📋 ${t('past')}`},{v:'scheduled',l:`📅 ${t('scheduled')}${sched.length>0?` (${sched.length})`:''}`}].map(b=><button key={b.v} onClick={()=>setView(b.v)} style={{flex:1,padding:'9px',borderRadius:10,border:'none',background:view===b.v?'var(--card)':'transparent',color:view===b.v?'var(--text)':'var(--muted)',fontSize:13,fontWeight:700,transition:'all .18s'}}>{b.l}</button>)}
      </div>
    </div>

    {view==='history'&&<div>
      {/* Search */}
      <div style={{background:'var(--card)',borderRadius:14,padding:'10px 14px',border:'1px solid var(--border)',marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
        <span style={{color:'var(--muted)'}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t('search')} style={{background:'none',border:'none',color:'var(--text)',fontSize:14,flex:1,outline:'none'}}/>
        {search&&<button onClick={()=>setSearch('')} style={{background:'none',border:'none',color:'var(--muted)',fontSize:18,cursor:'pointer'}}>×</button>}
      </div>
      {/* Date range */}
      <div style={{background:'var(--card)',borderRadius:14,padding:'12px 14px',border:'1px solid var(--border)',marginBottom:10}}>
        <div style={{fontSize:10,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>📅 Date Range</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[{l:t('fromDate'),v:start,s:setStart},{l:t('toDate'),v:end,s:setEnd}].map((f,i)=><div key={i}>
            <div style={{fontSize:10,color:'var(--muted)',marginBottom:4}}>{f.l}</div>
            <input type="date" value={f.v} onChange={e=>f.s(e.target.value)} style={{width:'100%',background:'var(--card2)',border:'1px solid var(--border)',borderRadius:10,color:f.v?'var(--text)':'var(--muted)',fontSize:13,padding:'9px 10px',outline:'none'}}/>
          </div>)}
        </div>
        {(start||end)&&<button onClick={()=>{setStart('');setEnd('');}} style={{marginTop:8,background:'none',border:'none',color:'var(--accent)',fontSize:12,fontWeight:700,cursor:'pointer'}}>✕ Clear dates</button>}
      </div>
      {/* Filters */}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        {['all','income','expense'].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:'7px 16px',borderRadius:99,border:'none',background:filter===f?(f==='income'?'var(--green)':f==='expense'?'var(--red)':'var(--accent)'):'var(--card2)',color:filter===f?'#000':'var(--muted)',fontSize:13,fontWeight:700,flexShrink:0}}>
          {f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1)}
        </button>)}
      </div>
      {/* Stats bar */}
      {filtered.length>0&&<div style={{background:'var(--card)',borderRadius:12,padding:'10px 14px',border:'1px solid var(--border)',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:'var(--sub)'}}>{filtered.length} transaction{filtered.length!==1?'s':''}</span>
        <span style={{fontSize:13,fontWeight:800,color:total>=0?'var(--green)':'var(--red)'}}>{total>=0?'+':''}{fmtMoney(total,cur)}</span>
      </div>}
      {/* Groups */}
      {groups.length===0&&<div style={{textAlign:'center',marginTop:60,color:'var(--muted)'}}>
        <div style={{fontSize:44,marginBottom:12}}>🔍</div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>{t('noTxns')}</div>
        <div style={{fontSize:13}}>Try adjusting filters or date range</div>
      </div>}
      {groups.map(g=><div key={g.date} style={{marginBottom:16}}>
        <div style={{fontSize:11,color:'var(--sub)',textTransform:'uppercase',letterSpacing:.8,fontWeight:700,marginBottom:6}}>{dayStr(g.date)}</div>
        <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',padding:'4px 0'}}>
          {g.items.map((x,i)=>{const cat=getCat(x.type,x.category);return<div key={x.id} style={{display:'flex',alignItems:'center',padding:'12px 14px',borderBottom:i<g.items.length-1?'1px solid var(--border)':'none'}}>
            <div style={{width:38,height:38,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:12,flexShrink:0}}>{cat.icon}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.note||cat.label}</div><div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>{cat.label}</div></div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)'}}>{x.type==='income'?'+':'-'}{fmtMoney(x.amount,cur)}</div>
              <div style={{display:'flex',gap:10,marginTop:4,justifyContent:'flex-end'}}>
                <button onClick={()=>setEditTx(x)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:11,fontWeight:700,cursor:'pointer',padding:0}}>{t('edit')}</button>
                <button onClick={()=>setDelTx(x)} style={{background:'none',border:'none',color:'var(--muted2)',fontSize:11,fontWeight:700,cursor:'pointer',padding:0}}>{t('delete')}</button>
              </div>
            </div>
          </div>;})}
        </div>
      </div>)}
    </div>}

    {view==='scheduled'&&<div>
      <button onClick={()=>setAddS(true)} style={{width:'100%',padding:'14px',borderRadius:14,border:'1.5px dashed var(--accent)',background:'var(--a10)',color:'var(--accent)',fontSize:14,fontWeight:800,marginBottom:14}}>+ Add Scheduled</button>
      {sched.length===0&&<div style={{textAlign:'center',marginTop:40,color:'var(--muted)'}}><div style={{fontSize:44,marginBottom:12}}>📅</div><div style={{fontSize:16,fontWeight:700}}>No scheduled transactions</div></div>}
      {sched.map(x=>{const cat=getCat(x.type,x.category);const days=Math.ceil((new Date(x.date)-new Date())/864e5);const past=days<0;const urgent=!past&&days<=3;
        return<div key={x.id} style={{background:'var(--card)',borderRadius:18,padding:'14px 16px',border:`1px solid ${past?'rgba(255,69,58,.3)':urgent?'rgba(245,166,35,.3)':'var(--border)'}`,marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:42,height:42,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{cat.icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.note||cat.label}</div>
              <div style={{fontSize:12,color:past?'var(--red)':urgent?'var(--accent)':'var(--sub)',marginTop:2,fontWeight:past||urgent?700:400}}>{dayStr(x.date)} · {past?'⚠️ Overdue':days===0?'Today':days===1?'Tomorrow':`in ${days} days`}</div>
              {x.notifyWhenDue&&<div style={{fontSize:11,color:'var(--accent)',marginTop:2}}>🔔 reminder set</div>}
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)'}}>{x.type==='income'?'+':'-'}{fmtMoney(x.amount,cur)}</div>
              <div style={{display:'flex',gap:8,marginTop:5,justifyContent:'flex-end'}}>
                <button onClick={()=>setEditTx(x)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:12,fontWeight:700,cursor:'pointer',padding:0}}>{t('edit')}</button>
                <button onClick={()=>setDelTx(x)} style={{background:'none',border:'none',color:'var(--red)',fontSize:12,fontWeight:700,cursor:'pointer',padding:0}}>{t('delete')}</button>
              </div>
            </div>
          </div>
        </div>;})}
    </div>}
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SETTINGS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function SettingsScreen({user,onLogout,theme,onTheme,txns,onReset,toast,budgetGoal,incomeGoal,onBudget,onIncome,cur,onCur,lang,onLang}){
  const t=k=>T(lang,k);
  const [sec,setSec]=useState('profile');
  const [notifEn,setNE]=useState(()=>LS.get('notif_en',{push:true,email:false,sms:false}));
  const [activeTimes,setAT]=useState(()=>LS.get('notif_times',['9:00 AM','6:00 PM']));
  const [customTime,setCustom]=useState('');
  const [notifPerm,setNP]=useState(()=>'Notification' in window?Notification.permission:'denied');
  const [testSent,setTS]=useState('');
  const [showReset,setSR]=useState(false);
  const [saving,setSaving]=useState(false);
  const [curSearch,setCurSearch]=useState('');
  const [langSearch,setLangSearch]=useState('');
  const [ejKey,setEJKey]=useState('');// legacy — kept for state compat
  const timerRef=useRef([]);

  const saveNE=v=>{setNE(v);LS.set('notif_en',v);};
  const toggleTime=t2=>{const n=activeTimes.includes(t2)?activeTimes.filter(r=>r!==t2):[...activeTimes,t2].sort((a,b)=>{const pa=parseT(a),pb=parseT(b);return(pa.h*60+pa.m)-(pb.h*60+pb.m);});setAT(n);LS.set('notif_times',n);};
  const addCustom=()=>{if(!customTime)return;const[h,m]=customTime.split(':').map(Number);const ap=h>=12?'PM':'AM';const hr=h%12||12;const lbl=`${hr}:${String(m).padStart(2,'0')} ${ap}`;if(!activeTimes.includes(lbl)){const n=[...activeTimes,lbl].sort((a,b)=>{const pa=parseT(a),pb=parseT(b);return(pa.h*60+pa.m)-(pb.h*60+pb.m);});setAT(n);LS.set('notif_times',n);}setCustom('');};

  // ── Notification email address (user can override) ──────────
  const [notifEmail,setNotifEmail]=useState(()=>LS.get('notif_email','')||user?.email||'');
  const [notifPhone,setNotifPhone]=useState(()=>LS.get('notif_phone','')||user?.phone||'');

  // ── Fire all enabled channels ────────────────────────────────
  const fireAllChannels=async(ts)=>{
    if(notifEn.push){
      toast({icon:'bell',title:'LedgrTrack '+ts,body:'Time to log your transactions!'});
      if('Notification' in window&&Notification.permission==='granted'){try{new Notification('LedgrTrack '+ts,{body:'Tap to open and log!',tag:'ledgr-'+ts});}catch(e){}}
    }
    if(notifEn.email&&notifEmail){
      const res=await sendReminderEmail({toEmail:notifEmail,toName:user?.name,remindTime:ts,txns,currency:cur});
      if(res.ok)toast({icon:'mail',title:ts+' - Email sent!',body:'Reminder delivered to '+notifEmail});
      else toast({icon:'warn',title:'Email failed',body:res.err||'Check EmailJS',warn:true});
    }
    if(notifEn.sms&&notifPhone){
      const sym=symFor(cur);
      const live=txns.filter(x=>!x.scheduled);
      const mn=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===new Date().getMonth();});
      const mi=mn.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
      const me=mn.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
      const bal=live.reduce((s,x)=>x.type==='income'?s+x.amount:s-x.amount,0);
      const sms='LedgrTrack '+ts+': Income '+sym+mi.toFixed(0)+' | Expenses '+sym+me.toFixed(0)+' | Balance '+sym+bal.toFixed(0)+'. Open app!';
      window.open('sms:'+notifPhone+'?body='+encodeURIComponent(sms));
      toast({icon:'sms',title:ts+' - SMS opened',body:'Ready for '+notifPhone});
    }
  };

    // ── Schedule all reminder times ──────────────────────────────
  const scheduleAll=()=>{
    timerRef.current.forEach(x=>{clearTimeout(x);clearInterval(x);});timerRef.current=[];
    if(!activeTimes.length){toast({icon:'⚠️',title:'No times selected',body:'Pick at least one reminder time below.',warn:true});return;}
    const enabledChannels=[];
    if(notifEn.push)enabledChannels.push('📱 Push');
    if(notifEn.email&&notifEmail)enabledChannels.push('📧 Email');
    if(notifEn.sms&&notifPhone)enabledChannels.push('💬 SMS');
    if(!enabledChannels.length){toast({icon:'⚠️',title:'No channels active',body:'Enable Push, Email, or SMS above — and make sure email/phone are set.',warn:true});return;}

    activeTimes.forEach(ts=>{
      const{h,m}=parseT(ts);
      const now2=new Date();const nxt=new Date(now2);
      nxt.setHours(h,m,0,0);if(nxt<=now2)nxt.setDate(nxt.getDate()+1);
      const delay=nxt-now2;
      const tid=setTimeout(async()=>{
        await fireAllChannels(ts);
        // Repeat every 24h
        const iv=setInterval(()=>fireAllChannels(ts),86400000);
        timerRef.current.push(iv);
      },delay);
      timerRef.current.push(tid);
    });

    LS.set('notif_times',activeTimes);
    LS.set('notif_email',notifEmail);
    LS.set('notif_phone',notifPhone);
    LS.set('notif_en',notifEn);
    setSaving(true);setTimeout(()=>setSaving(false),2000);

    const minStr=activeTimes.length===1?activeTimes[0]:`${activeTimes[0]} – ${activeTimes[activeTimes.length-1]}`;
    toast({icon:'✅',title:'Reminders scheduled!',body:`${activeTimes.length} time${activeTimes.length>1?'s':''} · Channels: ${enabledChannels.join(', ')}`});
  };

  // ── Test each channel individually ───────────────────────────
  const testPush=()=>{
    toast({icon:'🔔',title:'Test — Push Notification',body:`Ledgr has ${txns.filter(x=>!x.scheduled).length} transactions. Reminders will fire at your chosen times.`});
    if('Notification' in window&&Notification.permission==='granted'){try{new Notification('💰 Ledgr Test',{body:'Push notifications are working! ✓',tag:'ledgr-test'});}catch(e){}}
    setTS('push');setTimeout(()=>setTS(''),3000);
  };
  const testEmail=async()=>{
    const addr=notifEmail||user?.email;
    if(!addr){toast({icon:'❌',title:'No email set',body:'Enter your email below first.',err:true});return;}
    setTS('email');
    const res=await sendReminderEmail({toEmail:addr,toName:user?.name,remindTime:"Test",txns,currency:cur});
    if(res.ok)toast({icon:'mail',title:'Test email sent!',body:'Check '+addr+' for your beautiful reminder!'});
    else toast({icon:'warn',title:'Test failed',body:res.err||'Check EmailJS',warn:true});
    setTimeout(()=>setTS(''),4000);
  };
  const testSMS=()=>{
    const ph=notifPhone||user?.phone;
    if(!ph){toast({icon:'❌',title:'No phone set',body:'Enter your phone number below first.',err:true});return;}
    // SMS test
    sendViaSMS(ph,`[TEST] ${sms}`,'Test');
    setTS('sms');setTimeout(()=>setTS(''),3000);
  };

  const PRESET_T=['6:00 AM','7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM','6:00 PM','7:00 PM','8:00 PM','9:00 PM','10:00 PM'];
  const filtCur=CURRENCIES.filter(c=>`${c.code} ${c.name} ${c.symbol}`.toLowerCase().includes(curSearch.toLowerCase()));
  const filtLang=LANGUAGES.filter(l=>`${l.code} ${l.name}`.toLowerCase().includes(langSearch.toLowerCase()));

  const navItems=[{id:'profile',icon:'👤',l:t('profile')},{id:'goals',icon:'🎯',l:t('goals')},{id:'currency',icon:'💱',l:t('currency')},{id:'language',icon:'🌐',l:t('language')},{id:'notif',icon:'🔔',l:t('notifications')},{id:'theme',icon:'🎨',l:t('theme')},{id:'emailjs',icon:'⚙️',l:'EmailJS'},{id:'export',icon:'📤',l:t('export')},{id:'reset',icon:'⚠️',l:t('reset')}];

  return<div style={{color:'var(--text)',padding:'0 16px',paddingBottom:`calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 20px)`}}>
    {showReset&&<Confirm title="⚠️ Hard Reset" body="Delete ALL data: transactions, settings, goals, profile. This cannot be undone." ok="Reset All" danger onOk={()=>{onReset();setSR(false);toast({icon:'🗑️',title:'Reset complete',body:'All data wiped.',warn:true});}} onCancel={()=>setSR(false)}/>}

    <div style={{paddingTop:'var(--hdr)',marginBottom:12}}>
      <div style={{fontSize:26,fontWeight:900,letterSpacing:-.5}}>{t('settings')}</div>
    </div>
    {/* Nav pills */}
    <div style={{display:'flex',gap:8,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
      {navItems.map(p=><button key={p.id} onClick={()=>setSec(p.id)} style={{padding:'8px 14px',borderRadius:99,border:`1px solid ${sec===p.id?'var(--accent)':'var(--border)'}`,background:sec===p.id?'var(--a10)':'transparent',color:sec===p.id?'var(--accent)':'var(--muted)',fontSize:13,fontWeight:700,whiteSpace:'nowrap',flexShrink:0,transition:'all .15s'}}>{p.icon} {p.l}</button>)}
    </div>

    {/* PROFILE */}
    {sec==='profile'&&<div>
      <div style={{textAlign:'center',marginBottom:20}}>
        <div style={{width:80,height:80,borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),#c87010)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,fontWeight:900,color:'#000',margin:'0 auto 12px',boxShadow:'0 8px 28px var(--a20)'}}>
          {user?.name?user.name[0].toUpperCase():'$'}
        </div>
        <div style={{fontSize:19,fontWeight:800}}>{user?.name||'Set your name'}</div>
        <div style={{fontSize:13,color:'var(--sub)',marginTop:4}}>{user?.email||user?.phone||''}</div>
      </div>
      {user&&<div style={{background:'var(--card)',borderRadius:16,padding:'14px',border:'1px solid var(--border)',marginBottom:14}}>
        {user.email&&<div style={{display:'flex',gap:10,alignItems:'center',padding:'8px 0'}}><span style={{fontSize:18}}>📧</span><div><div style={{fontSize:13,fontWeight:700}}>{user.email}</div><div style={{fontSize:11,color:'var(--sub)'}}>Verified email</div></div></div>}
        {user.phone&&<div style={{display:'flex',gap:10,alignItems:'center',padding:'8px 0',borderTop:user.email?'1px solid var(--border)':'none'}}><span style={{fontSize:18}}>📱</span><div><div style={{fontSize:13,fontWeight:700}}>{user.phone}</div><div style={{fontSize:11,color:'var(--sub)'}}>Verified phone</div></div></div>}
      </div>}
      <button onClick={onLogout} style={{width:'100%',padding:'14px',borderRadius:14,border:'1px solid var(--border)',background:'var(--r10)',color:'var(--red)',fontSize:15,fontWeight:800}}>{t('logout')}</button>
    </div>}

    {/* GOALS */}
    {sec==='goals'&&<div>
      {[{l:t('budgetGoal'),icon:'💰',v:budgetGoal,s:onBudget,col:'var(--red)'},{l:t('incomeGoal'),icon:'🎯',v:incomeGoal,s:onIncome,col:'var(--green)'}].map((g,i)=><div key={i} style={{background:'var(--card)',borderRadius:18,padding:'16px',border:'1px solid var(--border)',marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>{g.icon} {g.l}</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:24,color:g.col,fontWeight:900}}>{CURRENCIES.find(c=>c.code===cur)?.symbol||'$'}</span><input value={g.v||''} type="number" min="0" onChange={e=>g.s(parseFloat(e.target.value)||0)} placeholder="e.g. 3000" style={{background:'none',border:'none',color:'var(--text)',fontSize:28,flex:1,outline:'none',fontWeight:900}}/></div>
      </div>)}
      <button onClick={()=>{LS.set('budget_goal',budgetGoal);LS.set('income_goal',incomeGoal);toast({icon:'✅',title:'Goals saved',body:'Updated on Home screen.'});}} style={{width:'100%',padding:'14px',borderRadius:14,border:'none',background:'var(--accent)',color:'#000',fontSize:15,fontWeight:800}}>{t('save')} Goals</button>
    </div>}

    {/* CURRENCY */}
    {sec==='currency'&&<div>
      <div style={{fontSize:13,color:'var(--sub)',marginBottom:14,lineHeight:1.5}}>Choose your display currency. All amounts will be formatted in this currency.</div>
      <input value={curSearch} onChange={e=>setCurSearch(e.target.value)} placeholder="Search currency…" style={{width:'100%',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:14,color:'var(--text)',fontSize:14,padding:'12px 16px',outline:'none',marginBottom:12}}/>
      <div style={{display:'flex',flexDirection:'column',gap:4}}>
        {filtCur.map(c=><button key={c.code} onClick={()=>{onCur(c.code);LS.set('currency',c.code);toast({icon:'💱',title:'Currency updated',body:`Now showing ${c.name} (${c.symbol})`});}} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',borderRadius:14,border:`1.5px solid ${cur===c.code?'var(--accent)':'var(--border)'}`,background:cur===c.code?'var(--a10)':'var(--card)',textAlign:'left',transition:'all .15s'}}>
          <div style={{width:42,height:42,borderRadius:10,background:'var(--card2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:800,flexShrink:0,color:'var(--accent)'}}>{c.symbol}</div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{c.name}</div><div style={{fontSize:12,color:'var(--sub)'}}>{c.code}</div></div>
          {cur===c.code&&<span style={{color:'var(--accent)',fontSize:18}}>✓</span>}
        </button>)}
      </div>
    </div>}

    {/* LANGUAGE */}
    {sec==='language'&&<div>
      <div style={{fontSize:13,color:'var(--sub)',marginBottom:14}}>Choose your display language. The UI will update immediately.</div>
      <input value={langSearch} onChange={e=>setLangSearch(e.target.value)} placeholder="Search language…" style={{width:'100%',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:14,color:'var(--text)',fontSize:14,padding:'12px 16px',outline:'none',marginBottom:12}}/>
      <div style={{display:'flex',flexDirection:'column',gap:4}}>
        {filtLang.map(l=><button key={l.code} onClick={()=>{onLang(l.code);LS.set('language',l.code);document.documentElement.dir=l.dir;document.documentElement.lang=l.code;toast({icon:'🌐',title:'Language updated',body:`Now in ${l.name}`});}} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',borderRadius:14,border:`1.5px solid ${lang===l.code?'var(--accent)':'var(--border)'}`,background:lang===l.code?'var(--a10)':'var(--card)',textAlign:'left',transition:'all .15s'}}>
          <div style={{fontSize:14,fontWeight:700,color:'var(--text)',flex:1}}>{l.name}</div>
          <div style={{fontSize:12,color:'var(--sub)',fontWeight:600}}>{l.code.toUpperCase()}</div>
          {lang===l.code&&<span style={{color:'var(--accent)',fontSize:18}}>✓</span>}
        </button>)}
      </div>
    </div>}

    {/* NOTIFICATIONS */}
    {sec==='notif'&&<div>

      {/* ── Step 1: Channels ── */}
      <div style={{background:'var(--card)',borderRadius:18,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:800,marginBottom:4,color:'var(--text)'}}>Step 1 — Choose Channels</div>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:14,lineHeight:1.5}}>All enabled channels fire at your reminder times simultaneously.</div>

        {/* Push */}
        <div style={{display:'flex',alignItems:'center',padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
          <div style={{width:40,height:40,borderRadius:12,background:notifEn.push?'var(--a10)':'var(--card2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,marginRight:12,flexShrink:0,border:`1px solid ${notifEn.push?'var(--accent)':'var(--border)'}`}}>📱</div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700}}>On-Screen Push</div>
            <div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>
              {notifPerm==='granted'?'✅ Browser permission granted':'⚠️ Permission required — tap Enable below'}
            </div>
          </div>
          <Tog on={notifEn.push} fn={()=>saveNE({...notifEn,push:!notifEn.push})}/>
        </div>
        {notifPerm!=='granted'&&notifEn.push&&<button onClick={async()=>{const p=await Notification.requestPermission();setNP(p);p==='granted'?toast({icon:'✅',title:'Push enabled!',body:'On-screen reminders will now fire.'}):toast({icon:'❌',title:'Blocked',body:'Go to device Settings → Browser → Notifications to allow.',err:true});}} style={{width:'100%',padding:'9px',borderRadius:10,border:'none',background:'var(--a10)',color:'var(--accent)',fontSize:13,fontWeight:800,margin:'8px 0 4px'}}>Enable Browser Notifications ↗</button>}

        {/* Email */}
        <div style={{padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',marginBottom:notifEn.email?10:0}}>
            <div style={{width:40,height:40,borderRadius:12,background:notifEn.email?'rgba(78,154,241,.15)':'var(--card2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,marginRight:12,flexShrink:0,border:`1px solid ${notifEn.email?'var(--blue)':'var(--border)'}`}}>📧</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700}}>Email Reminders</div>
              <div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>{notifEn.email?(notifEmail?`→ ${notifEmail}`:'Set email below'):'Opens your email app'}</div>
            </div>
            <Tog on={notifEn.email} fn={()=>saveNE({...notifEn,email:!notifEn.email})} col='var(--blue)'/>
          </div>
          {notifEn.email&&<div style={{background:'var(--card2)',borderRadius:12,padding:'10px 14px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:10,color:'var(--muted)',marginBottom:5,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>📧 Send reminders to this email</div>
            <input type="email" value={notifEmail} onChange={e=>{setNotifEmail(e.target.value);LS.set('notif_email',e.target.value);}} placeholder="your@email.com" style={{background:'none',border:'none',color:'var(--text)',fontSize:15,width:'100%',outline:'none'}}/>
          </div>}
        </div>

        {/* SMS */}
        <div style={{padding:'12px 0 4px'}}>
          <div style={{display:'flex',alignItems:'center',marginBottom:notifEn.sms?10:0}}>
            <div style={{width:40,height:40,borderRadius:12,background:notifEn.sms?'var(--g10)':'var(--card2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,marginRight:12,flexShrink:0,border:`1px solid ${notifEn.sms?'var(--green)':'var(--border)'}`}}>💬</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700}}>SMS Reminders</div>
              <div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>{notifEn.sms?(notifPhone?`→ ${notifPhone}`:'Set phone below'):'Opens your SMS app'}</div>
            </div>
            <Tog on={notifEn.sms} fn={()=>saveNE({...notifEn,sms:!notifEn.sms})} col='var(--green)'/>
          </div>
          {notifEn.sms&&<div style={{background:'var(--card2)',borderRadius:12,padding:'10px 14px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:10,color:'var(--muted)',marginBottom:5,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>💬 Send reminders to this number</div>
            <input type="tel" value={notifPhone} onChange={e=>{setNotifPhone(e.target.value);LS.set('notif_phone',e.target.value);}} placeholder="+1 (555) 000-0000" style={{background:'none',border:'none',color:'var(--text)',fontSize:15,width:'100%',outline:'none'}}/>
          </div>}
        </div>
      </div>

      {/* ── Step 2: Times ── */}
      <div style={{background:'var(--card)',borderRadius:18,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:800,marginBottom:4}}>Step 2 — Set Reminder Times</div>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:12,lineHeight:1.5}}>Pick preset times or type a custom one. All enabled channels fire at each time.</div>
        {/* Custom time */}
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <input type="time" value={customTime} onChange={e=>setCustom(e.target.value)} style={{flex:1,background:'var(--card2)',border:'1px solid var(--border)',borderRadius:10,color:'var(--text)',fontSize:14,padding:'9px 12px',outline:'none'}}/>
          <button onClick={addCustom} style={{padding:'9px 18px',borderRadius:10,border:'none',background:'var(--accent)',color:'#000',fontSize:13,fontWeight:800,whiteSpace:'nowrap'}}>+ Add</button>
        </div>
        {/* Active times as chips */}
        {activeTimes.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
          {activeTimes.map(ti=><div key={ti} style={{display:'flex',alignItems:'center',gap:4,background:'var(--a10)',border:'1px solid var(--accent)',borderRadius:20,padding:'5px 10px 5px 12px'}}>
            <span style={{fontSize:12,color:'var(--accent)',fontWeight:800}}>⏰ {ti}</span>
            <button onClick={()=>toggleTime(ti)} style={{background:'none',border:'none',color:'var(--muted)',fontSize:16,lineHeight:1,cursor:'pointer',marginLeft:4}}>×</button>
          </div>)}
        </div>}
        {activeTimes.length===0&&<div style={{textAlign:'center',padding:'12px',color:'var(--muted)',fontSize:13,marginBottom:8}}>No times selected — tap a preset below</div>}
        {/* Preset grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:14}}>
          {PRESET_T.map(ti=>{const on=activeTimes.includes(ti);return<button key={ti} onClick={()=>toggleTime(ti)} style={{padding:'9px 4px',borderRadius:10,border:`1px solid ${on?'var(--accent)':'var(--border)'}`,background:on?'var(--a10)':'transparent',color:on?'var(--accent)':'var(--muted)',fontSize:11,fontWeight:700,transition:'all .15s'}}>{on?'✓ ':''}{ti}</button>;})}
        </div>
        <button onClick={scheduleAll} style={{width:'100%',padding:'14px',borderRadius:13,border:'none',background:saving?'var(--green)':'var(--accent)',color:'#000',fontSize:15,fontWeight:800,transition:'all .25s',boxShadow:saving?'0 0 20px rgba(48,209,88,.3)':activeTimes.length?'0 4px 20px var(--a20)':'none'}}>
