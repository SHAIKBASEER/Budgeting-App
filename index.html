<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{
  height:100%;height:-webkit-fill-available;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:#0a0a10;color:#f0f0f8;
  padding-top:env(safe-area-inset-top,0px);
  padding-left:env(safe-area-inset-left,0px);
  padding-right:env(safe-area-inset-right,0px);
}
#root{
  height:100%;height:-webkit-fill-available;
  display:flex;flex-direction:column;
  overflow:hidden;
}
:root{
  --accent:#f5a623;--a10:rgba(245,166,35,.10);--a20:rgba(245,166,35,.20);
  --bg:#0a0a10;--card:#16161f;--card2:#1e1e2a;--card3:#252533;
  --text:#f0f0f8;--muted:#6e6e90;--muted2:#3a3a52;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --green:#30d158;--red:#ff453a;--blue:#4e9af1;
  --hero-a:#1a1630;--hero-b:#131220;
  --tabbar-h:60px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
  --screen-top:calc(env(safe-area-inset-top,0px) + 56px);
}
::-webkit-scrollbar{display:none}
input,select,textarea{-webkit-appearance:none;appearance:none}
input[type=date]{color-scheme:dark}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6) brightness(1.5);cursor:pointer}
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.6) brightness(1.5);cursor:pointer}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none}
/* Splash */
#splash{position:fixed;inset:0;z-index:9999;background:#0a0a10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .5s ease}
#splash.hide{opacity:0;pointer-events:none}
.sp-icon{font-size:64px;animation:sp-bounce .6s ease}
.sp-title{font-size:26px;font-weight:800;letter-spacing:-.5px}
.sp-sub{font-size:13px;color:#6e6e90}
.spinner{width:28px;height:28px;border-radius:50%;border:2.5px solid rgba(245,166,35,.2);border-top-color:#f5a623;animation:spin .7s linear infinite;margin-top:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes sp-bounce{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
/* Tablet layout */
@media(min-width:768px){
  :root{--tabbar-h:0px}
  #root{flex-direction:row}
  #sidebar{display:flex!important}
  #tabbar{display:none!important}
  .screen-wrap{padding-left:0!important}
}
</style>

  const s=document.documentElement.style;
  const pairs=[['--accent',th.accent],['--bg',th.bg],['--card',th.card],['--card2',th.card2],['--card3',th.card3||th.card2],['--text',th.text],['--muted',th.muted],['--muted2',th.muted2],['--hero-a',th.heroA],['--hero-b',th.heroB],['--border',th.isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.08)'],['--border2',th.isDark?'rgba(255,255,255,.12)':'rgba(0,0,0,.14)'],['--green',th.isDark?'#30d158':'#248a3d'],['--red',th.isDark?'#ff453a':'#d70015']];

  const hex=th.accent.replace('#','');
  const [r,g,b]=[0,2,4].map(i=>parseInt(hex.slice(i,i+2),16));

// Donut chart
function Donut({data,size=110}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return<div style={{width:size,height:size,borderRadius:'50%',background:'var(--card2)',display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'var(--muted)',fontSize:10}}>No data</span></div>;
  const r=44,cx=60,cy=60,sw=14,circ=2*Math.PI*r;let off=0;
  const slices=data.map((d,i)=>{const pct=d.value/total,dash=Math.max(circ*pct-1.5,0),gap=circ-dash;const sl=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={sw} strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-off+circ/4} strokeLinecap="butt"/>;off+=circ*pct;return sl;});
  return<svg width={size} height={size} viewBox="0 0 120 120"><circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--card2)" strokeWidth={sw}/>{slices}</svg>;
}

// Mini bar chart
function BarChart({weeks,height=100}){
  const maxV=Math.max(...weeks.flatMap(w=>[w.income,w.expense]),1);
  const bw=18,gap=10,left=4;
  const svgW=weeks.length*(bw*2+gap+8)+left;
  return<svg width="100%" height={height} viewBox={`0 0 ${svgW} ${height}`} preserveAspectRatio="xMidYMid meet">
    {weeks.map((w,i)=>{
      const x=left+i*(bw*2+gap+8);
      const ih=(w.income/maxV)*(height-22),eh=(w.expense/maxV)*(height-22);
      return<g key={i}>
        <rect x={x} y={height-22-ih} width={bw} height={Math.max(ih,2)} rx={4} fill="var(--green)" opacity={.85}/>
        <rect x={x+bw+3} y={height-22-eh} width={bw} height={Math.max(eh,2)} rx={4} fill="var(--red)" opacity={.85}/>
        <text x={x+bw} y={height-5} textAnchor="middle" fill="var(--muted)" fontSize={9} fontFamily="-apple-system">{w.label}</text>
      </g>;
    })}
  </svg>;
}

// Line chart
function LineChart({points,height=70}){
  if(points.length<2)return null;
  const vals=points.map(p=>p.y),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1,pad=8;
  const W=300;
  const pts=points.map((p,i)=>({x:pad+i*(W-pad*2)/(points.length-1),y:pad+(1-(p.y-mn)/rng)*(height-pad*2)}));
  const d=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const area=`${d} L${pts[pts.length-1].x},${height} L${pts[0].x},${height} Z`;
  return<svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--accent)" stopOpacity=".3"/><stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill="url(#lg)"/>
    <path d={d} fill="none" stroke="var(--accent)" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
    {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={2.5} fill="var(--accent)"/>)}
  </svg>;
}

// ─── BOTTOM SHEET (Add/Edit Transaction) ─────────────────────
function TxSheet({tx,onSave,onClose,defaultScheduled=false,toast}){
  const editing=!!tx;
  const [type,setType]=useState(tx?.type||'expense');
  const [amount,setAmt]=useState(tx?String(tx.amount):'');
  const [cat,setCat]=useState(tx?.category||'');
  const [note,setNote]=useState(tx?.note||'');
  const [date,setDate]=useState(tx?.date||todayStr());
  const [sched,setSched]=useState(tx?.scheduled||defaultScheduled);
  const [notify,setNotify]=useState(tx?.notifyWhenDue!==false);
  const cats=type==='income'?INC_CATS:EXP_CATS;
  const numKeys=[['7','8','9'],['4','5','6'],['1','2','3'],['.',  '0','⌫']];
  const tap=v=>{if(v==='⌫'){setAmt(a=>a.slice(0,-1));return;}if(v==='.'&&amount.includes('.'))return;if(amount.replace('.','').length>=9)return;setAmt(a=>a===''&&v==='.'?'0.':a+v);};
  const save=()=>{
    const n=parseFloat(amount);if(!n||n<=0){toast({icon:'⚠️',title:'Enter amount',body:'Please enter a valid amount.',type:'warn'});return;}
    if(!cat){toast({icon:'⚠️',title:'Pick category',body:'Please select a category.',type:'warn'});return;}
    onSave({...(tx||{}),id:tx?.id||Date.now(),type,amount:n,category:cat,note:note.trim(),date,scheduled:sched,notifyWhenDue:sched&&notify});

  };

          <button onClick={()=>setSched(!sched)} style={{padding:'6px 12px',borderRadius:10,border:`1px solid ${sched?'var(--accent)':'var(--border2)'}`,background:sched?'var(--a10)':'transparent',color:sched?'var(--accent)':'var(--muted)',fontSize:12,fontWeight:700}}>📅 {sched?'Scheduled':'Future'}</button>

      </div>
      {/* Amount */}
      <div style={{textAlign:'center',padding:'4px 16px 8px'}}>
        <div style={{fontSize:amount.length>8?36:52,fontWeight:900,letterSpacing:-2,color:amount?(type==='income'?'var(--green)':'var(--red)'):'var(--muted2)',minHeight:64,display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>{dispAmt}</div>

      </div>
      {/* Category */}
      <div style={{padding:'0 16px 12px'}}>
        <div style={{fontSize:11,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Category</div>
        <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(cats.length,5)},1fr)`,gap:6}}>
          {cats.map(c=><button key={c.id} onClick={()=>setCat(c.id)} style={{padding:'8px 4px',borderRadius:12,border:`1.5px solid ${cat===c.id?c.color:'var(--border)'}`,background:cat===c.id?c.color+'22':'var(--card2)',display:'flex',flexDirection:'column',alignItems:'center',gap:3,transition:'all .15s'}}>
            <span style={{fontSize:20}}>{c.icon}</span>
            <span style={{fontSize:9,color:cat===c.id?c.color:'var(--muted)',fontWeight:700,letterSpacing:.3}}>{c.label}</span>
          </button>)}
        </div>
      </div>
      {/* Note + Date */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'0 16px 12px'}}>
        <div style={{background:'var(--card2)',borderRadius:12,padding:'10px 14px',border:'1px solid var(--border)'}}>
          <div style={{fontSize:10,color:'var(--muted)',marginBottom:5,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Note</div>

        </div>

        <div><div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>🔔 Notify when due</div><div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Get reminded on the due date</div></div>
        <Toggle on={notify} onToggle={()=>setNotify(!notify)}/>
      </div>}
      {/* Save button */}
      <div style={{padding:'4px 16px 16px'}}>
        <button onClick={save} style={{width:'100%',padding:'16px',borderRadius:16,border:'none',background:!amount||!cat?'var(--card2)':'var(--accent)',color:!amount||!cat?'var(--muted)':'#000',fontSize:16,fontWeight:800,transition:'all .2s'}}>
          {editing?'Update Transaction':sched?'📅 Schedule':'✓ Save Transaction'}
        </button>
      </div>
    </div>
  </div>;
}

// ─── CHARTS SCREEN ────────────────────────────────────────────
function ChartsScreen({txns}){
  const now=new Date();
  const [vm,setVm]=useState(now.getMonth());
  const [vy,setVy]=useState(now.getFullYear());
  const navM=d=>{let m=vm+d,y=vy;if(m<0){m=11;y--;}if(m>11){m=0;y++;}setVm(m);setVy(y);};
  const live=txns.filter(t=>!t.scheduled);
  const mTxns=live.filter(t=>{const d=new Date(t.date+'T12:00:00');return d.getMonth()===vm&&d.getFullYear()===vy;});
  const income=mTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=mTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const weeks=['W1','W2','W3','W4'].map((label,wi)=>{const w=mTxns.filter(t=>Math.floor((new Date(t.date+'T12:00:00').getDate()-1)/7)===wi);return{label,income:w.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),expense:w.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)};});
  const catBreak=EXP_CATS.map(c=>({label:c.label,color:c.color,icon:c.icon,value:mTxns.filter(t=>t.type==='expense'&&t.category===c.id).reduce((s,t)=>s+t.amount,0)})).filter(c=>c.value>0).sort((a,b)=>b.value-a.value);
  const dim=new Date(vy,vm+1,0).getDate(),fd=new Date(vy,vm,1).getDay();
  const dayData=Array.from({length:dim},(_,i)=>{const day=i+1,dt=mTxns.filter(t=>new Date(t.date+'T12:00:00').getDate()===day);const inc=dt.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);const exp=dt.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);return{day,inc,exp,net:inc-exp,has:dt.length>0};});
  const sorted=[...mTxns].sort((a,b)=>new Date(a.date)-new Date(b.date));let run=0;
  const runPts=[{y:0},...sorted.map(t=>{run+=t.type==='income'?t.amount:-t.amount;return{y:run};})];

  return<div style={{color:'var(--text)',padding:'0 16px',paddingBottom:`calc(var(--tabbar-h) + env(safe-area-inset-bottom,0px) + 20px)`}}>
    <div style={{paddingTop:'var(--screen-top)',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{fontSize:26,fontWeight:800,letterSpacing:-.5}}>Charts</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button onClick={()=>navM(-1)} style={{background:'var(--card)',border:'1px solid var(--border)',color:'var(--text)',width:32,height:32,borderRadius:10,fontSize:16}}>‹</button>
        <div style={{fontSize:12,color:'var(--muted)',minWidth:96,textAlign:'center',fontWeight:700}}>{monthLabel(vy,vm)}</div>
        <button onClick={()=>navM(1)} style={{background:'var(--card)',border:'1px solid var(--border)',color:'var(--text)',width:32,height:32,borderRadius:10,fontSize:16}}>›</button>
      </div>
    </div>
    {/* Summary row */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>

// ─── HISTORY SCREEN ───────────────────────────────────────────
function HistoryScreen({txns,onEdit,onDelete,onAddScheduled,toast}){
  const now=new Date();
  const [view,setView]=useState('history'); // history | scheduled
  const [filter,setFilter]=useState('all'); // all | income | expense
  const [search,setSearch]=useState('');
  // Date range picker
  const [startDate,setStart]=useState('');
  const [endDate,setEnd]=useState('');
  const [editTx,setEditTx]=useState(null);
  const [delTx,setDelTx]=useState(null);
  const [showAddSched,setShowAddSched]=useState(false);

  const live=txns.filter(t=>!t.scheduled);
  const scheduled=txns.filter(t=>t.scheduled).sort((a,b)=>new Date(a.date)-new Date(b.date));

  // Filter logic
  const filtered=useMemo(()=>{
    let list=live;
    if(filter!=='all')list=list.filter(t=>t.type===filter);
    if(search.trim())list=list.filter(t=>(t.note||'').toLowerCase().includes(search.toLowerCase())||(t.category||'').toLowerCase().includes(search.toLowerCase()));
    if(startDate)list=list.filter(t=>t.date>=startDate);
    if(endDate)list=list.filter(t=>t.date<=endDate);
    return [...list].sort((a,b)=>new Date(b.date)-new Date(a.date));
  },[live,filter,search,startDate,endDate]);

  // Group by date
  const groups=useMemo(()=>{
    const g=[];
    filtered.forEach(t=>{const last=g[g.length-1];if(last&&last.date===t.date)last.items.push(t);else g.push({date:t.date,items:[t]});});
    return g;
  },[filtered]);

  const totalFiltered=filtered.reduce((s,t)=>t.type==='income'?s+t.amount:s-t.amount,0);
  const hasFilters=filter!=='all'||search||startDate||endDate;

  return<div style={{color:'var(--text)',padding:'0 16px',paddingBottom:`calc(var(--tabbar-h) + env(safe-area-inset-bottom,0px) + 20px)`}}>
    {editTx&&<TxSheet tx={editTx} onSave={t=>{onEdit(t);setEditTx(null);}} onClose={()=>setEditTx(null)} toast={toast}/>}
    {delTx&&<Confirm title="Delete Transaction" body={`Delete "${delTx.note||delTx.category}" (${fmt(delTx.amount)})? This can't be undone.`} confirmLabel="Delete" danger onOk={()=>{onDelete(delTx.id);setDelTx(null);}} onCancel={()=>setDelTx(null)}/>}
    {showAddSched&&<TxSheet onSave={t=>{onAddScheduled(t);setShowAddSched(false);}} onClose={()=>setShowAddSched(false)} defaultScheduled toast={toast}/>}

    <div style={{paddingTop:'var(--screen-top)',marginBottom:12}}>
      <div style={{fontSize:26,fontWeight:800,letterSpacing:-.5,marginBottom:12}}>History</div>
      {/* View tabs */}
      <div style={{display:'flex',background:'var(--card2)',borderRadius:14,padding:4,gap:4,marginBottom:12}}>
        <button onClick={()=>setView('history')} style={{flex:1,padding:'9px',borderRadius:10,border:'none',background:view==='history'?'var(--card)':'transparent',color:view==='history'?'var(--text)':'var(--muted)',fontSize:13,fontWeight:700,transition:'all .18s'}}>📋 Transactions</button>
        <button onClick={()=>setView('scheduled')} style={{flex:1,padding:'9px',borderRadius:10,border:'none',background:view==='scheduled'?'var(--card)':'transparent',color:view==='scheduled'?'var(--text)':'var(--muted)',fontSize:13,fontWeight:700,transition:'all .18s',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          📅 Scheduled {scheduled.length>0&&<span style={{background:'var(--accent)',color:'#000',borderRadius:8,padding:'1px 7px',fontSize:10,fontWeight:800}}>{scheduled.length}</span>}
        </button>
      </div>
    </div>

    {/* ── HISTORY VIEW ── */}
    {view==='history'&&<div>
      {/* Search */}
      <div style={{background:'var(--card)',borderRadius:14,padding:'10px 14px',border:'1px solid var(--border)',marginBottom:10,display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:16,color:'var(--muted)'}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search transactions…" style={{background:'none',border:'none',color:'var(--text)',fontSize:14,flex:1,outline:'none'}}/>
        {search&&<button onClick={()=>setSearch('')} style={{background:'none',border:'none',color:'var(--muted)',fontSize:18,lineHeight:1,cursor:'pointer'}}>×</button>}
      </div>
      {/* Date range picker */}
      <div style={{background:'var(--card)',borderRadius:14,padding:'12px 14px',border:'1px solid var(--border)',marginBottom:10}}>
        <div style={{fontSize:11,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>📅 Filter by date range</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div>
            <div style={{fontSize:10,color:'var(--muted)',marginBottom:4}}>From</div>
            <input type="date" value={startDate} onChange={e=>setStart(e.target.value)} style={{width:'100%',background:'var(--card2)',border:'1px solid var(--border)',borderRadius:10,color:'var(--text)',fontSize:13,padding:'8px 10px',outline:'none'}}/>
          </div>
          <div>
            <div style={{fontSize:10,color:'var(--muted)',marginBottom:4}}>To</div>
            <input type="date" value={endDate} onChange={e=>setEnd(e.target.value)} style={{width:'100%',background:'var(--card2)',border:'1px solid var(--border)',borderRadius:10,color:'var(--text)',fontSize:13,padding:'8px 10px',outline:'none'}}/>
          </div>
        </div>
        {(startDate||endDate)&&<button onClick={()=>{setStart('');setEnd('');}} style={{marginTop:8,background:'none',border:'none',color:'var(--accent)',fontSize:12,fontWeight:700,cursor:'pointer'}}>✕ Clear dates</button>}
      </div>
      {/* Type filters */}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        {['all','income','expense'].map(f=><Pill key={f} active={filter===f} onPress={()=>setFilter(f)} color={f==='income'?'var(--green)':f==='expense'?'var(--red)':undefined}>{f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1)}</Pill>)}
      </div>
      {/* Stats bar */}
      {filtered.length>0&&<div style={{background:'var(--card)',borderRadius:12,padding:'10px 14px',border:'1px solid var(--border)',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:12,color:'var(--muted)'}}>{filtered.length} transaction{filtered.length!==1?'s':''}{hasFilters?' found':''}</span>
        <span style={{fontSize:13,fontWeight:700,color:totalFiltered>=0?'var(--green)':'var(--red)'}}>{totalFiltered>=0?'+':''}{fmt(totalFiltered)}</span>
      </div>}
      {/* Groups */}
      {groups.length===0&&<div style={{textAlign:'center',marginTop:60,color:'var(--muted)'}}><div style={{fontSize:44,marginBottom:12}}>🔍</div><div style={{fontSize:16,fontWeight:700,marginBottom:4}}>No transactions found</div><div style={{fontSize:13}}>Try adjusting your filters or date range</div></div>}
      {groups.map(g=>(
        <div key={g.date} style={{marginBottom:16}}>
          <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,fontWeight:700,marginBottom:6}}>{dayStr(g.date)}</div>
          <Card style={{padding:'4px 0'}}>
            {g.items.map((t,i)=>{
              const cat=getCat(t.type,t.category);
              return<div key={t.id} style={{display:'flex',alignItems:'center',padding:'12px 14px',borderBottom:i<g.items.length-1?'1px solid var(--border)':'none'}}>
                <div style={{width:38,height:38,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:12,flexShrink:0}}>{cat.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.note||cat.label}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{cat.label}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontSize:15,fontWeight:800,color:t.type==='income'?'var(--green)':'var(--red)'}}>{t.type==='income'?'+':'-'}{fmt(t.amount)}</div>
                  <div style={{display:'flex',gap:10,marginTop:4,justifyContent:'flex-end'}}>
                    <button onClick={()=>setEditTx(t)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:11,fontWeight:700,cursor:'pointer',padding:0}}>edit</button>
                    <button onClick={()=>setDelTx(t)} style={{background:'none',border:'none',color:'var(--muted2)',fontSize:11,fontWeight:700,cursor:'pointer',padding:0}}>delete</button>
                  </div>
                </div>
              </div>;
            })}
          </Card>
        </div>
      ))}
    </div>}

    {/* ── SCHEDULED VIEW ── */}
    {view==='scheduled'&&<div>
      <button onClick={()=>setShowAddSched(true)} style={{width:'100%',padding:'14px',borderRadius:14,border:'1.5px dashed var(--accent)',background:'var(--a10)',color:'var(--accent)',fontSize:14,fontWeight:800,marginBottom:14,cursor:'pointer'}}>+ Add Scheduled Transaction</button>
      {scheduled.length===0&&<div style={{textAlign:'center',marginTop:40,color:'var(--muted)'}}><div style={{fontSize:44,marginBottom:12}}>📅</div><div style={{fontSize:16,fontWeight:700}}>No scheduled transactions</div></div>}
      {scheduled.map(t=>{
        const cat=getCat(t.type,t.category);
        const days=Math.ceil((new Date(t.date)-new Date())/(864e5));
        const isPast=days<0;const isUrgent=days>=0&&days<=3;
        return<Card key={t.id} style={{marginBottom:10,padding:'14px 16px',border:`1px solid ${isPast?'rgba(255,68,58,.3)':isUrgent?'rgba(245,166,35,.3)':'var(--border)'}`}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:42,height:42,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{cat.icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.note||cat.label}</div>
              <div style={{fontSize:12,color:isPast?'var(--red)':isUrgent?'var(--accent)':'var(--muted)',marginTop:2,fontWeight:isPast||isUrgent?700:400}}>{dayStr(t.date)} · {isPast?'⚠️ Overdue':days===0?'Due today':days===1?'Due tomorrow':`in ${days} days`}</div>
              {t.notifyWhenDue&&<div style={{fontSize:11,color:'var(--accent)',marginTop:2}}>🔔 Notify on due date</div>}
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:16,fontWeight:800,color:t.type==='income'?'var(--green)':'var(--red)'}}>{t.type==='income'?'+':'-'}{fmt(t.amount)}</div>
              <div style={{display:'flex',gap:10,marginTop:6,justifyContent:'flex-end'}}>
                <button onClick={()=>setEditTx(t)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:12,fontWeight:700,cursor:'pointer',padding:0}}>edit</button>
                <button onClick={()=>setDelTx(t)} style={{background:'none',border:'none',color:'var(--red)',fontSize:12,fontWeight:700,cursor:'pointer',padding:0}}>delete</button>
              </div>
            </div>
          </div>
        </Card>;
      })}
    </div>}
  </div>;
}

// ─── SETTINGS SCREEN ─────────────────────────────────────────
function SettingsScreen({profile,onProfile,theme,onTheme,txns,onReset,toast,budgetGoal,incomeGoal,onBudget,onIncome}){
  const [sec,setSec]=useState('profile');
  const [notifEn,setNE]=useState(()=>S.get('notif_en',{push:true,email:false,sms:false}));
  const [activeTimes,setAT]=useState(()=>S.get('notif_times',['9:00 AM','6:00 PM']));
  const [customTime,setCustom]=useState('');
  const [emailAddr,setEmail]=useState(()=>S.get('notif_email','')||'');
  const [phoneNum,setPhone]=useState(()=>S.get('notif_phone','')||'');
  const [notifPerm,setNP]=useState(()=>'Notification' in window?Notification.permission:'denied');
  const [testSent,setTS]=useState('');
  const [showReset,setShowReset]=useState(false);
  const [saving,setSaving]=useState(false);
  const timersRef=useRef([]);

  const saveNE=v=>{setNE(v);S.set('notif_en',v);};
  const toggleTime=t=>{const next=activeTimes.includes(t)?activeTimes.filter(r=>r!==t):[...activeTimes,t].sort((a,b)=>{const pa=parseTimeStr(a),pb=parseTimeStr(b);return(pa.h*60+pa.m)-(pb.h*60+pb.m);});setAT(next);S.set('notif_times',next);};

  const addCustomTime=()=>{
    if(!customTime)return;
    // Convert HH:MM to 12h format
    const [h,m]=customTime.split(':').map(Number);
    const ap=h>=12?'PM':'AM';const hr=h%12||12;
    const label=`${hr}:${String(m).padStart(2,'0')} ${ap}`;
    if(!activeTimes.includes(label)){const next=[...activeTimes,label].sort((a,b)=>{const pa=parseTimeStr(a),pb=parseTimeStr(b);return(pa.h*60+pa.m)-(pb.h*60+pb.m);});setAT(next);S.set('notif_times',next);}
    setCustom('');
  };

  const requestPush=async()=>{
    if(!('Notification' in window)){toast({icon:'❌',title:'Not supported',body:'Push notifications not supported here.',type:'error'});return;}
    const p=await Notification.requestPermission();setNP(p);
    if(p==='granted'){toast({icon:'🔔',title:'Push enabled!',body:'You will receive on-screen reminders.'});saveNE({...notifEn,push:true});}
    else toast({icon:'❌',title:'Blocked',body:'Allow notifications in browser/device Settings.',type:'error'});
  };

  const fireNotif=(title,body)=>{
    // On-screen toast always works
    toast({icon:'🔔',title,body});
    // Real push if granted
    if('Notification' in window&&Notification.permission==='granted'){
      try{new Notification(`💰 ${title}`,{body,tag:'budget-reminder',icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💰</text></svg>'});}catch(e){}
    }
  };

  const scheduleReminders=()=>{
    // Clear existing
    timersRef.current.forEach(clearTimeout);timersRef.current=[];
    if(!activeTimes.length){toast({icon:'⚠️',title:'No times selected',body:'Pick at least one reminder time.',type:'warn'});return;}
    let scheduled=0;
    activeTimes.forEach(timeStr=>{
      const {h,m}=parseTimeStr(timeStr);
      const now=new Date();const next=new Date(now);
      next.setHours(h,m,0,0);
      if(next<=now)next.setDate(next.getDate()+1);
      const delay=next-now;
      const tid=setTimeout(()=>{
        fireNotif('Budget Reminder',`It's ${timeStr} — time to log your transactions! 💰`);
        // Re-schedule for next day
        const dayMs=24*60*60*1000;
        const recurring=()=>{fireNotif('Budget Reminder',`It's ${timeStr} — log your expenses!`);};
        const interval=setInterval(recurring,dayMs);
        timersRef.current.push(interval);
      },delay);
      timersRef.current.push(tid);
      scheduled++;
    });
    S.set('notif_times',activeTimes);
    setSaving(true);setTimeout(()=>setSaving(false),2000);
    toast({icon:'✅',title:'Reminders activated!',body:`${scheduled} daily reminder${scheduled!==1?'s':''}: ${activeTimes.join(', ')}`});
  };

  const testPush=()=>{
    fireNotif('Test Reminder',`Budget App is working! You have ${txns.filter(t=>!t.scheduled).length} transactions logged.`);
    setTS('push');setTimeout(()=>setTS(''),3000);
  };
  const testEmail=()=>{
    const addr=emailAddr||profile.email;
    if(!addr){toast({icon:'❌',title:'No email set',body:'Enter email in Profile tab.',type:'error'});return;}
    window.open(`mailto:${addr}?subject=${encodeURIComponent('Budget App Test Reminder')}&body=${encodeURIComponent(`Hi ${profile.name||'there'},\n\nThis is your Budget App reminder!\n\nScheduled times: ${activeTimes.join(', ')}\n\nStay on budget! 💰`)}`);
    toast({icon:'📧',title:'Opening mail',body:`Sending test to ${addr}`});setTS('email');setTimeout(()=>setTS(''),3000);
  };
  const testSMS=()=>{
    const ph=phoneNum||profile.phone;
    if(!ph){toast({icon:'❌',title:'No phone set',body:'Enter phone in Profile tab.',type:'error'});return;}
    window.open(`sms:${ph}?body=${encodeURIComponent('Budget App Reminder: Time to log your transactions! 💰')}`);
    toast({icon:'💬',title:'Opening SMS',body:`Sending to ${ph}`});setTS('sms');setTimeout(()=>setTS(''),3000);
  };

  const PRESET_TIMES=['6:00 AM','7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM','6:00 PM','7:00 PM','8:00 PM','9:00 PM','10:00 PM'];

  const navPills=[{id:'profile',icon:'👤',label:'Profile'},{id:'goals',icon:'🎯',label:'Goals'},{id:'notif',icon:'🔔',label:'Alerts'},{id:'theme',icon:'🎨',label:'Theme'},{id:'export',icon:'📤',label:'Export'},{id:'reset',icon:'⚠️',label:'Reset'}];

  return<div style={{color:'var(--text)',padding:'0 16px',paddingBottom:`calc(var(--tabbar-h) + env(safe-area-inset-bottom,0px) + 20px)`}}>
    {showReset&&<Confirm title="⚠️ Hard Reset" body="Delete ALL data — transactions (including demo), settings, goals, profile. You'll start completely fresh. This cannot be undone." confirmLabel="Reset Everything" danger onOk={()=>{onReset();setShowReset(false);toast({icon:'🗑️',title:'Reset complete',body:'All data wiped. Start adding your own!',type:'warn'});}} onCancel={()=>setShowReset(false)}/>}
    <div style={{paddingTop:'var(--screen-top)',marginBottom:12}}>
      <div style={{fontSize:26,fontWeight:800,letterSpacing:-.5}}>Settings</div>
    </div>
    {/* Section pills */}
    <div style={{display:'flex',gap:8,marginBottom:16,overflowX:'auto',paddingBottom:4,msOverflowStyle:'none',scrollbarWidth:'none'}}>
      {navPills.map(p=><button key={p.id} onClick={()=>setSec(p.id)} style={{padding:'8px 14px',borderRadius:99,border:`1px solid ${sec===p.id?'var(--accent)':'var(--border)'}`,background:sec===p.id?'var(--a10)':'transparent',color:sec===p.id?'var(--accent)':'var(--muted)',fontSize:13,fontWeight:700,whiteSpace:'nowrap',flexShrink:0,transition:'all .15s'}}>{p.icon} {p.label}</button>)}
    </div>

    {/* ── PROFILE ── */}
    {sec==='profile'&&<div>
      <div style={{textAlign:'center',marginBottom:20}}>
        <div style={{width:76,height:76,borderRadius:'50%',background:'var(--a10)',border:'2px solid var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 10px'}}>{profile.name?profile.name[0].toUpperCase():'👤'}</div>
        <div style={{fontSize:18,fontWeight:800}}>{profile.name||'Set your name'}</div>
      </div>
      {[{k:'name',label:'Full Name',icon:'👤',ph:'Your name',type:'text'},{k:'email',label:'Email',icon:'📧',ph:'your@email.com',type:'email'},{k:'phone',label:'Phone (SMS)',icon:'📱',ph:'+1 (555) 000-0000',type:'tel'}].map(f=>(

          const sorted=[...txns].filter(t=>!t.scheduled).sort((a,b)=>new Date(b.date)-new Date(a.date));
          const bal=sorted.reduce((s,t)=>t.type==='income'?s+t.amount:s-t.amount,0);
          const inc=sorted.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
          const exp=sorted.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
          const rows=sorted.slice(0,100).map(t=>`<tr><td>${new Date(t.date+'T12:00:00').toLocaleDateString()}</td><td>${t.note||t.category}</td><td style="color:${t.type==='income'?'#1a8a3d':'#c0392b'};font-weight:700">${t.type==='income'?'+':'-'}${fmt(t.amount)}</td><td style="text-transform:capitalize">${t.category}</td></tr>`).join('');
          const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Budget Report</title><style>body{font-family:-apple-system,sans-serif;padding:40px;color:#1c1c1e}h1{font-size:28px;margin:0 0 4px}h2{font-size:15px;color:#888;font-weight:400;margin:0 0 28px}.row{display:flex;gap:20px;margin-bottom:28px}.box{background:#f5f5fa;border-radius:12px;padding:14px 18px}.box .l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}.box .v{font-size:22px;font-weight:800}table{width:100%;border-collapse:collapse}th{background:#f5f5fa;text-align:left;padding:10px 12px;font-size:12px;color:#888}td{padding:10px 12px;border-bottom:1px solid #eee;font-size:13px}.foot{margin-top:30px;font-size:12px;color:#aaa;text-align:center}</style></head><body><h1>Budget Report</h1><h2>${profile.name||'Personal'} · ${new Date().toLocaleString('default',{month:'long',year:'numeric'})}</h2><div class="row"><div class="box"><div class="l">Net Balance</div><div class="v" style="color:${bal>=0?'#1a8a3d':'#c0392b'}">${bal<0?'-':''}${fmt(Math.abs(bal))}</div></div><div class="box"><div class="l">Total Income</div><div class="v" style="color:#1a8a3d">${fmt(inc)}</div></div><div class="box"><div class="l">Total Expenses</div><div class="v" style="color:#c0392b">${fmt(exp)}</div></div></div><table><thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Category</th></tr></thead><tbody>${rows}</tbody></table><div class="foot">Generated ${new Date().toLocaleString()} · Budget App</div><script>window.onload=()=>window.print()<\/script></body></html>`;
          const w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}
        }} style={{width:'100%',padding:'12px',borderRadius:12,border:'none',background:'var(--accent)',color:'#000',fontSize:14,fontWeight:800}}>Generate PDF Report</button>
      </Card>

// ─── ROOT APP ────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState(()=>S.get('budget_tab',0));
  const [txns,setTxns]=useState(()=>{
    const stored=S.get('budget_txns',null);
    if(stored===null)return SEED; // First ever visit
    return stored;
  });
  const [profile,setProfile]=useState(()=>S.get('budget_profile',{name:'',email:'',phone:''}));
  const [theme,setTheme]=useState(()=>{const t=S.get('budget_theme',null);return t?t:THEMES[0];});
  const [budgetGoal,setBudget]=useState(()=>S.get('budget_goal',3000));
  const [incomeGoal,setIncome]=useState(()=>S.get('income_goal',5000));
  const [toasts,setToasts]=useState([]);
  const [showAdd,setShowAdd]=useState(false);
  const [showSched,setShowSched]=useState(false);
  const [notifBanner,setNotifBanner]=useState(()=>'Notification' in window&&Notification.permission==='default');

  useEffect(()=>{applyTheme(theme);},[theme]);
  useEffect(()=>{S.set('budget_tab',tab);},[tab]);
  useEffect(()=>{S.set('budget_txns',txns);},[txns]);
  useEffect(()=>{S.set('budget_profile',profile);},[profile]);

  // Splash hide
  useEffect(()=>{
    setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),500);}},1000);
  },[]);

  // SW
  useEffect(()=>{'serviceWorker' in navigator&&navigator.serviceWorker.register('./sw.js').catch(()=>{});},[]);

  // Check upcoming scheduled transactions
  useEffect(()=>{
    const check=()=>{
      const now=new Date();now.setHours(0,0,0,0);
      txns.filter(t=>t.scheduled&&t.notifyWhenDue).forEach(t=>{
        const due=new Date(t.date+'T12:00:00');due.setHours(0,0,0,0);
        const diff=Math.round((due-now)/864e5);
        if(diff===0||diff===1){
          const key=`shown_${t.id}_${todayStr()}`;
          if(!sessionStorage.getItem(key)){
            sessionStorage.setItem(key,'1');
            const cat=getCat(t.type,t.category);
            addToast({icon:cat.icon,title:diff===0?'Due Today!':'Due Tomorrow',body:`${t.note||cat.label}: ${t.type==='income'?'+':'-'}${fmt(t.amount)}`,type:diff===0?'warn':'info'});
            if('Notification' in window&&Notification.permission==='granted'){
              try{new Notification(`📅 ${diff===0?'Due Today':'Due Tomorrow'}`,{body:`${t.note||cat.label}: ${fmt(t.amount)}`,tag:`sched-${t.id}`});}catch(e){}
            }
          }
        }
      });
    };
    check();
    const iv=setInterval(check,60000);
    return()=>clearInterval(iv);
  },[txns]);

  const addToast=useCallback(t=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p.slice(-2),{...t,id}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),5000);
  },[]);

  const handleTheme=th=>{setTheme(th);S.set('budget_theme',th);applyTheme(th);};
  const handleBudget=v=>{setBudget(v);S.set('budget_goal',v);};
  const handleIncome=v=>{setIncome(v);S.set('income_goal',v);};

  const addTx=tx=>{setTxns(p=>[tx,...p]);addToast({icon:getCat(tx.type,tx.category).icon,title:'Transaction saved',body:`${tx.type==='income'?'+':'-'}${fmt(tx.amount)} · ${tx.note||tx.category}`});};
  const editTx=tx=>{setTxns(p=>p.map(t=>t.id===tx.id?tx:t));addToast({icon:'✏️',title:'Updated',body:`${tx.note||tx.category} updated.`});};
  const delTx=id=>{setTxns(p=>p.filter(t=>t.id!==id));addToast({icon:'🗑️',title:'Deleted',body:'Transaction removed.'});};

  const hardReset=()=>{
    ['budget_txns','budget_profile','budget_theme','budget_tab','notif_en','notif_times','notif_email','notif_phone','budget_goal','income_goal'].forEach(k=>S.del(k));
    S.set('budget_txns',[]);S.set('budget_goal',0);S.set('income_goal',0);
    setTxns([]);setProfile({name:'',email:'',phone:''});setTheme(THEMES[0]);applyTheme(THEMES[0]);setBudget(0);setIncome(0);setTab(0);
  };

  const isTablet=window.innerWidth>=768;

  return<>
    <ToastBar toasts={toasts}/>
    {showAdd&&<TxSheet onSave={addTx} onClose={()=>setShowAdd(false)} toast={addToast}/>}
    {showSched&&<TxSheet onSave={addTx} onClose={()=>setShowSched(false)} defaultScheduled toast={addToast}/>}

    {/* Tablet sidebar */}
    <div id="sidebar" style={{display:'none',width:220,flexShrink:0,background:'var(--card)',borderRight:'1px solid var(--border)',flexDirection:'column',paddingTop:`calc(var(--safe-top) + 20px)`,paddingBottom:20}}>
      <div style={{padding:'0 20px 24px',borderBottom:'1px solid var(--border)'}}>
        <div style={{fontSize:22,fontWeight:900,letterSpacing:-.5}}>💰 Budget</div>
        <div style={{fontSize:12,color:'var(--muted)',marginTop:3}}>Personal Finance</div>
      </div>
      <div style={{flex:1,padding:'12px 8px'}}>
        {TABS.map((name,i)=><button key={i} onClick={()=>setTab(i)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderRadius:12,border:'none',background:tab===i?'var(--a10)':'transparent',color:tab===i?'var(--accent)':'var(--muted)',fontSize:14,fontWeight:700,marginBottom:4,transition:'all .15s',textAlign:'left'}}>
          {Icons[name](tab===i)}<span>{name}</span>
        </button>)}
      </div>
    </div>

    {/* Main content */}
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
      {/* Notification banner */}
      {notifBanner&&<div style={{background:'var(--card2)',borderBottom:'1px solid var(--border)',padding:'10px 16px',display:'flex',alignItems:'center',gap:10,flexShrink:0,zIndex:200}}>
        <span style={{fontSize:20}}>🔔</span>
        <div style={{flex:1,fontSize:12,color:'var(--muted)',lineHeight:1.4}}>Enable notifications to never miss a reminder</div>
        <button onClick={async()=>{const p=await Notification.requestPermission();setNotifBanner(false);if(p==='granted')addToast({icon:'🔔',title:'Notifications on',body:'You\'ll receive daily reminders.'});}} style={{padding:'7px 14px',borderRadius:10,background:'var(--accent)',border:'none',color:'#000',fontWeight:800,fontSize:12,whiteSpace:'nowrap'}}>Allow</button>
        <button onClick={()=>setNotifBanner(false)} style={{background:'none',border:'none',color:'var(--muted)',fontSize:22,lineHeight:1,cursor:'pointer'}}>×</button>
      </div>}

      {/* Screen */}
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {tab===0&&<HomeScreen txns={txns} onNav={setTab} onAdd={()=>setShowAdd(true)} onSchedule={()=>setShowSched(true)} userName={profile.name} budgetGoal={budgetGoal} incomeGoal={incomeGoal}/>}
        {tab===1&&<div style={{color:'var(--text)',padding:`calc(var(--screen-top) + 0px) 16px`,paddingBottom:`calc(var(--tabbar-h) + env(safe-area-inset-bottom,0px) + 20px)`}}>
          <div style={{fontSize:26,fontWeight:800,letterSpacing:-.5,marginBottom:20}}>Add</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
            {[{icon:'➕',title:'Add Now',sub:'Record income or expense',accent:false,fn:()=>{setShowAdd(true);}},{icon:'📅',title:'Schedule',sub:'Plan a future transaction',accent:true,fn:()=>{setShowSched(true);}}].map((b,i)=>(
              <button key={i} onClick={b.fn} style={{padding:'20px 16px',borderRadius:20,border:`1.5px solid ${b.accent?'var(--accent)':'var(--border)'}`,background:b.accent?'var(--a10)':'var(--card)',display:'flex',flexDirection:'column',alignItems:'center',gap:8,textAlign:'center'}}>
                <span style={{fontSize:32}}>{b.icon}</span>
                <div style={{fontSize:14,fontWeight:800,color:b.accent?'var(--accent)':'var(--text)'}}>{b.title}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>{b.sub}</div>
              </button>
            ))}
          </div>
          {/* Recent quick reference */}
          <Card style={{padding:'4px 0'}}>
            <div style={{padding:'10px 16px 4px',fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Recent</div>
            {txns.filter(t=>!t.scheduled).slice(0,5).map((t,i,arr)=>{const cat=getCat(t.type,t.category);return(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 16px',borderBottom:i<arr.length-1?'1px solid var(--border)':'none'}}>
                <div style={{width:34,height:34,borderRadius:10,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>{cat.icon}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{t.note||cat.label}</div><div style={{fontSize:11,color:'var(--muted)'}}>{dayStr(t.date)}</div></div>
                <div style={{fontSize:14,fontWeight:800,color:t.type==='income'?'var(--green)':'var(--red)'}}>{t.type==='income'?'+':'-'}{fmt(t.amount)}</div>
              </div>
            );})}
          </Card>
        </div>}
        {tab===2&&<ChartsScreen txns={txns}/>}
        {tab===3&&<HistoryScreen txns={txns} onEdit={editTx} onDelete={delTx} onAddScheduled={addTx} toast={addToast}/>}
        {tab===4&&<SettingsScreen profile={profile} onProfile={setProfile} theme={theme} onTheme={handleTheme} txns={txns} onReset={hardReset} toast={addToast} budgetGoal={budgetGoal} incomeGoal={incomeGoal} onBudget={handleBudget} onIncome={handleIncome}/>}
      </div>

      {/* Tab bar */}
      <div id="tabbar" style={{flexShrink:0,background:'var(--card)',borderTop:'0.5px solid var(--border)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',paddingTop:8,paddingBottom:`calc(8px + env(safe-area-inset-bottom,0px))`,display:'flex',justifyContent:'space-around',alignItems:'center',zIndex:100}}>
        {TABS.map((name,i)=><button key={i} onClick={()=>setTab(i)} style={{background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 12px',borderRadius:12,opacity:tab===i?1:.45,transition:'opacity .18s',minWidth:52}}>
          {Icons[name](tab===i)}
          <span style={{fontSize:9,color:tab===i?'var(--accent)':'var(--muted)',fontWeight:700,letterSpacing:.3}}>{name.toUpperCase()}</span>
        </button>)}
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
