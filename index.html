    const ac=x.type==='income'?'#059669':'#dc2626';
    return '<tr style="border-bottom:1px solid #fde68a">'
      +'<td style="padding:10px 0;width:32px;font-size:20px;vertical-align:middle">'+ct.icon+'</td>'
      +'<td style="padding:10px 6px;vertical-align:middle">'

      +'<p style="margin:0;font-size:12px;color:#92400e">'+ct.label+' &middot; '+dl2+'</p></td>'
      +'<td style="padding:10px 0;text-align:right;font-size:14px;font-weight:700;color:'+ac+';vertical-align:middle">'+(x.type==='income'?'+':'-')+fmtAmt(x.amount,currency)+'</td></tr>';
  }).join(''):'<tr><td colspan="3" style="padding:10px 0;font-size:13px;color:#9ca3af">No upcoming scheduled transactions</td></tr>';
  const subj='LedgrTrack Reminder - '+remindTime+', '+ml;
  const body='<h1 style="margin:0 0 6px;font-size:24px;font-weight:900;color:#1f2937">Hi '+(toName||'there')+' &#x1F44B;</h1>'
    +'<p style="margin:0 0 24px;font-size:15px;color:#4b5563;line-height:1.7">Time to log transactions! It is <strong>'+remindTime+'</strong> &mdash; stay on budget for <strong>'+ml+'</strong>.</p>'
    +'<table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:16px"><tr>'
    +'<td style="background:#f9fafb;border-radius:16px;padding:22px;border:1px solid #f3f4f6">'
    +'<p style="margin:0 0 16px;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:1.5px">&#x1F4CA; '+ml+'</p>'
    +'<table width="100%" cellpadding="0" cellspacing="0" border="0">'
    +sRow('&#x1F49A;','Income',fmtAmt(mi,currency),'#059669')
    +sRow('&#x2764;&#xFE0F;','Expenses',fmtAmt(me,currency),'#dc2626')
    +sRow('&#x1F4C8;','Net This Month',fmtNet(net,currency),net>=0?'#059669':'#dc2626')
    +'<tr><td style="padding:10px 0 6px;font-size:15px;font-weight:700;color:#1f2937">&#x1F4B0; Total Balance</td>'
    +'<td style="padding:10px 0 6px;text-align:right;font-size:20px;font-weight:900;color:'+(bal>=0?'#059669':'#dc2626')+'">'+fmtNet(bal,currency)+'</td></tr>'
    +'</table>'
    +'<table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:6px">'
    +'<tr><td style="padding-bottom:6px"><table width="100%" cellpadding="0" cellspacing="0" border="0"><tr>'
    +'<td style="font-size:12px;color:#6b7280">&#x1F4CB; '+mn.length+' transaction'+(mn.length!==1?'s':'')+' logged</td>'
    +'<td style="text-align:right;font-size:12px;color:'+pc+';font-weight:700">'+pct+'% of income spent</td>'
    +'</tr></table></td></tr>'
    +'<tr><td style="background:#e5e7eb;border-radius:99px;height:8px;overflow:hidden">'
    +'<table cellpadding="0" cellspacing="0" border="0" style="width:'+Math.max(pct,2)+'%;height:8px"><tr><td style="background:'+pc+';border-radius:99px"></td></tr></table>'
    +'</td></tr>'
    +'<tr><td style="padding-top:6px;font-size:12px;color:#9ca3af">&#x1F4C5; '+dl+' day'+(dl!==1?'s':'')+' remaining this month</td></tr>'
    +'</table></td></tr></table>'
    +'<table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:4px"><tr>'
    +'<td style="background:#fffbeb;border:1px solid #fcd34d;border-radius:14px;padding:18px">'
    +'<p style="margin:0 0 12px;font-size:11px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:1.5px">&#x1F4C5; Upcoming Scheduled</p>'
    +'<table width="100%" cellpadding="0" cellspacing="0" border="0">'+ur+'</table>'
    +'</td></tr></table>'+ctaBtn('Add Transactions Now &rarr;')
    +'<p style="margin:20px 0 0;font-size:12px;color:#9ca3af;text-align:center">You set this reminder for <strong style="color:#6b7280">'+remindTime+'</strong> daily &middot; Manage in Settings &rarr; Notifications</p>';
  return sendEmail(toEmail,subj,eShell(body));
}

// ── CLOUD SYNC via Firebase Realtime Database ──────────────
// Free tier: 1GB storage, no credit card needed
// Data stored at: JSONBin.io keyed by hashed user email
// Protected by: only the app reads/writes, path contains hashed email

// Simple hash so emails are not stored as plain text in the URL
function hashKey(str){
  let h=5381;
  for(let i=0;i<str.length;i++)h=((h<<5)+h)+str.charCodeAt(i)>>>0;
  return h.toString(36).padStart(8,'0');
}

const JSONBIN_KEY='$2a$10$YFCjq4Azn.L42reasWN8ZOv2Ub1rlOrNwZnVod/d1i/vBo4pP/XxG';
const JSONBIN_URL='https://api.jsonbin.io/v3';

// Hash the user key so email is not exposed in bin name
function hashKey(str){
  let h=5381;
  for(let i=0;i<str.length;i++)h=((h<<5)+h)+str.charCodeAt(i)>>>0;
  return h.toString(36).padStart(8,'0');
}

async function cloudSave(uk,data){
  if(!JSONBIN_KEY)return{ok:false,reason:'no_key'};
  try{
    const binName='ledgr'+hashKey(uk);
    const payload=JSON.stringify({...data,_savedAt:Date.now(),_uk:uk,_v:3});
    const headers={'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Versioning':'false'};
    // Try to update existing bin
    let binId=localStorage.getItem('bin_id_'+uk);
    if(binId){
      const r=await fetch(JSONBIN_URL+'/b/'+binId,{method:'PUT',headers,body:payload});
      if(r.ok){localStorage.setItem('bin_ts_'+uk,String(Date.now()));return{ok:true};}
      localStorage.removeItem('bin_id_'+uk);
    }
    // Create new bin with predictable name
    const r=await fetch(JSONBIN_URL+'/b',{
      method:'POST',
      headers:{...headers,'X-Bin-Private':'true','X-Bin-Name':binName},
      body:payload
    });
    if(!r.ok)return{ok:false,reason:'HTTP '+r.status};
    const j=await r.json();
    const newId=j.metadata?.id;
    if(!newId)return{ok:false,reason:'no bin id returned'};
    localStorage.setItem('bin_id_'+uk,newId);
    localStorage.setItem('bin_ts_'+uk,String(Date.now()));
    // Track new user registration in a master registry bin
    trackNewUser(uk,newId);
    return{ok:true};
  }catch(e){return{ok:false,reason:e.message};}
}

// Master registry bin ID — stores list of all users
// Create this bin manually once: POST to JSONBin, get the ID, paste below
const REGISTRY_BIN='';// Paste your registry bin ID here after first run

async function trackNewUser(uk,binId){
  if(!REGISTRY_BIN)return;
  try{
    const h={'X-Master-Key':JSONBIN_KEY,'Content-Type':'application/json','X-Bin-Versioning':'false'};
    // Load existing registry
    const r=await fetch(JSONBIN_URL+'/b/'+REGISTRY_BIN+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY}});
    const registry=r.ok?(await r.json()).record||{}:{};
    if(registry[uk])return;// Already tracked
    registry[uk]={binId,registeredAt:new Date().toISOString(),lastSeen:new Date().toISOString()};
    await fetch(JSONBIN_URL+'/b/'+REGISTRY_BIN,{method:'PUT',headers:h,body:JSON.stringify(registry)});
  }catch(e){}
}

async function cloudLoad(uk){
  if(!JSONBIN_KEY)return null;
  const headers={'X-Master-Key':JSONBIN_KEY};
  const binName='ledgr'+hashKey(uk);
  try{
    // Fast path: cached bin ID on this device
    const cachedId=localStorage.getItem('bin_id_'+uk);
    if(cachedId){
      const r=await fetch(JSONBIN_URL+'/b/'+cachedId+'/latest',{headers});
      if(r.ok){
        const j=await r.json();
        if(j.record)return j.record;
      }
      localStorage.removeItem('bin_id_'+uk);
    }
    // Discovery: list all bins, match by NAME (no per-bin fetches needed)
    const r=await fetch(JSONBIN_URL+'/b',{headers});
    if(!r.ok)return null;
    const list=await r.json();
    const bins=list.result||list||[];
    for(const b of bins){
      const bName=(b.metadata?.name||b.name||'').toLowerCase();
      const bId=b.metadata?.id||b._id||b.id;
      if(bId&&bName===binName){
        const rr=await fetch(JSONBIN_URL+'/b/'+bId+'/latest',{headers});
        if(rr.ok){
          const jj=await rr.json();
          if(jj.record){
            localStorage.setItem('bin_id_'+uk,bId);
            return jj.record;
          }
        }
      }
    }
    return null;
  }catch(e){return null;}
}

function applyTheme(th){
  const s=document.documentElement.style;
  [['--bg',th.bg],['--card',th.card],['--card2',th.card2],['--text',th.text],['--sub',th.sub||'#a0a0c0'],['--muted',th.muted],['--muted2',th.muted2],['--accent',th.accent],['--hero-a',th.heroA],['--hero-b',th.heroB],['--border',th.isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.08)'],['--border2',th.isDark?'rgba(255,255,255,.13)':'rgba(0,0,0,.14)'],['--green',th.isDark?'#30d158':'#1a8040'],['--red',th.isDark?'#ff453a':'#cc1010']].forEach(([k,v])=>s.setProperty(k,v));
  const hex=th.accent.replace('#','');const[r,g,b]=[0,2,4].map(i=>parseInt(hex.slice(i,i+2),16));
  s.setProperty('--a10',`rgba(${r},${g},${b},.10)`);s.setProperty('--a20',`rgba(${r},${g},${b},.20)`);
  s.setProperty('--g10','rgba(48,209,88,.10)');s.setProperty('--r10','rgba(255,69,58,.10)');
  document.body.style.background=th.bg;
  document.querySelector('meta[name=theme-color]').content=th.bg;
}

// Mini donut chart
function Donut({data,size=110}){
  const total=data.reduce((s,d)=>s+d.v,0);
  if(!total)return<div style={{width:size,height:size,borderRadius:'50%',background:'var(--card2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'var(--muted)'}}>No data</div>;
  const r=44,cx=60,cy=60,sw=13,circ=2*Math.PI*r;let off=0;
  const sl=data.map((d,i)=>{const pct=d.v/total,dash=Math.max(circ*pct-1.5,0),gap=circ-dash;const s=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={sw} strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-off+circ/4}/>;off+=circ*pct;return s;});
  return<svg width={size} height={size} viewBox="0 0 120 120"><circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--card2)" strokeWidth={sw}/>{sl}</svg>;
}
function Bars({weeks,height=100}){
  const mx=Math.max(...weeks.flatMap(w=>[w.i,w.e]),1);
  const bw=18,gp=8;const W=weeks.length*(bw*2+gp+6)+6;
  return<svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="xMidYMid meet">
    {weeks.map((w,i)=>{const x=4+i*(bw*2+gp+6);const ih=(w.i/mx)*(height-22),eh=(w.e/mx)*(height-22);return<g key={i}><rect x={x} y={height-22-ih} width={bw} height={Math.max(ih,2)} rx={4} fill="var(--green)" opacity=".85"/><rect x={x+bw+3} y={height-22-eh} width={bw} height={Math.max(eh,2)} rx={4} fill="var(--red)" opacity=".85"/><text x={x+bw} y={height-5} textAnchor="middle" fill="var(--muted)" fontSize={9}>{w.l}</text></g>;})}
  </svg>;
}
function Line({pts,height=70}){
  if(pts.length<2)return null;
  const vals=pts.map(p=>p.y),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1,pad=8,W=300;
  const pp=pts.map((p,i)=>({x:pad+i*(W-pad*2)/(pts.length-1),y:pad+(1-(p.y-mn)/rng)*(height-pad*2)}));
  const d=pp.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  return<svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--accent)" stopOpacity=".3"/><stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/></linearGradient></defs>
    <path d={`${d} L${pp[pp.length-1].x},${height} L${pp[0].x},${height} Z`} fill="url(#lg)"/>
    <path d={d} fill="none" stroke="var(--accent)" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

function parseVoice(text){
  const t=text.toLowerCase();const am=text.match(/[\$]?(\d+(?:[.]\d{1,2})?)/);
  const amount=am?parseFloat(am[1]):null;
  const isInc=/earn|receiv|got paid|income|salary|deposit|freelan|invest|dividend|gift/i.test(t);
  const type=isInc?'income':'expense';
  const cm=[{id:'food',w:['food','lunch','dinner','breakfast','restaurant','coffee','pizza','grocery','chipotle','starbucks']},{id:'transport',w:['uber','lyft','bus','metro','gas','fuel','parking','train']},{id:'bills',w:['bill','electric','water','internet','rent','netflix','spotify']},{id:'shopping',w:['shop','cloth','amazon','online','store','bought']},{id:'health',w:['doctor','pharmacy','medicine','gym','health','dental']},{id:'entertainment',w:['movie','concert','game','fun','show','ticket']},{id:'education',w:['course','book','school','tuition','study']},{id:'travel',w:['travel','hotel','flight','vacation','trip']},{id:'salary',w:['salary','paycheck','wage']},{id:'freelance',w:['freelance','project','client','invoice']},{id:'investment',w:['dividend','stock','crypto','invest']}];
  let category='other';for(const c of cm){if(c.w.some(w=>t.includes(w))){category=c.id;break;}}
  const note=text.replace(/[\$]?\d+(?:[.]\d{1,2})?\s*(?:dollars?|bucks?)?/gi,'').replace(/\b(spent|paid|bought|received|earned|got|on|for|at|the|a|an|i|my|just)\b/gi,'').replace(/\s+/g,' ').trim().slice(0,40)||null;
  return{amount,type,category,note};
}
function VoiceButton({onResult,toast}){
  const [listening,setL]=useState(false);
  const sup='webkitSpeechRecognition' in window||'SpeechRecognition' in window;
  const recRef=useRef(null);
  const go=()=>{
    if(!sup){toast({icon:'X',title:'Not supported',body:'Try Chrome on Android or desktop.',err:true});return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR();recRef.current=r;r.lang='en-US';r.interimResults=false;r.maxAlternatives=1;
    r.onstart=()=>setL(true);r.onend=()=>setL(false);
    r.onerror=e=>{setL(false);toast({icon:'X',title:'Mic error',body:e.error==='not-allowed'?'Microphone blocked - check browser settings':e.error,err:true});};

}

  const [err,setErr]=useState('');
  const [timer,setTimer]=useState(0);
  const refs=[useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];
  const tiRef=useRef(null);

  const startTimer=()=>{
    clearInterval(tiRef.current);setTimer(30);
    tiRef.current=setInterval(()=>setTimer(t=>{if(t<=1){clearInterval(tiRef.current);return 0;}return t-1;}),1000);
  };

  const doSendEmail=async(addr,code,isNew)=>{
    const res=await sendOTPEmail({toEmail:addr,toName:name||addr.split('@')[0],otp:code,isNewUser:isNew});
    if(!res.ok)toast({icon:'⚠',title:'Code: '+code,body:'Email failed. Use this code to sign in.',warn:true});

  };

  const submitEmail=async()=>{
    if(!email.includes('@')){toast({icon:'❌',title:'Invalid email',body:'Enter a valid email address.',err:true});return;}
    if(!isLogin&&!name.trim()){toast({icon:'❌',title:'Name required',body:'Enter your full name.',err:true});return;}
    setLoading(true);setErr('');
    const code=(Math.floor(100000+Math.random()*900000)).toString();
    setGenOtp(code);setOtp(['','','','','','']);
    setChannel('email');
    await doSendEmail(email,code,!isLogin);
    setMode('otp');setLoading(false);startTimer();
    setTimeout(()=>refs[0].current?.focus(),400);
  };

  const submitPhone=async()=>{
    if(phone.length<6){toast({icon:'❌',title:'Invalid phone',body:'Enter a valid phone number.',err:true});return;}

      const digits=d.slice(0,6).split('');
      const newOtp=[...otp];digits.forEach((x,j)=>{newOtp[j]=x;});

    }
    const newOtp=[...otp];newOtp[i]=d;setOtp(newOtp);
    if(d&&i<5)refs[i+1].current?.focus();
    if(!d&&i>0)refs[i-1].current?.focus();

      setOtp(['','','','','','']);
      refs[0].current?.focus();return;

            <span style={{fontSize:18}}>{cc.flag}</span><span style={{fontWeight:700}}>{cc.code}</span><span style={{fontSize:10,color:'var(--muted)'}}>{showCC?'▴':'▾'}</span>
          </button>
          <div style={{flex:1,background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 14px'}}>
            <input type="tel" value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,''))} placeholder="Phone number" style={iStyle} onKeyDown={e=>e.key==='Enter'&&submitPhone()}/>
          </div>
        </div>
        {showCC&&<div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:12,marginBottom:12,maxHeight:200,overflowY:'auto'}}>
          <input value={ccQ} onChange={e=>setCCQ(e.target.value)} placeholder="Search country..." style={{width:'100%',background:'var(--card2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,padding:'8px 12px',outline:'none',marginBottom:8,boxSizing:'border-box'}}/>
          {fCC.map(x=><div key={x.country} onClick={()=>{setCC(x);setShowCC(false);setCCQ('');}} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 10px',borderRadius:8,cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='var(--card2)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
            <span style={{fontSize:18}}>{x.flag}</span><span style={{flex:1,fontSize:13,fontWeight:600}}>{x.name}</span><span style={{fontSize:12,color:'var(--muted)',fontWeight:700}}>{x.code}</span>
          </div>)}
        </div>}
        <button onClick={submitPhone} disabled={loading} style={{width:'100%',padding:'15px',borderRadius:14,border:'none',background:'var(--green)',color:'#000',fontSize:15,fontWeight:800,cursor:'pointer'}}>
          {loading?'Sending…':'Send Verification Code →'}
        </button>
        <p style={{fontSize:12,color:'var(--muted)',textAlign:'center',marginTop:10,lineHeight:1.5}}>Your SMS app will open pre-filled. Send it to yourself then enter the code shown.</p>
      </div>}

      {/* OTP */}
      {mode==='otp'&&<div>
        <button onClick={()=>{setMode(channel);setOtp(['','','','','','']);setErr('');}} style={{background:'none',border:'none',color:'var(--accent)',fontSize:14,fontWeight:700,marginBottom:20,display:'flex',alignItems:'center',gap:4,padding:0,cursor:'pointer'}}>‹ Back</button>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{width:64,height:64,borderRadius:18,background:channel==='email'?'rgba(78,154,241,.15)':'var(--g10)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,margin:'0 auto 14px'}}>{channel==='email'?'📧':'💬'}</div>
          <div style={{fontSize:18,fontWeight:800,marginBottom:6}}>Check your {channel==='email'?'email':'SMS app'}</div>
          <div style={{fontSize:13,color:'var(--sub)',lineHeight:1.6}}>{channel==='email'?<>Code sent to <strong style={{color:'var(--accent)'}}>{email}</strong><br/>Check spam if not received</>:<>Send the pre-filled SMS to <strong style={{color:'var(--text)'}}>{cc.code} {phone}</strong>, then enter your code below</>}</div>
        </div>
        {channel==='phone'&&<div style={{background:'var(--card)',borderRadius:14,padding:'16px',border:'1px solid var(--border)',textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:2,fontWeight:700,marginBottom:8}}>Your verification code</div>
          <div style={{fontSize:38,fontWeight:900,letterSpacing:10,color:'var(--accent)',fontFamily:'monospace'}}>{genOtp}</div>
        </div>}
        {/* 6 boxes */}
        <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:8}}>
          {[0,1,2,3,4,5].map(i=><input key={i} ref={refs[i]} type="tel" inputMode="numeric" maxLength={6} value={otp[i]||''}
            onChange={e=>handleDigit(i,e.target.value)}
            onKeyDown={e=>handleBackspace(i,e)}
            style={{width:46,height:56,borderRadius:12,border:'2px solid '+(err?'var(--red)':otp[i]?'var(--accent)':'var(--border2)'),background:err?'var(--r10)':otp[i]?'var(--a10)':'var(--card)',color:'var(--text)',fontSize:24,fontWeight:900,textAlign:'center',outline:'none',transition:'all .15s',animation:err?'shake .3s':'none'}}/>)}
        </div>
        {err&&<p style={{color:'var(--red)',fontSize:13,textAlign:'center',fontWeight:600,margin:'4px 0 8px'}}>{err}</p>}
        <button onClick={verify} disabled={entered.length<6} style={{width:'100%',padding:'15px',borderRadius:14,border:'none',background:entered.length===6?'var(--accent)':'var(--card2)',color:entered.length===6?'#000':'var(--muted)',fontSize:15,fontWeight:800,cursor:entered.length===6?'pointer':'default',marginTop:6,transition:'all .2s'}}>
          {entered.length===6?'Verify & Sign In ✓':'Enter 6-digit code'}
        </button>
        <div style={{textAlign:'center',marginTop:16,fontSize:13}}>
          <span style={{color:'var(--muted)'}}>No code? </span>
          <span onClick={resend} style={{color:timer>0?'var(--muted)':'var(--accent)',fontWeight:700,cursor:timer>0?'default':'pointer'}}>
            {timer>0?'Resend in '+timer+'s':'Resend code'}
          </span>
        </div>
      </div>}

    </div>
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TX SHEET (Add/Edit)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function TxSheet({tx,onSave,onClose,defSched=false,toast,cur='USD',lang='en',voiceDefaults=null}){
  const ed=!!tx;
  const [type,setType]=useState(tx?.type||voiceDefaults?.type||'expense');
  const [amt,setAmt]=useState(tx?String(tx.amount):voiceDefaults?.amount?String(voiceDefaults.amount):'');
  const [cat,setCat]=useState(tx?.category||voiceDefaults?.category||'');
  const [note,setNote]=useState(tx?.note||voiceDefaults?.note||'');
  const [date,setDate]=useState(tx?.date||todayStr());
  const [remindTime,setRemindTime]=useState(tx?.remindTime||'09:00');
  const [sched,setSched]=useState(tx?.scheduled||defSched);
  const [notify,setNotify]=useState(tx?.notifyWhenDue!==false);
  const cats=type==='income'?INC_CATS:EXP_CATS;
  const numK=[['7','8','9'],['4','5','6'],['1','2','3'],['.',  '0','⌫']];
  const tap=v=>{if(v==='⌫'){setAmt(a=>a.slice(0,-1));return;}if(v==='.'&&amt.includes('.'))return;if(amt.replace('.','').length>=9)return;setAmt(a=>a===''&&v==='.'?'0.':a+v);};
  const save=()=>{
    const n=parseFloat(amt);if(!n||n<=0){toast({icon:'⚠️',title:'Enter amount',body:'Please type an amount.',warn:true});return;}
    if(!cat){toast({icon:'⚠️',title:'Pick category',body:'Select a category below.',warn:true});return;}
    onSave({...(tx||{}),id:tx?.id||Date.now(),type,amount:n,category:cat,note:note.trim(),date,remindTime,scheduled:sched,notifyWhenDue:sched&&notify});
    onClose();
  };
  const cs=CURRENCIES.find(c=>c.code===cur)?.symbol||'$';
  const disp=amt?`${cs}${parseFloat(amt||0).toLocaleString('en-US',{minimumFractionDigits:amt.includes('.')&&amt.split('.')[1]?.length>0?Math.min(amt.split('.')[1].length,2):0})}`:`${cs}0.00`;

  return<Modal onBg={onClose} ch={<>
    <div style={{display:'flex',justifyContent:'center',padding:'10px 0 2px'}}><div style={{width:36,height:4,borderRadius:2,background:'var(--muted2)'}}/></div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 20px 12px'}}>
      <div style={{fontSize:19,fontWeight:800}}>{ed?'Edit':'Add'} Transaction</div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>setSched(!sched)} style={{padding:'6px 12px',borderRadius:10,border:`1px solid ${sched?'var(--accent)':'var(--border2)'}`,background:sched?'var(--a10)':'transparent',color:sched?'var(--accent)':'var(--muted)',fontSize:12,fontWeight:700}}>📅 {sched?'Sched':'Future'}</button>
        <button onClick={onClose} style={{width:30,height:30,borderRadius:15,background:'var(--card2)',border:'none',color:'var(--muted)',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
      </div>
    </div>
    {/* Type */}
    <div style={{display:'flex',background:'var(--card2)',borderRadius:14,padding:4,gap:4,margin:'0 16px 12px'}}>
      {['expense','income'].map(tp=><button key={tp} onClick={()=>{setType(tp);setCat('');}} style={{flex:1,padding:'11px',borderRadius:10,border:'none',background:type===tp?(tp==='income'?'var(--green)':'var(--red)'):'transparent',color:type===tp?'#fff':'var(--muted)',fontSize:15,fontWeight:800,transition:'all .18s'}}>{tp==='income'?'💚 Income':'❤️ Expense'}</button>)}
    </div>
    {/* Amount */}
    <div style={{textAlign:'center',padding:'6px 16px 10px'}}>
      <div style={{fontSize:amt.length>8?34:52,fontWeight:900,letterSpacing:-2,color:amt?(type==='income'?'var(--green)':'var(--red)'):'var(--muted2)',minHeight:62,display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>{disp}</div>
    </div>
    {/* Numpad */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,padding:'0 16px 12px'}}>
      {numK.flat().map(k=><button key={k} onClick={()=>tap(k)} style={{height:52,borderRadius:14,border:'1px solid var(--border)',background:k==='⌫'?'var(--card2)':'var(--card)',color:'var(--text)',fontSize:k==='⌫'?16:22,fontWeight:700,transition:'transform .08s'}}>{k}</button>)}
    </div>
    {/* Category */}
    <div style={{padding:'0 16px 12px'}}>
      <div style={{fontSize:10,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Category</div>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(cats.length,5)},1fr)`,gap:6}}>
        {cats.map(c=><button key={c.id} onClick={()=>setCat(c.id)} style={{padding:'8px 4px',borderRadius:12,border:`1.5px solid ${cat===c.id?c.color:'var(--border)'}`,background:cat===c.id?c.color+'22':'var(--card2)',display:'flex',flexDirection:'column',alignItems:'center',gap:2,transition:'all .15s'}}>
          <span style={{fontSize:20}}>{c.icon}</span>
          <span style={{fontSize:9,color:cat===c.id?c.color:'var(--muted)',fontWeight:700}}>{c.label}</span>
        </button>)}
      </div>
    </div>
    {/* Note + Date */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'0 16px 10px'}}>
      {[{label:'Note',el:<input value={note} onChange={e=>setNote(e.target.value)} placeholder="Optional…" style={{background:'none',border:'none',color:'var(--text)',fontSize:14,width:'100%',outline:'none'}}/>},{label:sched?'Due Date':'Date',el:<input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{background:'none',border:'none',color:'var(--text)',fontSize:13,width:'100%',outline:'none'}}/>}].map((f,i)=><div key={i} style={{background:'var(--card2)',borderRadius:12,padding:'10px 14px',border:'1px solid var(--border)'}}>
        <div style={{fontSize:9,color:'var(--muted)',marginBottom:5,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>{f.label}</div>
        {f.el}
      </div>)}
    </div>
    {sched&&<div style={{padding:'0 16px 12px'}}>
      <div style={{background:'var(--card2)',borderRadius:14,padding:'12px 14px',border:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:notify?12:0}}>
          <div><div style={{fontSize:14,fontWeight:700}}>Email reminder when due</div><div style={{fontSize:11,color:'var(--sub)',marginTop:2}}>Get an email on the due date</div></div>
          <Tog on={notify} fn={()=>setNotify(!notify)}/>
        </div>
        {notify&&<div>
          <div style={{fontSize:10,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Send reminder at</div>
          <input type="time" value={remindTime} onChange={e=>setRemindTime(e.target.value)} style={{width:'100%',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:10,color:'var(--text)',fontSize:16,padding:'10px 14px',outline:'none',fontWeight:700}}/>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:6}}>An email will be sent at this exact time on the due date</div>
        </div>}
      </div>
    </div>}
    <div style={{padding:'4px 16px 12px'}}>
      <button onClick={save} style={{width:'100%',padding:'16px',borderRadius:16,border:'none',background:!amt||!cat?'var(--card2)':'var(--accent)',color:!amt||!cat?'var(--muted)':'#000',fontSize:16,fontWeight:800,transition:'all .2s'}}>{ed?'Update':'Save Transaction'}</button>
    </div>
  </>}/>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HOME SCREEN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function HomeScreen({txns,onNav,onAdd,onSched,user,budgetGoal,incomeGoal,cur,lang}){
  const t=k=>T(lang,k);
  const now=new Date();
  const live=txns.filter(x=>!x.scheduled);
  const mn=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const inc=mn.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=mn.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const bal=live.reduce((s,x)=>x.type==='income'?s+x.amount:s-x.amount,0);
  const recent=[...live].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  const upcoming=txns.filter(x=>x.scheduled).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,3);
  const hr=now.getHours();
  const greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const isDemo=txns.length>=35;

  return<div style={{color:'var(--text)',padding:'0 16px',paddingBottom:`calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 20px)`}}>
    <div style={{paddingTop:'var(--hdr)',paddingBottom:4}}>
      <div style={{fontSize:13,color:'var(--sub)',marginBottom:2}}>{greet}{user?.name?`, ${user.name}`:''} 👋</div>
      <div style={{fontSize:28,fontWeight:900,letterSpacing:-.5}}>{t('home')}</div>
    </div>
    {isDemo&&<div style={{background:'linear-gradient(90deg,var(--a10),rgba(0,0,0,0))',border:'1px solid rgba(245,166,35,.2)',borderRadius:14,padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
      <span>✨</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>{t('demoData')}</div><div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>Settings → Reset when ready for real data</div></div>
    </div>}
    {/* Hero balance */}
    <div style={{background:'linear-gradient(135deg,var(--hero-a),var(--hero-b))',borderRadius:26,padding:'22px 22px',marginBottom:12,position:'relative',overflow:'hidden',border:'1px solid var(--border)'}}>
      <div style={{position:'absolute',top:-50,right:-50,width:160,height:160,borderRadius:'50%',background:'var(--a10)'}}/>
      <div style={{position:'absolute',bottom:-70,left:-20,width:140,height:140,borderRadius:'50%',background:'var(--a10)',opacity:.4}}/>
      <div style={{fontSize:11,color:'var(--sub)',textTransform:'uppercase',letterSpacing:.8,fontWeight:700,marginBottom:6}}>{t('totalBalance')}</div>
      <div style={{fontSize:44,fontWeight:900,letterSpacing:-2,color:bal>=0?'var(--text)':'var(--red)',lineHeight:1}}>{bal<0?'-':''}{fmtMoney(Math.abs(bal),cur)}</div>
      <div style={{fontSize:12,color:'var(--sub)',marginTop:6}}>{monthLbl(now.getFullYear(),now.getMonth())}</div>
    </div>
    {/* Income/Expense */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      {[{label:t('income'),val:inc,col:'var(--green)',goal:incomeGoal},{label:t('expenses'),val:exp,col:'var(--red)',goal:budgetGoal}].map(s=><div key={s.label} style={{background:'var(--card)',borderRadius:18,padding:'14px 16px',border:'1px solid var(--border)'}}>
        <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,fontWeight:700,marginBottom:6}}>{s.label}</div>
        <div style={{fontSize:22,fontWeight:900,color:s.col}}>{fmtK(s.val,cur)}</div>
        {s.goal>0&&<div style={{marginTop:8}}><div style={{height:4,borderRadius:2,background:'var(--card2)',overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,s.val/s.goal*100)}%`,background:s.label===t('expenses')&&s.val/s.goal>.85?'var(--red)':s.col,borderRadius:2}}/></div><div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>{Math.round(s.val/s.goal*100)}%</div></div>}
      </div>)}
    </div>
    {/* Actions */}
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:10,marginBottom:20}}>
      <button onClick={onAdd} style={{padding:'14px',borderRadius:16,background:'var(--accent)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:15,fontWeight:800,color:'#000'}}>＋ {t('addTransaction')}</button>
      <button onClick={onSched} style={{padding:'14px',borderRadius:16,background:'var(--card)',border:'1px solid var(--accent)',fontSize:13,fontWeight:700,color:'var(--accent)'}}>📅 {t('schedule')}</button>
    </div>
    {/* Upcoming */}
    {upcoming.length>0&&<div style={{marginBottom:20}}>
      <div style={{fontSize:15,fontWeight:800,marginBottom:10}}>📅 {t('upcoming')}</div>
      <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',padding:'4px 0'}}>
        {upcoming.map((x,i)=>{const cat=getCat(x.type,x.category);const days=Math.ceil((new Date(x.date)-new Date())/864e5);return<div key={x.id} style={{display:'flex',alignItems:'center',padding:'12px 16px',borderBottom:i<upcoming.length-1?'1px solid var(--border)':'none'}}>
          <div style={{width:38,height:38,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:12,flexShrink:0}}>{cat.icon}</div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.note||cat.label}</div><div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>in {days} day{days!==1?'s':''}</div></div>
          <div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)'}}>{x.type==='income'?'+':'-'}{fmtMoney(x.amount,cur)}</div>{x.notifyWhenDue&&<div style={{fontSize:10,color:'var(--accent)',marginTop:1}}>🔔</div>}</div>
        </div>;})}
      </div>
    </div>}
    {/* Recent */}
    {recent.length>0&&<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:15,fontWeight:800}}>{t('recent')}</div>
        <button onClick={()=>onNav(3)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:13,fontWeight:700}}>{t('seeAll')} →</button>
      </div>
      <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',padding:'4px 0'}}>
        {recent.map((x,i)=>{const cat=getCat(x.type,x.category);return<div key={x.id} style={{display:'flex',alignItems:'center',padding:'12px 16px',borderBottom:i<recent.length-1?'1px solid var(--border)':'none'}}>
          <div style={{width:38,height:38,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:12,flexShrink:0}}>{cat.icon}</div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.note||cat.label}</div><div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>{dayStr(x.date)}</div></div>
          <div style={{fontSize:15,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)',marginLeft:8}}>{x.type==='income'?'+':'-'}{fmtMoney(x.amount,cur)}</div>
        </div>;})}
      </div>
    </div>}
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CHARTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function ChartsScreen({txns,cur,lang}){
  const t=k=>T(lang,k);
  const now=new Date();
  const [vm,setVm]=useState(now.getMonth());
  const [vy,setVy]=useState(now.getFullYear());
  const [activeChart,setActiveChart]=useState('overview');
  const [selCat,setSelCat]=useState(null);
  const [selDay,setSelDay]=useState(null);
  const [selWeek,setSelWeek]=useState(null);

  const nav=d=>{
    let m=vm+d,y=vy;
    if(m<0){m=11;y--;}
    if(m>11){m=0;y++;}
    setVm(m);setVy(y);setSelCat(null);setSelDay(null);setSelWeek(null);
  };

  const live=txns.filter(x=>!x.scheduled);
  const mn=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===vm&&d.getFullYear()===vy;});
  let pm=vm-1,py=vy;if(pm<0){pm=11;py--;}
  const prevMn=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===pm&&d.getFullYear()===py;});
  const inc=mn.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=mn.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const net=inc-exp;
  const prevInc=prevMn.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const prevExp=prevMn.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const savRate=inc>0?Math.round((net/inc)*100):0;
  const isCurrentMonth=vm===now.getMonth()&&vy===now.getFullYear();

  const weeks=useMemo(()=>['W1','W2','W3','W4'].map((l,wi)=>{
    const w=mn.filter(x=>{const day=new Date(x.date+'T12:00:00').getDate();return Math.floor((day-1)/7)===wi;});
    return{l,i:w.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0),e:w.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0),count:w.length};
  }),[mn]);

  const cats=useMemo(()=>EXP_CATS.map(cat=>({
    ...cat,v:mn.filter(x=>x.type==='expense'&&x.category===cat.id).reduce((s,x)=>s+x.amount,0),
    txns:mn.filter(x=>x.type==='expense'&&x.category===cat.id)
  })).filter(cat=>cat.v>0).sort((a,b)=>b.v-a.v),[mn]);

  const incCats=useMemo(()=>INC_CATS.map(cat=>({
    ...cat,v:mn.filter(x=>x.type==='income'&&x.category===cat.id).reduce((s,x)=>s+x.amount,0)
  })).filter(cat=>cat.v>0).sort((a,b)=>b.v-a.v),[mn]);

  const dim=new Date(vy,vm+1,0).getDate();
  const fd=new Date(vy,vm,1).getDay();
  const days=useMemo(()=>Array.from({length:dim},(_,i)=>{
    const d=i+1;
    const dt=mn.filter(x=>new Date(x.date+'T12:00:00').getDate()===d);
    const ni=dt.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
    const ne=dt.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
    return{d,net:ni-ne,inc:ni,exp:ne,count:dt.length,txns:dt};
  }),[mn,dim]);

  const sorted=useMemo(()=>[...live].sort((a,b)=>new Date(a.date)-new Date(b.date)),[live]);
  let runBal=0;
  const balPts=useMemo(()=>sorted.map(x=>{runBal+=x.type==='income'?x.amount:-x.amount;return{y:runBal};}),[sorted]);
  const finalBal=balPts.length>0?balPts[balPts.length-1].y:0;

  const topCat=cats[0]||null;
  const topDay=useMemo(()=>{const expDays=days.filter(d=>d.exp>0);return expDays.sort((a,b)=>b.exp-a.exp)[0]||null;},[days]);

  // 6-month data (no IIFEs needed — computed in useMemo)
  const sixMonths=useMemo(()=>Array.from({length:6},(_,i)=>{
    let m=vm-5+i,y=vy;
    while(m<0){m+=12;y--;}
    while(m>11){m-=12;y++;}
    const mTxns=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===m&&d.getFullYear()===y;});
    const mi=mTxns.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
    const me=mTxns.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
    return{l:new Date(y,m,1).toLocaleString('default',{month:'short'}),m,y,i:mi,e:me,net:mi-me,isCurrent:m===vm&&y===vy};
  }),[live,vm,vy]);

  // Insights
  const insights=useMemo(()=>{
    const ins=[];
    if(net>0)ins.push({icon:'🎉',txt:'Great month! Saved '+fmtMoney(net,cur)+' ('+savRate+'% of income).'});
    else if(net<0)ins.push({icon:'⚠️',txt:'Spending exceeded income by '+fmtMoney(Math.abs(net),cur)+'.'});
    if(topCat)ins.push({icon:topCat.icon,txt:'Biggest expense: '+topCat.label+' at '+fmtMoney(topCat.v,cur)+' ('+(exp>0?Math.round(topCat.v/exp*100):0)+'% of total).'});
    const diff=exp-prevExp;
    if(prevExp>0)ins.push({icon:diff>0?'📈':'📉',txt:'Expenses '+(diff>0?'up':'down')+' '+fmtMoney(Math.abs(diff),cur)+' vs last month.'});
    if(topDay)ins.push({icon:'📅',txt:'Highest spend day: '+topDay.d+' '+monthLbl(vy,vm).split(' ')[0]+' — '+fmtMoney(topDay.exp,cur)+'.'});
    return ins;
  },[mn,net,topCat,exp,prevExp,topDay,cur,savRate]);

  // SVG dimensions
  const W=320,BH=120;
  const maxW=Math.max(...weeks.map(w=>Math.max(w.i,w.e)),1);
  const barW=Math.max(Math.floor(W/4)-14,20);
  const maxSix=Math.max(...sixMonths.flatMap(m=>[m.i,m.e]),1);
  const balYs=balPts.map(p=>p.y);
  const balMin=balYs.length>0?Math.min(...balYs):0;
  const balMax=balYs.length>0?Math.max(...balYs):1;
  const balRange=balMax-balMin||1;
  const balH=70;
  const balLine=balPts.map((p,i)=>(i===0?'M':'L')+(8+i*(W-16)/Math.max(balPts.length-1,1)).toFixed(1)+','+(balH-8-((p.y-balMin)/balRange*(balH-16))).toFixed(1)).join(' ');
  const balArea=balLine+' L'+(W-8)+','+balH+' L8,'+balH+' Z';
  const balZeroY=balH-8-((0-balMin)/balRange*(balH-16));

  // Donut segments
  const donutTotal=cats.reduce((s,c)=>s+c.v,0);
  const donutSegs=useMemo(()=>{
    if(!donutTotal)return[];
    let angle=-Math.PI/2;
    return cats.map(cat=>{
      const sweep=(cat.v/donutTotal)*2*Math.PI;
      const r=54,cx=65,cy=65;
      const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      const x2=cx+r*Math.cos(angle+sweep),y2=cy+r*Math.sin(angle+sweep);
      const large=sweep>Math.PI?1:0;
      const path='M'+cx+','+cy+' L'+x1.toFixed(2)+','+y1.toFixed(2)+' A'+r+','+r+',0,'+large+',1,'+x2.toFixed(2)+','+y2.toFixed(2)+' Z';
      angle+=sweep;
      return{...cat,path,pct:Math.round(cat.v/donutTotal*100)};
    });
  },[cats,donutTotal]);

  // Net savings line
  const netVals=sixMonths.map(m=>m.net);
  const netMin=Math.min(...netVals);
  const netMax=Math.max(...netVals);
  const netRange=netMax-netMin||1;
  const NH=70;
  const netLine=sixMonths.map((m,i)=>(i===0?'M':'L')+(8+i*(W-16)/5).toFixed(1)+','+(NH-8-((m.net-netMin)/netRange*(NH-16))).toFixed(1)).join(' ');
  const netZeroY=NH-8-((0-netMin)/netRange*(NH-16));

  const CHARTS=[{id:'overview',icon:'📊',l:'Overview'},{id:'spending',icon:'🍩',l:'Spending'},{id:'trends',icon:'📈',l:'Trends'},{id:'calendar',icon:'📅',l:'Calendar'},{id:'insights',icon:'💡',l:'Insights'}];

  const selDayData=selDay?days.find(d=>d.d===selDay):null;
  const selCatData=selCat?cats.find(cat=>cat.id===selCat):null;

  const kpiCards=[
    {l:'Income',v:inc,prev:prevInc,c:'var(--green)',icon:'💚'},
    {l:'Expenses',v:exp,prev:prevExp,c:'var(--red)',icon:'❤️'},
    {l:'Net',v:net,prev:prevInc-prevExp,c:net>=0?'var(--green)':'var(--red)',icon:net>=0?'📈':'📉'},
    {l:'Savings %',v:savRate+'%',prev:null,c:'var(--accent)',icon:'💰'},
  ];

  const pStyle={paddingBottom:`calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 20px)`};

  return<div style={{color:'var(--text)',...pStyle}}>
    {/* Header */}
    <div style={{padding:'var(--hdr) 16px 0',background:'var(--bg)',position:'sticky',top:0,zIndex:10}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontSize:26,fontWeight:900,letterSpacing:-.5}}>{t('charts')}</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>nav(-1)} style={{width:32,height:32,borderRadius:10,background:'var(--card)',border:'1px solid var(--border)',color:'var(--text)',fontSize:16,cursor:'pointer'}}>&#8249;</button>
          <span style={{fontSize:12,color:'var(--sub)',minWidth:96,textAlign:'center',fontWeight:700}}>{monthLbl(vy,vm)}</span>
          <button onClick={()=>nav(1)} disabled={isCurrentMonth} style={{width:32,height:32,borderRadius:10,background:'var(--card)',border:'1px solid var(--border)',color:isCurrentMonth?'var(--muted2)':'var(--text)',fontSize:16,cursor:'pointer'}}>&#8250;</button>
        </div>
      </div>
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:12,msOverflowStyle:'none'}}>
        {CHARTS.map(ch=><button key={ch.id} onClick={()=>setActiveChart(ch.id)} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:99,border:'1px solid '+(activeChart===ch.id?'var(--accent)':'var(--border)'),background:activeChart===ch.id?'var(--a10)':'var(--card)',color:activeChart===ch.id?'var(--accent)':'var(--muted)',fontSize:13,fontWeight:700,whiteSpace:'nowrap',flexShrink:0,cursor:'pointer'}}>
          {ch.icon} {ch.l}
        </button>)}
      </div>
    </div>

    <div style={{padding:'0 16px'}}>

    {/* OVERVIEW */}
    {activeChart==='overview'&&<div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
        {kpiCards.map(s=>{
          const diff=s.prev!=null?s.v-s.prev:null;
          return<div key={s.l} style={{background:'var(--card)',borderRadius:18,padding:'14px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:20,marginBottom:6}}>{s.icon}</div>
            <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,fontWeight:700,marginBottom:4}}>{s.l}</div>
            <div style={{fontSize:17,fontWeight:900,color:s.c}}>{typeof s.v==='string'?s.v:fmtK(s.v,cur)}</div>
            {diff!=null&&<div style={{fontSize:10,color:diff>=0?'var(--green)':'var(--red)',marginTop:3,fontWeight:700}}>{diff>=0?'▲':'▼'} {fmtK(Math.abs(diff),cur)} vs last mo</div>}
          </div>;
        })}
      </div>

      {/* Weekly bars */}
      <div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span style={{fontSize:14,fontWeight:800}}>Weekly Breakdown</span>
          <div style={{display:'flex',gap:12,fontSize:11}}>
            <span style={{color:'var(--green)',fontWeight:700}}>● Income</span>
            <span style={{color:'var(--red)',fontWeight:700}}>● Expenses</span>
          </div>
        </div>
        <svg width="100%" viewBox={'0 0 '+W+' '+(BH+30)} style={{overflow:'visible'}}>
          {[0.25,0.5,0.75,1].map(f=><line key={f} x1="0" y1={BH*(1-f)} x2={W} y2={BH*(1-f)} stroke="var(--border)" strokeWidth=".5" strokeDasharray="4,4"/>)}
          {weeks.map((w,wi)=>{
            const x=wi*(W/4)+(W/4-barW*2-4)/2;
            const ih=Math.round((w.i/maxW)*BH);
            const eh=Math.round((w.e/maxW)*BH);
            const isSel=selWeek===wi;
            return<g key={wi} onClick={()=>setSelWeek(selWeek===wi?null:wi)} style={{cursor:'pointer'}}>
              <rect x={x} y={BH-ih} width={barW} height={Math.max(ih,2)} rx="4" fill={isSel?'var(--green)':'rgba(48,209,88,.55)'} opacity={selWeek!=null&&!isSel?.4:1}/>
              <rect x={x+barW+4} y={BH-eh} width={barW} height={Math.max(eh,2)} rx="4" fill={isSel?'var(--red)':'rgba(255,69,58,.55)'} opacity={selWeek!=null&&!isSel?.4:1}/>
              <text x={x+barW+2} y={BH+16} textAnchor="middle" fontSize="11" fill="var(--muted)" fontWeight="700">{w.l}</text>
            </g>;
          })}
        </svg>
        {selWeek!=null&&weeks[selWeek]&&<div style={{background:'var(--card2)',borderRadius:12,padding:'10px 14px',marginTop:8,border:'1px solid var(--border)'}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{weeks[selWeek].l} — {weeks[selWeek].count} transactions</div>
          <div style={{display:'flex',gap:16,fontSize:12}}>
            <span style={{color:'var(--green)'}}>In: {fmtMoney(weeks[selWeek].i,cur)}</span>
            <span style={{color:'var(--red)'}}>Out: {fmtMoney(weeks[selWeek].e,cur)}</span>
            <span style={{fontWeight:700,color:weeks[selWeek].i-weeks[selWeek].e>=0?'var(--green)':'var(--red)'}}>Net: {fmtMoney(weeks[selWeek].i-weeks[selWeek].e,cur)}</span>
          </div>
        </div>}
      </div>

      {/* Running balance */}
      {balPts.length>1&&<div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>Running Balance</div>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:10}}>Current: <strong style={{color:finalBal>=0?'var(--green)':'var(--red)'}}>{fmtMoney(finalBal,cur)}</strong></div>
        <svg width="100%" viewBox={'0 0 '+W+' '+balH}>
          <defs><linearGradient id="bGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--accent)" stopOpacity=".35"/><stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/></linearGradient></defs>
          <path d={balArea} fill="url(#bGrad)"/>
          <path d={balLine} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          <line x1="0" y1={balZeroY} x2={W} y2={balZeroY} stroke="var(--border)" strokeWidth="1" strokeDasharray="4,4"/>
        </svg>
      </div>}
    </div>}

    {/* SPENDING */}
    {activeChart==='spending'&&<div>
      {cats.length===0?<div style={{textAlign:'center',padding:'60px 0',color:'var(--muted)'}}>
        <div style={{fontSize:48,marginBottom:12}}>🍩</div>
        <div style={{fontSize:16,fontWeight:700}}>No expenses this month</div>
      </div>:<div>
        <div style={{background:'var(--card)',borderRadius:20,padding:'20px',border:'1px solid var(--border)',marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:800,marginBottom:16}}>Expense Breakdown — tap to drill down</div>
          <div style={{display:'flex',gap:16,alignItems:'center'}}>
            <svg width="130" height="130" viewBox="0 0 130 130" style={{flexShrink:0}}>
              {donutSegs.map((seg,i)=><path key={i} d={seg.path} fill={seg.color||'var(--accent)'} opacity={selCat&&selCat!==seg.id?.4:1} onClick={()=>setSelCat(selCat===seg.id?null:seg.id)} style={{cursor:'pointer',transition:'opacity .2s'}}/>)}
              <circle cx="65" cy="65" r="36" fill="var(--card)"/>
              <text x="65" y="60" textAnchor="middle" fontSize="11" fill="var(--muted)" fontWeight="700">TOTAL</text>
              <text x="65" y="77" textAnchor="middle" fontSize="12" fill="var(--text)" fontWeight="900">{fmtK(exp,cur)}</text>
            </svg>
            <div style={{flex:1}}>
              {cats.map(cat=><div key={cat.id} onClick={()=>setSelCat(selCat===cat.id?null:cat.id)} style={{marginBottom:10,cursor:'pointer',opacity:selCat&&selCat!==cat.id?.4:1}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                  <span style={{fontSize:14}}>{cat.icon}</span>
                  <span style={{flex:1,fontSize:11,color:'var(--sub)',fontWeight:600}}>{cat.label}</span>
                  <span style={{fontSize:12,fontWeight:800,color:'var(--red)'}}>{fmtK(cat.v,cur)}</span>
                </div>
                <div style={{height:4,borderRadius:2,background:'var(--card2)',overflow:'hidden'}}>
                  <div style={{height:'100%',width:(exp>0?Math.round(cat.v/exp*100):0)+'%',background:cat.color||'var(--accent)',borderRadius:2}}/>
                </div>
              </div>)}
            </div>
          </div>
        </div>
        {selCatData&&<div style={{background:'var(--card)',borderRadius:18,padding:'14px',border:'1px solid var(--border)',marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <span style={{fontSize:22}}>{selCatData.icon}</span>
            <div><div style={{fontSize:14,fontWeight:800}}>{selCatData.label}</div><div style={{fontSize:12,color:'var(--sub)'}}>{selCatData.txns.length} transactions · {fmtMoney(selCatData.v,cur)}</div></div>
          </div>
          {selCatData.txns.map(x=><div key={x.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderTop:'1px solid var(--border)'}}>
            <div><div style={{fontSize:13,fontWeight:600}}>{x.note||selCatData.label}</div><div style={{fontSize:11,color:'var(--muted)'}}>{dayStr(x.date)}</div></div>
            <span style={{fontSize:14,fontWeight:800,color:'var(--red)'}}>-{fmtMoney(x.amount,cur)}</span>
          </div>)}
        </div>}
        {incCats.length>0&&<div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)'}}>
          <div style={{fontSize:14,fontWeight:800,marginBottom:10}}>Income Sources</div>
          {incCats.map(cat=><div key={cat.id} style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
              <span style={{fontSize:13}}>{cat.icon} {cat.label}</span>
              <span style={{fontSize:13,fontWeight:800,color:'var(--green)'}}>{fmtMoney(cat.v,cur)}</span>
            </div>
            <div style={{height:4,borderRadius:2,background:'var(--card2)',overflow:'hidden'}}>
              <div style={{height:'100%',width:(inc>0?Math.round(cat.v/inc*100):0)+'%',background:'var(--green)',borderRadius:2}}/>
            </div>
          </div>)}
        </div>}
      </div>}
    </div>}

    {/* TRENDS */}
    {activeChart==='trends'&&<div>
      <div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>6-Month Income vs Expenses</div>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:12}}>Current month highlighted</div>
        <svg width="100%" viewBox={'0 0 '+W+' 130'}>
          {[.25,.5,.75,1].map(f=><line key={f} x1="0" y1={100*(1-f)} x2={W} y2={100*(1-f)} stroke="var(--border)" strokeWidth=".5"/>)}
          {sixMonths.map((mo,i)=>{
            const x=i*(W/6)+(W/6-22)/2;
            const ih=Math.round((mo.i/maxSix)*100);
            const eh=Math.round((mo.e/maxSix)*100);
            return<g key={i}>
              {mo.isCurrent&&<rect x={x-3} y="-4" width={28} height={108} rx="4" fill="var(--accent)" opacity=".08"/>}
              <rect x={x} y={100-ih} width={10} height={Math.max(ih,2)} rx="3" fill="var(--green)" opacity={mo.isCurrent?1:.6}/>
              <rect x={x+12} y={100-eh} width={10} height={Math.max(eh,2)} rx="3" fill="var(--red)" opacity={mo.isCurrent?1:.6}/>
              <text x={x+11} y={116} textAnchor="middle" fontSize="10" fill={mo.isCurrent?'var(--accent)':'var(--muted)'} fontWeight={mo.isCurrent?'900':'400'}>{mo.l}</text>
            </g>;
          })}
        </svg>
        <div style={{display:'flex',justifyContent:'center',gap:16,fontSize:11}}>
          <span style={{color:'var(--green)',fontWeight:700}}>■ Income</span>
          <span style={{color:'var(--red)',fontWeight:700}}>■ Expenses</span>
        </div>
      </div>

      <div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)'}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>Net Savings Trend</div>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:10}}>6-month savings trajectory</div>
        <svg width="100%" viewBox={'0 0 '+W+' '+(NH+20)} style={{overflow:'visible'}}>
          <line x1="0" y1={netZeroY} x2={W} y2={netZeroY} stroke="var(--border)" strokeWidth="1" strokeDasharray="4,4"/>
          <path d={netLine} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          {sixMonths.map((mo,i)=>{
            const cx=8+i*(W-16)/5;
            const cy=NH-8-((mo.net-netMin)/netRange*(NH-16));
            return<g key={i}>
              <circle cx={cx} cy={cy} r="5" fill={mo.net>=0?'var(--green)':'var(--red)'} stroke="var(--card)" strokeWidth="2"/>
              <text x={cx} y={NH+18} textAnchor="middle" fontSize="9" fill="var(--muted)">{mo.l}</text>
            </g>;
          })}
        </svg>
      </div>
    </div>}

    {/* CALENDAR */}
    {activeChart==='calendar'&&<div>
      <div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>Day-by-Day Activity</div>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:12}}>Tap any day to see transactions</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:10}}>
          {['Su','Mo','Tu','We','Th','Fr','Sa'].map((d,i)=><div key={i} style={{fontSize:9,color:'var(--muted)',textAlign:'center',fontWeight:700,padding:'2px 0'}}>{d}</div>)}
          {Array.from({length:fd}).map((_,i)=><div key={'e'+i}/>)}
          {days.map(d=>{
            const isToday=d.d===now.getDate()&&isCurrentMonth;
            const isSel=selDay===d.d;
            return<button key={d.d} onClick={()=>setSelDay(selDay===d.d?null:d.d)} style={{aspectRatio:'1',borderRadius:8,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',background:isSel?'var(--accent)':d.count===0?'var(--card2)':d.net>=0?'rgba(48,209,88,.2)':'rgba(255,69,58,.2)',color:isSel?'#000':d.count===0?'var(--muted2)':d.net>=0?'var(--green)':'var(--red)',border:isToday?'2px solid var(--accent)':'1px solid transparent',cursor:'pointer'}}>
              {d.d}
            </button>;
          })}
        </div>
        <div style={{display:'flex',gap:12,fontSize:11,justifyContent:'center'}}>
          <span style={{color:'var(--green)',fontWeight:700}}>● Positive</span>
          <span style={{color:'var(--red)',fontWeight:700}}>● Negative</span>
          <span style={{color:'var(--muted)',fontWeight:700}}>● No activity</span>
        </div>
      </div>
      {selDayData&&selDayData.count>0&&<div style={{background:'var(--card)',borderRadius:18,padding:'14px',border:'1px solid var(--border)'}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:10}}>{selDay} {monthLbl(vy,vm)} — {selDayData.count} transaction{selDayData.count!==1?'s':''}</div>
        {selDayData.txns.map(x=>{const cat=getCat(x.type,x.category);return<div key={x.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderTop:'1px solid var(--border)'}}>
          <span style={{fontSize:20}}>{cat.icon}</span>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{x.note||cat.label}</div><div style={{fontSize:11,color:'var(--muted)'}}>{cat.label}</div></div>
          <span style={{fontSize:14,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)'}}>{x.type==='income'?'+':'-'}{fmtMoney(x.amount,cur)}</span>
        </div>;})}
        <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between'}}>
          <span style={{fontSize:12,color:'var(--sub)'}}>Day net</span>
          <span style={{fontSize:14,fontWeight:800,color:selDayData.net>=0?'var(--green)':'var(--red)'}}>{selDayData.net>=0?'+':''}{fmtMoney(selDayData.net,cur)}</span>
        </div>
      </div>}
      {selDay&&selDayData&&selDayData.count===0&&<div style={{background:'var(--card)',borderRadius:14,padding:'20px',textAlign:'center',color:'var(--muted)',border:'1px solid var(--border)'}}>No transactions on {selDay} {monthLbl(vy,vm).split(' ')[0]}</div>}
    </div>}

    {/* INSIGHTS */}
    {activeChart==='insights'&&<div>
      {mn.length===0?<div style={{textAlign:'center',padding:'60px 0',color:'var(--muted)'}}>
        <div style={{fontSize:48,marginBottom:12}}>💡</div>
        <div style={{fontSize:16,fontWeight:700}}>Add transactions to see insights</div>
      </div>:<div>
        {insights.map((ins,i)=><div key={i} style={{background:'var(--card)',borderRadius:18,padding:'16px',border:'1px solid var(--border)',marginBottom:10,display:'flex',gap:12,alignItems:'flex-start'}}>
          <span style={{fontSize:24,flexShrink:0}}>{ins.icon}</span>
          <span style={{fontSize:13,color:'var(--text)',lineHeight:1.6,fontWeight:500}}>{ins.txt}</span>
        </div>)}

        <div style={{background:'var(--card)',borderRadius:18,padding:'16px',border:'1px solid var(--border)',marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontSize:14,fontWeight:800}}>Budget Health</span>
            <span style={{fontSize:13,fontWeight:700,color:savRate>=10?'var(--green)':savRate>=0?'var(--accent)':'var(--red)'}}>{savRate>=10?'💚 Healthy':savRate>=0?'⚡ Watch Out':'🔴 Over Budget'}</span>
          </div>
          <div style={{height:12,borderRadius:6,background:'var(--card2)',overflow:'hidden',marginBottom:8}}>
            <div style={{height:'100%',width:Math.min(Math.max(savRate,0),100)+'%',background:savRate>=10?'var(--green)':savRate>=0?'var(--accent)':'var(--red)',borderRadius:6}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--sub)'}}>
            <span>Spent {fmtMoney(exp,cur)}</span>
            <span>Saved {fmtMoney(Math.max(net,0),cur)}</span>
          </div>
        </div>

        <div style={{background:'var(--card)',borderRadius:18,padding:'16px',border:'1px solid var(--border)',marginBottom:10}}>
          <div style={{fontSize:14,fontWeight:800,marginBottom:10}}>Top Spending Days</div>
          {days.filter(d=>d.exp>0).sort((a,b)=>b.exp-a.exp).slice(0,5).map(d=><div key={d.d} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderTop:'1px solid var(--border)'}}>
            <span style={{fontSize:13,color:'var(--sub)'}}>{d.d} {monthLbl(vy,vm).split(' ')[0]} · {d.count} txns</span>
            <span style={{fontSize:14,fontWeight:800,color:'var(--red)'}}>-{fmtMoney(d.exp,cur)}</span>
          </div>)}
          {days.filter(d=>d.exp>0).length===0&&<div style={{fontSize:13,color:'var(--muted)',textAlign:'center',padding:'12px 0'}}>No expenses recorded</div>}
        </div>

        {mn.length>0&&<div style={{background:'var(--card)',borderRadius:18,padding:'16px',border:'1px solid var(--border)'}}>
          <div style={{fontSize:14,fontWeight:800,marginBottom:10}}>Monthly Stats</div>
          {[
            {l:'Total transactions',v:mn.length+' this month'},
            {l:'Active days',v:new Set(mn.map(x=>x.date)).size+' of '+dim},
            {l:'Avg per transaction',v:fmtMoney(mn.reduce((s,x)=>s+x.amount,0)/mn.length,cur)},
            {l:'Biggest expense',v:mn.filter(x=>x.type==='expense').length>0?('-'+fmtMoney(Math.max(...mn.filter(x=>x.type==='expense').map(x=>x.amount)),cur)):'—'},
            {l:'Biggest income',v:mn.filter(x=>x.type==='income').length>0?('+'+fmtMoney(Math.max(...mn.filter(x=>x.type==='income').map(x=>x.amount)),cur)):'—'},
          ].map(s=><div key={s.l} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderTop:'1px solid var(--border)'}}>
            <span style={{fontSize:13,color:'var(--sub)'}}>{s.l}</span>
            <span style={{fontSize:13,fontWeight:700}}>{s.v}</span>
          </div>)}
        </div>}
      </div>}
    </div>}

    </div>
  </div>;
}


// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HISTORY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function HistoryScreen({txns,onEdit,onDelete,onAddSched,toast,cur,lang}){
  const t=k=>T(lang,k);
  const [view,setView]=useState('history');
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [start,setStart]=useState('');
  const [end,setEnd]=useState('');
  const [editTx,setEditTx]=useState(null);
  const [delTx,setDelTx]=useState(null);
  const [showAddS,setAddS]=useState(false);

  const live=txns.filter(x=>!x.scheduled);
  const sched=txns.filter(x=>x.scheduled).sort((a,b)=>new Date(a.date)-new Date(b.date));

  const filtered=useMemo(()=>{
    let l=live;
    if(filter!=='all')l=l.filter(x=>x.type===filter);
    if(search.trim())l=l.filter(x=>(x.note||'').toLowerCase().includes(search.toLowerCase())||(x.category||'').toLowerCase().includes(search.toLowerCase()));
    if(start)l=l.filter(x=>x.date>=start);
    if(end)l=l.filter(x=>x.date<=end);
    return [...l].sort((a,b)=>new Date(b.date)-new Date(a.date));
  },[live,filter,search,start,end]);

  const groups=useMemo(()=>{const g=[];filtered.forEach(x=>{const last=g[g.length-1];if(last&&last.date===x.date)last.items.push(x);else g.push({date:x.date,items:[x]});});return g;},[filtered]);
  const total=filtered.reduce((s,x)=>x.type==='income'?s+x.amount:s-x.amount,0);

  return<div style={{color:'var(--text)',padding:'0 16px',paddingBottom:`calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 20px)`}}>
    {editTx&&<TxSheet tx={editTx} onSave={x=>{onEdit(x);setEditTx(null);}} onClose={()=>setEditTx(null)} toast={toast} cur={cur} lang={lang}/>}
    {delTx&&<Confirm title={t('delete')+' Transaction'} body={`"${delTx.note||delTx.category}" ${fmtMoney(delTx.amount,cur)}`} ok={t('delete')} danger onOk={()=>{onDelete(delTx.id);setDelTx(null);}} onCancel={()=>setDelTx(null)}/>}
    {showAddS&&<TxSheet onSave={x=>{onAddSched(x);setAddS(false);}} onClose={()=>setAddS(false)} defSched toast={toast} cur={cur} lang={lang}/>}

    <div style={{paddingTop:'var(--hdr)',marginBottom:12}}>
      <div style={{fontSize:26,fontWeight:900,letterSpacing:-.5,marginBottom:12}}>{t('history')}</div>
      <div style={{display:'flex',background:'var(--card2)',borderRadius:14,padding:4,gap:4,marginBottom:12}}>
        {[{v:'history',l:`📋 ${t('past')}`},{v:'scheduled',l:`📅 ${t('scheduled')}${sched.length>0?` (${sched.length})`:''}`}].map(b=><button key={b.v} onClick={()=>setView(b.v)} style={{flex:1,padding:'9px',borderRadius:10,border:'none',background:view===b.v?'var(--card)':'transparent',color:view===b.v?'var(--text)':'var(--muted)',fontSize:13,fontWeight:700,transition:'all .18s'}}>{b.l}</button>)}
      </div>
    </div>

    {view==='history'&&<div>
      {/* Search */}
      <div style={{background:'var(--card)',borderRadius:14,padding:'10px 14px',border:'1px solid var(--border)',marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
        <span style={{color:'var(--muted)'}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t('search')} style={{background:'none',border:'none',color:'var(--text)',fontSize:14,flex:1,outline:'none'}}/>
        {search&&<button onClick={()=>setSearch('')} style={{background:'none',border:'none',color:'var(--muted)',fontSize:18,cursor:'pointer'}}>×</button>}
      </div>
      {/* Date range */}
      <div style={{background:'var(--card)',borderRadius:14,padding:'12px 14px',border:'1px solid var(--border)',marginBottom:10}}>
        <div style={{fontSize:10,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>📅 Date Range</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[{l:t('fromDate'),v:start,s:setStart},{l:t('toDate'),v:end,s:setEnd}].map((f,i)=><div key={i}>
            <div style={{fontSize:10,color:'var(--muted)',marginBottom:4}}>{f.l}</div>
            <input type="date" value={f.v} onChange={e=>f.s(e.target.value)} style={{width:'100%',background:'var(--card2)',border:'1px solid var(--border)',borderRadius:10,color:f.v?'var(--text)':'var(--muted)',fontSize:13,padding:'9px 10px',outline:'none'}}/>
          </div>)}
        </div>
        {(start||end)&&<button onClick={()=>{setStart('');setEnd('');}} style={{marginTop:8,background:'none',border:'none',color:'var(--accent)',fontSize:12,fontWeight:700,cursor:'pointer'}}>✕ Clear dates</button>}
      </div>
      {/* Filters */}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        {['all','income','expense'].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:'7px 16px',borderRadius:99,border:'none',background:filter===f?(f==='income'?'var(--green)':f==='expense'?'var(--red)':'var(--accent)'):'var(--card2)',color:filter===f?'#000':'var(--muted)',fontSize:13,fontWeight:700,flexShrink:0}}>
          {f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1)}
        </button>)}
      </div>
      {/* Stats bar */}
      {filtered.length>0&&<div style={{background:'var(--card)',borderRadius:12,padding:'10px 14px',border:'1px solid var(--border)',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:'var(--sub)'}}>{filtered.length} transaction{filtered.length!==1?'s':''}</span>
        <span style={{fontSize:13,fontWeight:800,color:total>=0?'var(--green)':'var(--red)'}}>{total>=0?'+':''}{fmtMoney(total,cur)}</span>
      </div>}
      {/* Groups */}
      {groups.length===0&&<div style={{textAlign:'center',marginTop:60,color:'var(--muted)'}}>
        <div style={{fontSize:44,marginBottom:12}}>🔍</div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>{t('noTxns')}</div>
        <div style={{fontSize:13}}>Try adjusting filters or date range</div>
      </div>}
      {groups.map(g=><div key={g.date} style={{marginBottom:16}}>
        <div style={{fontSize:11,color:'var(--sub)',textTransform:'uppercase',letterSpacing:.8,fontWeight:700,marginBottom:6}}>{dayStr(g.date)}</div>
        <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',padding:'4px 0'}}>
          {g.items.map((x,i)=>{const cat=getCat(x.type,x.category);return<div key={x.id} style={{display:'flex',alignItems:'center',padding:'12px 14px',borderBottom:i<g.items.length-1?'1px solid var(--border)':'none'}}>
            <div style={{width:38,height:38,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:12,flexShrink:0}}>{cat.icon}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.note||cat.label}</div><div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>{cat.label}</div></div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)'}}>{x.type==='income'?'+':'-'}{fmtMoney(x.amount,cur)}</div>
              <div style={{display:'flex',gap:10,marginTop:4,justifyContent:'flex-end'}}>
                <button onClick={()=>setEditTx(x)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:11,fontWeight:700,cursor:'pointer',padding:0}}>{t('edit')}</button>
                <button onClick={()=>setDelTx(x)} style={{background:'none',border:'none',color:'var(--muted2)',fontSize:11,fontWeight:700,cursor:'pointer',padding:0}}>{t('delete')}</button>
              </div>
            </div>
          </div>;})}
        </div>
      </div>)}
    </div>}

    {view==='scheduled'&&<div>
      <button onClick={()=>setAddS(true)} style={{width:'100%',padding:'14px',borderRadius:14,border:'1.5px dashed var(--accent)',background:'var(--a10)',color:'var(--accent)',fontSize:14,fontWeight:800,marginBottom:14}}>+ Add Scheduled</button>
      {sched.length===0&&<div style={{textAlign:'center',marginTop:40,color:'var(--muted)'}}><div style={{fontSize:44,marginBottom:12}}>📅</div><div style={{fontSize:16,fontWeight:700}}>No scheduled transactions</div></div>}
      {sched.map(x=>{const cat=getCat(x.type,x.category);const days=Math.ceil((new Date(x.date)-new Date())/864e5);const past=days<0;const urgent=!past&&days<=3;
        return<div key={x.id} style={{background:'var(--card)',borderRadius:18,padding:'14px 16px',border:`1px solid ${past?'rgba(255,69,58,.3)':urgent?'rgba(245,166,35,.3)':'var(--border)'}`,marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:42,height:42,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{cat.icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.note||cat.label}</div>
              <div style={{fontSize:12,color:past?'var(--red)':urgent?'var(--accent)':'var(--sub)',marginTop:2,fontWeight:past||urgent?700:400}}>{dayStr(x.date)} · {past?'⚠️ Overdue':days===0?'Today':days===1?'Tomorrow':`in ${days} days`}</div>
              {x.notifyWhenDue&&<div style={{fontSize:11,color:'var(--accent)',marginTop:2}}>🔔 reminder set</div>}
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)'}}>{x.type==='income'?'+':'-'}{fmtMoney(x.amount,cur)}</div>
              <div style={{display:'flex',gap:8,marginTop:5,justifyContent:'flex-end'}}>
                <button onClick={()=>setEditTx(x)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:12,fontWeight:700,cursor:'pointer',padding:0}}>{t('edit')}</button>
                <button onClick={()=>setDelTx(x)} style={{background:'none',border:'none',color:'var(--red)',fontSize:12,fontWeight:700,cursor:'pointer',padding:0}}>{t('delete')}</button>
              </div>
            </div>
          </div>
        </div>;})}
    </div>}
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SETTINGS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function SettingsScreen({user,onLogout,theme,onTheme,txns,onReset,toast,budgetGoal,incomeGoal,onBudget,onIncome,cur,onCur,lang,onLang}){
  const t=k=>T(lang,k);
  const [sec,setSec]=useState('profile');
  const [notifEn,setNE]=useState(()=>LS.get('notif_en',{push:true,email:false,sms:false}));
  const [activeTimes,setAT]=useState(()=>LS.get('notif_times',['9:00 AM','6:00 PM']));
  const [customTime,setCustom]=useState('');
  const [notifPerm,setNP]=useState(()=>'Notification' in window?Notification.permission:'denied');
  const [testSent,setTS]=useState('');
  const [showReset,setSR]=useState(false);
  const [saving,setSaving]=useState(false);
  const [curSearch,setCurSearch]=useState('');
  const [langSearch,setLangSearch]=useState('');
  const [ejKey,setEJKey]=useState('');// legacy — kept for state compat
  const timerRef=useRef([]);

  const saveNE=v=>{setNE(v);LS.set('notif_en',v);};
  const toggleTime=t2=>{const n=activeTimes.includes(t2)?activeTimes.filter(r=>r!==t2):[...activeTimes,t2].sort((a,b)=>{const pa=parseT(a),pb=parseT(b);return(pa.h*60+pa.m)-(pb.h*60+pb.m);});setAT(n);LS.set('notif_times',n);};
  const addCustom=()=>{if(!customTime)return;const[h,m]=customTime.split(':').map(Number);const ap=h>=12?'PM':'AM';const hr=h%12||12;const lbl=`${hr}:${String(m).padStart(2,'0')} ${ap}`;if(!activeTimes.includes(lbl)){const n=[...activeTimes,lbl].sort((a,b)=>{const pa=parseT(a),pb=parseT(b);return(pa.h*60+pa.m)-(pb.h*60+pb.m);});setAT(n);LS.set('notif_times',n);}setCustom('');};

  // ── Notification email address (user can override) ──────────
  const [notifEmail,setNotifEmail]=useState(()=>LS.get('notif_email','')||user?.email||'');
  const [notifPhone,setNotifPhone]=useState(()=>LS.get('notif_phone','')||user?.phone||'');

  // ── Fire all enabled channels ────────────────────────────────
  const fireAllChannels=async(ts)=>{
    if(notifEn.push){
      toast({icon:'bell',title:'LedgrTrack '+ts,body:'Time to log your transactions!'});
      if('Notification' in window&&Notification.permission==='granted'){try{new Notification('LedgrTrack '+ts,{body:'Tap to open and log!',tag:'ledgr-'+ts});}catch(e){}}
    }
    if(notifEn.email&&notifEmail){
      const res=await sendReminderEmail({toEmail:notifEmail,toName:user?.name,remindTime:ts,txns,currency:cur});
      if(res.ok)toast({icon:'mail',title:ts+' - Email sent!',body:'Reminder delivered to '+notifEmail});
      else toast({icon:'warn',title:'Email failed',body:res.err||'Check EmailJS',warn:true});
    }
    if(notifEn.sms&&notifPhone){
      const sym=symFor(cur);
      const live=txns.filter(x=>!x.scheduled);
      const mn=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===new Date().getMonth();});
      const mi=mn.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
      const me=mn.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
      const bal=live.reduce((s,x)=>x.type==='income'?s+x.amount:s-x.amount,0);
      const sms='LedgrTrack '+ts+': Income '+sym+mi.toFixed(0)+' | Expenses '+sym+me.toFixed(0)+' | Balance '+sym+bal.toFixed(0)+'. Open app!';
      window.open('sms:'+notifPhone+'?body='+encodeURIComponent(sms));
      toast({icon:'sms',title:ts+' - SMS opened',body:'Ready for '+notifPhone});
    }
  };

    // ── Schedule all reminder times ──────────────────────────────
  const scheduleAll=()=>{
    timerRef.current.forEach(x=>{clearTimeout(x);clearInterval(x);});timerRef.current=[];
    if(!activeTimes.length){toast({icon:'⚠️',title:'No times selected',body:'Pick at least one reminder time below.',warn:true});return;}
    const enabledChannels=[];
    if(notifEn.push)enabledChannels.push('📱 Push');
    if(notifEn.email&&notifEmail)enabledChannels.push('📧 Email');
    if(notifEn.sms&&notifPhone)enabledChannels.push('💬 SMS');
    if(!enabledChannels.length){toast({icon:'⚠️',title:'No channels active',body:'Enable Push, Email, or SMS above — and make sure email/phone are set.',warn:true});return;}

    activeTimes.forEach(ts=>{
      const{h,m}=parseT(ts);
      const now2=new Date();const nxt=new Date(now2);
      nxt.setHours(h,m,0,0);if(nxt<=now2)nxt.setDate(nxt.getDate()+1);

        await fireAllChannels(ts);

        timerRef.current.push(iv);
      },delay);
      timerRef.current.push(tid);
    });

    <div style={{paddingTop:'var(--hdr)',marginBottom:12}}>

    </div>
    {/* Nav pills */}
    <div style={{display:'flex',gap:8,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
      {navItems.map(p=><button key={p.id} onClick={()=>setSec(p.id)} style={{padding:'8px 14px',borderRadius:99,border:`1px solid ${sec===p.id?'var(--accent)':'var(--border)'}`,background:sec===p.id?'var(--a10)':'transparent',color:sec===p.id?'var(--accent)':'var(--muted)',fontSize:13,fontWeight:700,whiteSpace:'nowrap',flexShrink:0,transition:'all .15s'}}>{p.icon} {p.l}</button>)}
    </div>

    {/* PROFILE */}
    {sec==='profile'&&<div>
      <div style={{textAlign:'center',marginBottom:20}}>
        <div style={{width:80,height:80,borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),#c87010)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,fontWeight:900,color:'#000',margin:'0 auto 12px',boxShadow:'0 8px 28px var(--a20)'}}>

        {user.phone&&<div style={{display:'flex',gap:10,alignItems:'center',padding:'8px 0',borderTop:user.email?'1px solid var(--border)':'none'}}><span style={{fontSize:18}}>📱</span><div><div style={{fontSize:13,fontWeight:700}}>{user.phone}</div><div style={{fontSize:11,color:'var(--sub)'}}>Verified phone</div></div></div>}
      </div>}
      <button onClick={onLogout} style={{width:'100%',padding:'14px',borderRadius:14,border:'1px solid var(--border)',background:'var(--r10)',color:'var(--red)',fontSize:15,fontWeight:800}}>{t('logout')}</button>

    {/* GOALS */}

        </div>
        <button onClick={scheduleAll} style={{width:'100%',padding:'14px',borderRadius:13,border:'none',background:saving?'var(--green)':'var(--accent)',color:'#000',fontSize:15,fontWeight:800,transition:'all .25s',boxShadow:saving?'0 0 20px rgba(48,209,88,.3)':activeTimes.length?'0 4px 20px var(--a20)':'none'}}>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>

            {k:'push',l:'Push',icon:'📱',sub:'On-screen',fn:testPush,col:'var(--a10)',border:'var(--accent)'},
            {k:'email',l:'Email',icon:'📧',sub:notifEmail||'set email',fn:testEmail,col:'rgba(78,154,241,.1)',border:'var(--blue)'},

            💬 <strong style={{color:'var(--text)'}}>SMS</strong> — opens your messages app pre-filled to send yourself

          <div style={{background:th.bg,padding:'14px 14px 10px'}}>
            <div style={{background:th.card,borderRadius:10,padding:'10px 12px',marginBottom:6}}><div style={{fontSize:10,color:th.muted,marginBottom:3}}>Balance</div><div style={{fontSize:16,fontWeight:900,color:th.text}}>$5,240</div></div>

        <div style={{fontSize:13,color:'var(--sub)',lineHeight:1.6}}>OTP codes sent automatically via ledgrtrack@gmail.com</div>
