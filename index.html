@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(48px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes toastIn{from{transform:translateY(-14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes barGrow{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}
@keyframes waveBar{0%{transform:scaleY(.4)}100%{transform:scaleY(1.2)}}
@keyframes voiceRipple{0%{opacity:1;transform:scale(.8)}100%{opacity:0;transform:scale(2.2)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes tabBounce{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-4px) scale(1.1)}70%{transform:translateY(0) scale(.97)}}

function applyTheme(th){
  const s=document.documentElement.style;
  [['--bg',th.bg],['--card',th.card],['--card2',th.card2],['--text',th.text],
   ['--sub',th.sub||'#a0a0c0'],['--muted',th.muted],['--muted2',th.muted2],
   ['--accent',th.accent],['--hero-a',th.heroA],['--hero-b',th.heroB],
   ['--border',th.isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.08)'],
   ['--border2',th.isDark?'rgba(255,255,255,.13)':'rgba(0,0,0,.14)'],
   ['--green',th.isDark?'#30d158':'#1a8040'],['--red',th.isDark?'#ff453a':'#cc1010']

async function sendEmail(to,subject,html){
  // In production: POST to your backend /api/send-email instead
  try{
    const res=await emailjs.send(CONFIG.EMAILJS_SERVICE_ID,CONFIG.EMAILJS_TEMPLATE_ID,{

  }catch(e){
    console.warn('EmailJS error:',e);
    return{ok:false,err:e?.text||'Email send failed'};
  }
}

// VOICE INPUT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function parseVoice(text){
  const t=text.toLowerCase();
  const am=text.match(/\$?(\d+(?:\.\d{1,2})?)/);
  const amount=am?parseFloat(am[1]):null;
  const isInc=/earn|receiv|got paid|income|salary|deposit|freelan|invest|dividend|gift/i.test(t);
  const type=isInc?'income':'expense';
  const cm=[
    {id:'food',     w:['food','lunch','dinner','breakfast','restaurant','coffee','pizza','grocery','groceries','chipotle','starbucks','burger','eat','meal','snack']},
    {id:'transport',w:['uber','lyft','bus','metro','gas','fuel','parking','train','cab','taxi','flight','commute']},
    {id:'bills',    w:['bill','electric','water','internet','rent','netflix','spotify','subscription','phone bill','electricity']},
    {id:'shopping', w:['shop','shopping','cloth','amazon','online','store','bought','purchase','mall','shoes','shirt']},
    {id:'health',   w:['doctor','pharmacy','medicine','gym','health','dental','hospital','vitamin','medical']},
    {id:'entertainment',w:['movie','concert','game','fun','show','ticket','bar','club','party']},
    {id:'education',w:['course','book','school','tuition','study','udemy','class','workshop']},
    {id:'travel',   w:['travel','hotel','flight','vacation','trip','airbnb']},
    {id:'salary',   w:['salary','paycheck','wage','payday','got paid']},
    {id:'freelance',w:['freelance','project','client','invoice','contract','consulting']},
    {id:'investment',w:['dividend','stock','crypto','invest','profit','returns']},
    {id:'gift',     w:['gift','present','birthday money']},
  ];
  let category='other';
  for(const c of cm){if(c.w.some(w=>t.includes(w))){category=c.id;break;}}
  const note=text.replace(/\$?\d+(?:\.\d{1,2})?\s*(?:dollars?|bucks?)?/gi,'').replace(/\b(spent|paid|bought|received|earned|got|on|for|at|the|a|an|i|my|just)\b/gi,'').replace(/\s+/g,' ').trim().slice(0,40)||null;
  return{amount,type,category,note};
}

function VoiceButton({onResult,toast}){
  const [state,setState]=useState('idle');
  const [transcript,setTranscript]=useState('');
  const recRef=useRef(null);
  const sup=typeof window!=='undefined'&&('webkitSpeechRecognition' in window||'SpeechRecognition' in window);

  const start=()=>{
    if(!sup){toast({icon:'🎤',title:'Not supported',body:'Voice works in Chrome (Android/desktop) or Safari.',warn:true});return;}
    try{
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      const r=new SR();
      recRef.current=r;
      r.lang='en-US';r.interimResults=true;r.maxAlternatives=1;
      r.onstart=()=>{setState('listening');setTranscript('');};
      r.onerror=e=>{
        setState('error');
        const msg=e.error==='not-allowed'?'Microphone blocked — allow access in browser settings':e.error==='no-speech'?'No speech detected — try again':'Voice error: '+e.error;
        toast({icon:'🎤',title:'Voice error',body:msg,err:true});
        setTimeout(()=>setState('idle'),3000);
      };
      r.onresult=e=>{
        const txt=Array.from(e.results).map(r=>r[0].transcript).join('');
        setTranscript(txt);
        if(e.results[e.results.length-1].isFinal){
          setState('processing');
          const parsed=parseVoice(txt);
          setTimeout(()=>{
            if(!parsed.amount){
              setState('error');
              toast({icon:'🎤',title:'No amount detected',body:'Try: "spent $50 on groceries"',warn:true});
              setTimeout(()=>setState('idle'),3000);
            }else{
              setState('success');
              setTimeout(()=>{setState('idle');setTranscript('');onResult(parsed,txt);},900);
            }
          },350);
        }
      };
      r.start();
    }catch(e){
      toast({icon:'❌',title:'Voice unavailable',body:'Could not start microphone: '+e.message,err:true});
    }
  };
  const stop=()=>{try{recRef.current?.stop();}catch{}setState('idle');};
  useEffect(()=>()=>{try{recRef.current?.stop();}catch{}},[]);
  if(!sup)return null;

  const isListening=state==='listening';
  const isProcessing=state==='processing';
  const isSuccess=state==='success';
  const isError=state==='error';
  const isActive=isListening||isProcessing;

  return <div style={{width:'100%'}}>
    <button onClick={isActive?stop:start} style={{width:'100%',padding:'18px 20px',borderRadius:20,border:`1.5px solid ${isError?'var(--red)':isSuccess?'var(--green)':isActive?'var(--accent)':'var(--border2)'}`,background:isError?'var(--r10)':isSuccess?'var(--g10)':isActive?'var(--a10)':'var(--card)',display:'flex',alignItems:'center',gap:14,cursor:'pointer',position:'relative',overflow:'hidden',transition:'all .25s'}}>
      {isActive&&<div style={{position:'absolute',inset:0,borderRadius:20,animation:'voiceRipple 1.5s ease-out infinite',background:'radial-gradient(circle at center,rgba(245,166,35,.15) 0%,transparent 70%)',pointerEvents:'none'}}/>}
      <div style={{width:48,height:48,borderRadius:16,background:isActive?'var(--accent)':isSuccess?'var(--green)':isError?'var(--red)':'var(--card2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .25s',boxShadow:isActive?'0 0 20px rgba(245,166,35,.4)':'none'}}>
        {isProcessing?<div style={{width:20,height:20,border:'2.5px solid rgba(0,0,0,.2)',borderTopColor:'#000',borderRadius:'50%',animation:'spin .6s linear infinite'}}/>
        :isSuccess?<span style={{fontSize:22}}>✓</span>
        :isError?<span style={{fontSize:22}}>✕</span>
        :<svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="2" width="6" height="12" rx="3" fill={isActive?'#000':'var(--sub)'}/>
          <path d="M5 10a7 7 0 0014 0" stroke={isActive?'#000':'var(--sub)'} strokeWidth="2" strokeLinecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke={isActive?'#000':'var(--sub)'} strokeWidth="2" strokeLinecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke={isActive?'#000':'var(--sub)'} strokeWidth="2" strokeLinecap="round"/>
        </svg>}
      </div>
      <div style={{flex:1,textAlign:'left'}}>
        <div style={{fontSize:15,fontWeight:800,color:isError?'var(--red)':isSuccess?'var(--green)':isActive?'var(--accent)':'var(--sub)',marginBottom:3}}>
          {isListening?'Listening…':isProcessing?'Processing…':isSuccess?'Got it! Entry filled.':isError?'Try again':'Add by Voice'}
        </div>
        <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.4}}>
          {transcript?<span style={{color:'var(--text)',fontStyle:'italic'}}>"{transcript}"</span>
          :isListening?<span style={{color:'var(--accent)'}}>Speak your transaction now…</span>
          :'Say "spent $50 on groceries" to auto-fill'}
        </div>
      </div>
      {isListening&&<div style={{display:'flex',alignItems:'center',gap:3,flexShrink:0}}>
        {[1,2,3,4,3].map((h,i)=><div key={i} style={{width:3,borderRadius:2,background:'var(--accent)',height:6*h+'px',animation:`waveBar .8s ease-in-out ${i*.1}s infinite alternate`}}/>)}
      </div>}
    </button>
  </div>;
}

// AUTH — Email only (phone hidden for now)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function AuthScreen({onAuth,toast}){
  const [step,setStep]=useState('form'); // form | otp
  const [isLogin,setIsLogin]=useState(true);
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [otp,setOtp]=useState(['','','','','','']);
  const [genOtp,setGenOtp]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [timer,setTimer]=useState(0);
  const refs=[useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];
  const tiRef=useRef(null);

  const startTimer=()=>{clearInterval(tiRef.current);setTimer(30);tiRef.current=setInterval(()=>setTimer(t=>{if(t<=1){clearInterval(tiRef.current);return 0;}return t-1;}),1000);};

  // PHONE AUTH IS TEMPORARILY HIDDEN — enable by setting SHOW_PHONE=true
  const SHOW_PHONE=false; // set to true when SMS backend is ready

  const doSend=async(addr,code)=>{
    const res=await sendOTPEmail({toEmail:addr,toName:name,otp:code,isNewUser:!isLogin});
    if(!res.ok){
      // Fallback: show code on screen if email fails
      toast({icon:'💡',title:'Email failed — your code is: '+code,body:'Copy this code and enter it below. Check spam too.',warn:true});
    }else{
      toast({icon:'📧',title:'Code sent!',body:'Check '+addr+' (and spam folder).'});
    }
  };

  const submit=async()=>{
    setErr('');
    if(!email.includes('@')||!email.includes('.')){setErr('Enter a valid email address.');return;}
    if(!isLogin&&!name.trim()){setErr('Please enter your full name.');return;}
    setLoading(true);
    const code=(Math.floor(100000+Math.random()*900000)).toString();
    setGenOtp(code);setOtp(['','','','','','']);
    await doSend(email,code);
    setStep('otp');setLoading(false);startTimer();
    setTimeout(()=>refs[0].current?.focus(),400);
  };

  const handleDigit=(i,val)=>{
    setErr('');
    const d=val.replace(/\D/g,'');
    if(d.length>1){const digits=d.slice(0,6).split('');const no=[...otp];digits.forEach((x,j)=>{no[j]=x;});setOtp(no);refs[Math.min(digits.length,5)].current?.focus();return;}
    const no=[...otp];no[i]=d;setOtp(no);
    if(d&&i<5)refs[i+1].current?.focus();
  };
  const handleBs=(i,e)=>{if(e.key==='Backspace'&&!otp[i]&&i>0){const no=[...otp];no[i-1]='';setOtp(no);refs[i-1].current?.focus();}};

  const verify=()=>{
    const entered=otp.join('');
    if(entered!==genOtp){setErr('Incorrect code — please try again.');setOtp(['','','','','','']);refs[0].current?.focus();return;}
    const nm=name||(email.split('@')[0]);
    onAuth({name:nm,email,verified:true,uid:'user_'+Date.now()});
  };

  const resend=async()=>{if(timer>0)return;const code=(Math.floor(100000+Math.random()*900000)).toString();setGenOtp(code);setOtp(['','','','','','']);setErr('');startTimer();await doSend(email,code);setTimeout(()=>refs[0].current?.focus(),300);};

  return <div style={{minHeight:'100dvh',minHeight:'-webkit-fill-available',background:'var(--bg)',color:'var(--text)',overflowY:'auto',display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style={{width:'100%',maxWidth:400,padding:'48px 24px',boxSizing:'border-box'}}>
      {/* Logo */}
      <div style={{textAlign:'center',marginBottom:40}}>
        <svg width="72" height="72" viewBox="0 0 96 96" style={{borderRadius:20,display:'block',margin:'0 auto 14px',filter:'drop-shadow(0 8px 28px rgba(245,166,35,.35))'}}>
          <rect width="96" height="96" rx="22" fill="#0a0a12"/>
          <rect x="7" y="7" width="82" height="82" rx="16" fill="url(#aG)"/>
          <defs><linearGradient id="aG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#f5a623"/><stop offset="100%" stopColor="#c8720a"/></linearGradient></defs>
          <text x="48" y="66" textAnchor="middle" fontSize="46" fontWeight="900" fill="white">$</text>
        </svg>
        <div style={{fontSize:30,fontWeight:900,letterSpacing:-.5,marginBottom:4}}>LedgrTrack</div>
        <div style={{fontSize:14,color:'var(--sub)'}}>{step==='otp'?'Enter verification code':isLogin?'Sign in to your account':'Create your account'}</div>
      </div>

      {step==='form'&&<div>
        <div style={{background:'var(--card)',borderRadius:14,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:12}}>
          <div style={{fontSize:10,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>📧 Email Address</div>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" style={{background:'none',border:'none',color:'var(--text)',fontSize:16,width:'100%',outline:'none'}} onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus/>
        </div>
        {!isLogin&&<div style={{background:'var(--card)',borderRadius:14,padding:'14px 16px',border:'1px solid var(--border)',marginBottom:12}}>
          <div style={{fontSize:10,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>👤 Full Name</div>
          <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" style={{background:'none',border:'none',color:'var(--text)',fontSize:16,width:'100%',outline:'none'}}/>
        </div>}
        {err&&<div style={{background:'var(--r10)',border:'1px solid rgba(255,69,58,.3)',borderRadius:10,padding:'10px 14px',fontSize:13,color:'var(--red)',marginBottom:12}}>{err}</div>}
        <button onClick={submit} disabled={loading} style={{width:'100%',padding:'15px',borderRadius:14,border:'none',background:loading?'var(--card2)':'var(--accent)',color:loading?'var(--muted)':'#000',fontSize:15,fontWeight:800,cursor:loading?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,transition:'all .2s'}}>
          {loading?<><div style={{width:16,height:16,border:'2.5px solid rgba(0,0,0,.2)',borderTopColor:'#000',borderRadius:'50%',animation:'spin .7s linear infinite'}}/> Sending code…</>:'Send Verification Code →'}
        </button>
        <div style={{textAlign:'center',marginTop:16,fontSize:13}}>
          <span style={{color:'var(--muted)'}}>{isLogin?'New here? ':'Already have an account? '}</span>
          <span onClick={()=>{setIsLogin(!isLogin);setErr('');}} style={{color:'var(--accent)',fontWeight:700,cursor:'pointer'}}>{isLogin?'Create account':'Sign in'}</span>
        </div>
        <div style={{marginTop:20,background:'var(--card)',borderRadius:12,padding:'12px 14px',border:'1px solid var(--border)',display:'flex',gap:10,alignItems:'flex-start'}}>

          <div style={{fontSize:12,color:'var(--sub)',lineHeight:1.6}}>No passwords needed. We send a 6-digit code to your email every time you sign in. Your data stays private on your device.</div>

        {SHOW_PHONE&&<div style={{display:'none'}}>Phone auth placeholder</div>}
      </div>}

      {step==='otp'&&<div>
        <button onClick={()=>{setStep('form');setOtp(['','','','','','']);setErr('');}} style={{background:'none',border:'none',color:'var(--accent)',fontSize:14,fontWeight:700,marginBottom:20,display:'flex',alignItems:'center',gap:4,padding:0,cursor:'pointer'}}>‹ Back</button>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{width:64,height:64,borderRadius:18,background:'var(--b10)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,margin:'0 auto 14px'}}>📧</div>
          <div style={{fontSize:18,fontWeight:800,marginBottom:6}}>Check your email</div>
          <div style={{fontSize:13,color:'var(--sub)',lineHeight:1.6}}>Code sent to <strong style={{color:'var(--accent)'}}>{email}</strong><br/>Check spam if not received within 1 min</div>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:10}}>
          {[0,1,2,3,4,5].map(i=><input key={i} ref={refs[i]} type="tel" inputMode="numeric" maxLength={6} value={otp[i]||''}
            onChange={e=>handleDigit(i,e.target.value)} onKeyDown={e=>handleBs(i,e)}
            style={{width:46,height:56,borderRadius:12,border:`2px solid ${err?'var(--red)':otp[i]?'var(--accent)':'var(--border2)'}`,background:err?'var(--r10)':otp[i]?'var(--a10)':'var(--card)',color:'var(--text)',fontSize:26,fontWeight:900,textAlign:'center',outline:'none',transition:'all .15s',animation:err?'shake .3s':'none'}}/>)}
        </div>
        {err&&<p style={{color:'var(--red)',fontSize:13,textAlign:'center',fontWeight:600,marginBottom:8}}>{err}</p>}
        <button onClick={verify} disabled={otp.join('').length<6} style={{width:'100%',padding:'15px',borderRadius:14,border:'none',background:otp.join('').length===6?'var(--accent)':'var(--card2)',color:otp.join('').length===6?'#000':'var(--muted)',fontSize:15,fontWeight:800,cursor:otp.join('').length===6?'pointer':'default',marginTop:4,transition:'all .2s'}}>
          {otp.join('').length===6?'Verify & Sign In ✓':'Enter 6-digit code'}
        </button>
        <div style={{textAlign:'center',marginTop:14,fontSize:13}}>
          <span style={{color:'var(--muted)'}}>Didn't receive it? </span>
          <span onClick={resend} style={{color:timer>0?'var(--muted)':'var(--accent)',fontWeight:700,cursor:timer>0?'default':'pointer'}}>{timer>0?`Resend in ${timer}s`:'Resend code'}</span>
        </div>
      </div>}
    </div>
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TX SHEET
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function TxSheet({tx,onSave,onClose,defSched=false,toast,cur='USD',voiceDefaults=null}){
  const ed=!!tx;
  const [type,setType]=useState(tx?.type||voiceDefaults?.type||'expense');
  const [amt,setAmt]=useState(tx?String(tx.amount):voiceDefaults?.amount?String(voiceDefaults.amount):'');
  const [cat,setCat]=useState(tx?.category||voiceDefaults?.category||'');
  const [note,setNote]=useState(tx?.note||voiceDefaults?.note||'');
  const [date,setDate]=useState(tx?.date||todayStr());
  const [remindTime,setRemindTime]=useState(tx?.remindTime||'09:00');
  const [sched,setSched]=useState(tx?.scheduled||defSched);
  const [notify,setNotify]=useState(tx?.notifyWhenDue!==false);
  const cats=type==='income'?INC_CATS:EXP_CATS;
  const numK=[['7','8','9'],['4','5','6'],['1','2','3'],['.',  '0','⌫']];
  const tap=v=>{if(v==='⌫'){setAmt(a=>a.slice(0,-1));return;}if(v==='.'&&amt.includes('.'))return;if(amt.replace('.','').length>=9)return;setAmt(a=>a===''&&v==='.'?'0.':a+v);};
  const save=()=>{
    const n=parseFloat(amt);
    if(!n||n<=0){toast({icon:'⚠️',title:'Enter an amount',body:'Please type a dollar amount.',warn:true});return;}
    if(!cat){toast({icon:'⚠️',title:'Pick a category',body:'Select a category to save.',warn:true});return;}
    onSave({...(tx||{}),id:tx?.id||Date.now(),type,amount:n,category:cat,note:note.trim(),date,remindTime,scheduled:sched,notifyWhenDue:sched&&notify});
    onClose();
  };
  const sym=cur==='EUR'?'€':cur==='GBP'?'£':'$';
  const disp=amt?`${sym}${parseFloat(amt).toLocaleString('en-US',{minimumFractionDigits:amt.includes('.')&&amt.split('.')[1]?.length>0?Math.min(amt.split('.')[1].length,2):0})}`:`${sym}0.00`;

  return <Modal onBg={onClose} ch={<>
    <div style={{display:'flex',justifyContent:'center',padding:'10px 0 2px'}}><div style={{width:36,height:4,borderRadius:2,background:'var(--muted2)'}}/></div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 20px 10px'}}>
      <div style={{fontSize:19,fontWeight:800}}>{ed?'Edit':'Add'} Transaction</div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>setSched(!sched)} style={{padding:'6px 12px',borderRadius:10,border:`1px solid ${sched?'var(--accent)':'var(--border2)'}`,background:sched?'var(--a10)':'transparent',color:sched?'var(--accent)':'var(--muted)',fontSize:12,fontWeight:700,cursor:'pointer'}}>📅 {sched?'Scheduled':'Future'}</button>
        <button onClick={onClose} style={{width:30,height:30,borderRadius:15,background:'var(--card2)',border:'none',color:'var(--muted)',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>×</button>
      </div>
    </div>
    <div style={{display:'flex',background:'var(--card2)',borderRadius:14,padding:4,gap:4,margin:'0 16px 12px'}}>
      {['expense','income'].map(tp=><button key={tp} onClick={()=>{setType(tp);setCat('');}} style={{flex:1,padding:'11px',borderRadius:10,border:'none',background:type===tp?(tp==='income'?'var(--green)':'var(--red)'):'transparent',color:type===tp?'#fff':'var(--muted)',fontSize:15,fontWeight:800,cursor:'pointer',transition:'all .18s'}}>{tp==='income'?'💚 Income':'❤️ Expense'}</button>)}
    </div>
    <div style={{textAlign:'center',padding:'4px 16px 8px'}}>
      <div style={{fontSize:amt.length>8?32:50,fontWeight:900,letterSpacing:-2,color:amt?(type==='income'?'var(--green)':'var(--red)'):'var(--muted2)',minHeight:58,display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>{disp}</div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,padding:'0 16px 10px'}}>
      {numK.flat().map(k=><button key={k} onClick={()=>tap(k)} style={{height:50,borderRadius:14,border:'1px solid var(--border)',background:k==='⌫'?'var(--card2)':'var(--card)',color:'var(--text)',fontSize:k==='⌫'?16:22,fontWeight:700,cursor:'pointer',transition:'transform .08s'}}>{k}</button>)}
    </div>
    <div style={{padding:'0 16px 10px'}}>
      <div style={{fontSize:10,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Category</div>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(cats.length,5)},1fr)`,gap:6}}>
        {cats.map(c=><button key={c.id} onClick={()=>setCat(c.id)} style={{padding:'7px 4px',borderRadius:12,border:`1.5px solid ${cat===c.id?c.color:'var(--border)'}`,background:cat===c.id?c.color+'22':'var(--card2)',display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer',transition:'all .15s'}}>
          <span style={{fontSize:18}}>{c.icon}</span>
          <span style={{fontSize:9,color:cat===c.id?c.color:'var(--muted)',fontWeight:700,whiteSpace:'nowrap'}}>{c.label}</span>
        </button>)}
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'0 16px 10px'}}>
      {[{label:'Note',el:<input value={note} onChange={e=>setNote(e.target.value)} placeholder="Optional…" style={{background:'none',border:'none',color:'var(--text)',fontSize:14,width:'100%',outline:'none'}}/>},{label:sched?'Due Date':'Date',el:<input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{background:'none',border:'none',color:'var(--text)',fontSize:13,width:'100%',outline:'none'}}/>}].map((f,i)=><div key={i} style={{background:'var(--card2)',borderRadius:12,padding:'10px 14px',border:'1px solid var(--border)'}}>
        <div style={{fontSize:9,color:'var(--muted)',marginBottom:5,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>{f.label}</div>
        {f.el}
      </div>)}
    </div>
    {sched&&<div style={{padding:'0 16px 10px'}}>
      <div style={{background:'var(--card2)',borderRadius:14,padding:'12px 14px',border:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:notify?12:0}}>
          <div><div style={{fontSize:14,fontWeight:700}}>Email reminder when due</div><div style={{fontSize:11,color:'var(--sub)',marginTop:2}}>Send email on the due date</div></div>
          <Tog on={notify} fn={()=>setNotify(!notify)}/>
        </div>
        {notify&&<div>
          <div style={{fontSize:10,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Remind at time</div>
          <input type="time" value={remindTime} onChange={e=>setRemindTime(e.target.value)} style={{width:'100%',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:10,color:'var(--text)',fontSize:16,padding:'10px 14px',outline:'none',fontWeight:700}}/>
        </div>}
      </div>
    </div>}
    <div style={{padding:'4px 16px 8px'}}>
      <button onClick={save} style={{width:'100%',padding:'16px',borderRadius:16,border:'none',background:!amt||!cat?'var(--card2)':'var(--accent)',color:!amt||!cat?'var(--muted)':'#000',fontSize:16,fontWeight:800,cursor:'pointer',transition:'all .2s'}}>{ed?'Update Transaction':'Save Transaction'}</button>
    </div>
  </>}/>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HOME SCREEN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function HomeScreen({txns,onNav,onAdd,onSched,onEditTx,user,budgetGoal,incomeGoal,cur}){
  const now=new Date();
  const live=txns.filter(x=>!x.scheduled);
  const mn=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const inc=mn.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=mn.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const bal=live.reduce((s,x)=>x.type==='income'?s+x.amount:s-x.amount,0);
  const recent=[...live].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  const upcoming=txns.filter(x=>x.scheduled).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,3);
  const hr=now.getHours();
  const greet=hr<5?'Good night':hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';

  return <div style={{color:'var(--text)',padding:'0 16px',paddingTop:'var(--hdr)',paddingBottom:'var(--tab-pb)'}}>
    <div style={{paddingTop:8,paddingBottom:6}}>
      <div style={{fontSize:13,color:'var(--sub)',marginBottom:2}}>{greet}{user?.name?`, ${user.name}`:''} 👋</div>
      <div style={{fontSize:28,fontWeight:900,letterSpacing:-.5}}>Dashboard</div>
    </div>
    {/* Hero balance */}
    {/* Hero balance — rainbow top line */}
    <div style={{background:'linear-gradient(135deg,var(--hero-a),var(--hero-b))',borderRadius:26,padding:'22px',marginBottom:12,position:'relative',overflow:'hidden',border:'1px solid var(--border)'}}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'linear-gradient(90deg,var(--accent),#ff6b35,var(--purple,#bf5af2),var(--blue),var(--accent))',backgroundSize:'200% 100%',animation:'gradientShift 4s ease infinite'}}/>
      <div style={{position:'absolute',top:-50,right:-50,width:160,height:160,borderRadius:'50%',background:'var(--a10)'}}/>
      <div style={{position:'absolute',bottom:-70,left:-20,width:140,height:140,borderRadius:'50%',background:'var(--a10)',opacity:.4}}/>
      <div style={{fontSize:11,color:'var(--sub)',textTransform:'uppercase',letterSpacing:.8,fontWeight:700,marginBottom:6}}>Total Balance</div>
      <div style={{fontSize:44,fontWeight:900,letterSpacing:-2,color:bal>=0?'var(--text)':'var(--red)',lineHeight:1}}>{bal<0?'-':''}{fmt(Math.abs(bal),cur)}</div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
        <div style={{fontSize:12,color:'var(--sub)'}}>{monthLbl(now.getFullYear(),now.getMonth())}</div>
        <div style={{fontSize:13,fontWeight:700,color:inc-exp>=0?'var(--green)':'var(--red)'}}>Net: {inc-exp>=0?'+':'-'}{fmt(Math.abs(inc-exp),cur)}</div>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      <div style={{background:'linear-gradient(135deg,rgba(48,209,88,.14),rgba(48,209,88,.04))',borderRadius:20,padding:'16px',border:'1px solid rgba(48,209,88,.2)'}}>
        <div style={{fontSize:10,color:'var(--green)',textTransform:'uppercase',letterSpacing:.8,fontWeight:800,marginBottom:6}}>💚 Income</div>
        <div style={{fontSize:22,fontWeight:900,color:'var(--green)'}}>{fmtK(inc,cur)}</div>
        {incomeGoal>0&&<div style={{marginTop:8}}><div style={{height:3,borderRadius:2,background:'rgba(48,209,88,.15)',overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,inc/incomeGoal*100)}%`,background:'var(--green)',borderRadius:2,transition:'width .6s ease'}}/></div><div style={{fontSize:10,color:'rgba(48,209,88,.7)',marginTop:3}}>{Math.round(inc/incomeGoal*100)}% of goal</div></div>}
      </div>
      <div style={{background:'linear-gradient(135deg,rgba(255,69,58,.14),rgba(255,69,58,.04))',borderRadius:20,padding:'16px',border:'1px solid rgba(255,69,58,.2)'}}>
        <div style={{fontSize:10,color:'var(--red)',textTransform:'uppercase',letterSpacing:.8,fontWeight:800,marginBottom:6}}>❤️ Expenses</div>
        <div style={{fontSize:22,fontWeight:900,color:'var(--red)'}}>{fmtK(exp,cur)}</div>
        {budgetGoal>0&&<div style={{marginTop:8}}><div style={{height:3,borderRadius:2,background:'rgba(255,69,58,.15)',overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,exp/budgetGoal*100)}%`,background:exp/budgetGoal>.85?'var(--red)':'#ff9500',borderRadius:2,transition:'width .6s ease'}}/></div><div style={{fontSize:10,color:'rgba(255,69,58,.7)',marginTop:3}}>{Math.round(exp/budgetGoal*100)}% of budget</div></div>}
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:10,marginBottom:20}}>
      <button onClick={onAdd} style={{padding:'15px',borderRadius:16,background:'linear-gradient(135deg,var(--accent),#e8960a)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:15,fontWeight:800,color:'#000',cursor:'pointer',boxShadow:'0 4px 20px var(--a20)'}}>＋ Add Transaction</button>
      <button onClick={onSched} style={{padding:'15px',borderRadius:16,background:'var(--card)',border:'1px solid rgba(245,166,35,.4)',fontSize:13,fontWeight:700,color:'var(--accent)',cursor:'pointer'}}>📅 Plan</button>
    </div>
    {upcoming.length>0&&<div style={{marginBottom:20}}>
      <div style={{fontSize:15,fontWeight:800,marginBottom:10}}>📅 Upcoming</div>
      <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',padding:'4px 0'}}>
        {upcoming.map((x,i)=>{const cat=getCat(x.type,x.category);const days=Math.ceil((new Date(x.date+'T12:00:00')-now)/86400000);return<div key={x.id} onClick={()=>onEditTx(x)} style={{display:'flex',alignItems:'center',padding:'12px 16px',borderBottom:i<upcoming.length-1?'1px solid var(--border)':'none',cursor:'pointer'}}>
          <div style={{width:38,height:38,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:12,flexShrink:0}}>{cat.icon}</div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{x.note||cat.label}</div><div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>{days<=0?'Due today':days===1?'Tomorrow':`In ${days} days`}</div></div>
          <div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)'}}>{x.type==='income'?'+':'-'}{fmt(x.amount,cur)}</div>{x.notifyWhenDue&&<div style={{fontSize:10,color:'var(--accent)',marginTop:1}}>🔔 reminder set</div>}</div>
        </div>;})}
      </div>
    </div>}
    {recent.length>0&&<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:15,fontWeight:800}}>Recent</div>
        <button onClick={()=>onNav(3)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:13,fontWeight:700,cursor:'pointer'}}>See all →</button>
      </div>
      <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',padding:'4px 0'}}>
        {recent.map((x,i)=>{const cat=getCat(x.type,x.category);return<div key={x.id} onClick={()=>onEditTx(x)} style={{display:'flex',alignItems:'center',padding:'12px 16px',borderBottom:i<recent.length-1?'1px solid var(--border)':'none',cursor:'pointer'}}>
          <div style={{width:38,height:38,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:12,flexShrink:0}}>{cat.icon}</div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{x.note||cat.label}</div><div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>{dayStr(x.date)}</div></div>
          <div style={{fontSize:15,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)',marginLeft:8}}>{x.type==='income'?'+':'-'}{fmt(x.amount,cur)}</div>
        </div>;})}
      </div>
    </div>}
    {txns.length===0&&<div style={{textAlign:'center',padding:'60px 0',color:'var(--muted)'}}>
      <div style={{fontSize:48,marginBottom:12}}>💰</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>No transactions yet</div>
      <div style={{fontSize:14}}>Tap Add Transaction to get started</div>
    </div>}
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ADD SCREEN (with voice)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function AddScreen({onAdd,toast,cur,defSched}){
  const [showSheet,setShowSheet]=useState(false);
  const [voiceDefaults,setVD]=useState(null);
  const [schedSheet,setSchedSheet]=useState(false);

  return <div style={{color:'var(--text)',padding:'var(--hdr) 16px 0',paddingBottom:'var(--tab-pb)'}}>
    <div style={{fontSize:28,fontWeight:900,letterSpacing:-.5,marginBottom:20}}>Add Transaction</div>
    <VoiceButton toast={toast} onResult={(parsed,transcript)=>{setVD(parsed);setShowSheet(true);toast({icon:'🎤',title:'Voice parsed!',body:`"${transcript}"`,});}}/>
    <div style={{height:16}}/>
    <button onClick={()=>{setVD(null);setShowSheet(true);}} style={{width:'100%',padding:'16px',borderRadius:18,background:'var(--accent)',border:'none',fontSize:16,fontWeight:800,color:'#000',marginBottom:12,cursor:'pointer'}}>＋ Add Expense / Income</button>
    <button onClick={()=>setSchedSheet(true)} style={{width:'100%',padding:'16px',borderRadius:18,background:'var(--card)',border:'1px solid var(--border)',fontSize:15,fontWeight:700,color:'var(--text)',cursor:'pointer'}}>📅 Schedule Future Transaction</button>
    {showSheet&&<TxSheet cur={cur} toast={toast} voiceDefaults={voiceDefaults} onClose={()=>{setShowSheet(false);setVD(null);}} onSave={tx=>{onAdd(tx);toast({icon:'✅',title:'Saved!',body:`${tx.type==='income'?'+':'-'}${fmt(tx.amount,cur)} · ${tx.note||getCat(tx.type,tx.category).label}`,});}}/>}
    {schedSheet&&<TxSheet cur={cur} toast={toast} defSched={true} onClose={()=>setSchedSheet(false)} onSave={tx=>{onAdd(tx);toast({icon:'📅',title:'Scheduled!',body:`${tx.note||'Transaction'} due ${dayStr(tx.date)}`,});}}/>}
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CHARTS — Fixed overflow, interactive tooltips
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Tooltip({tip}){
  if(!tip)return null;
  return <div className="chart-tip" style={{left:tip.x,top:tip.y,transform:'translateX(-50%)'}}>
    {tip.lines.map((l,i)=><div key={i} style={{color:l.c||'var(--text)',fontWeight:l.bold?700:400,marginBottom:i<tip.lines.length-1?3:0}}>{l.t}</div>)}
  </div>;
}

function ChartsScreen({txns,cur}){
  const now=new Date();
  const [vm,setVm]=useState(now.getMonth());
  const [vy,setVy]=useState(now.getFullYear());
  const [activeChart,setActiveChart]=useState('overview');
  const [selCat,setSelCat]=useState(null);
  const [selDay,setSelDay]=useState(null);
  const [tip,setTip]=useState(null);
  const chartRef=useRef(null);

  const nav=d=>{let m=vm+d,y=vy;if(m<0){m=11;y--;}if(m>11){m=0;y++;}setVm(m);setVy(y);setSelCat(null);setSelDay(null);setTip(null);};

  const live=txns.filter(x=>!x.scheduled);
  const mn=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===vm&&d.getFullYear()===vy;});
  let pm=vm-1,py=vy;if(pm<0){pm=11;py--;}
  const prevMn=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===pm&&d.getFullYear()===py;});
  const inc=mn.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=mn.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const net=inc-exp;
  const prevExp=prevMn.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const prevInc=prevMn.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const isCurrentMonth=vm===now.getMonth()&&vy===now.getFullYear();

  const weeks=useMemo(()=>['W1','W2','W3','W4'].map((l,wi)=>{
    const w=mn.filter(x=>{const d=new Date(x.date+'T12:00:00').getDate();return Math.floor((d-1)/7)===wi;});
    return{l,i:w.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0),e:w.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0),count:w.length};
  }),[mn]);

  const cats=useMemo(()=>EXP_CATS.map(cat=>({...cat,v:mn.filter(x=>x.type==='expense'&&x.category===cat.id).reduce((s,x)=>s+x.amount,0),txns:mn.filter(x=>x.type==='expense'&&x.category===cat.id)})).filter(c=>c.v>0).sort((a,b)=>b.v-a.v),[mn]);

  const dim=new Date(vy,vm+1,0).getDate();
  const fd=new Date(vy,vm,1).getDay();
  const days=useMemo(()=>Array.from({length:dim},(_,i)=>{
    const d=i+1,dt=mn.filter(x=>new Date(x.date+'T12:00:00').getDate()===d);
    const ni=dt.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
    const ne=dt.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
    return{d,net:ni-ne,inc:ni,exp:ne,count:dt.length,txns:dt};
  }),[mn,dim]);

  // Running balance — ALL time, not just this month (fix for high values)
  const sortedAll=useMemo(()=>[...live].sort((a,b)=>new Date(a.date)-new Date(b.date)),[live]);
  let runBal=0;
  const balPts=useMemo(()=>{let r=0;return sortedAll.map(x=>{r+=x.type==='income'?x.amount:-x.amount;return{y:r,date:x.date,note:x.note||getCat(x.type,x.category).label};});},[sortedAll]);

  // 6-month trend
  const sixMonths=useMemo(()=>Array.from({length:6},(_,i)=>{
    let m=vm-5+i,y=vy;while(m<0){m+=12;y--;}while(m>11){m-=12;y++;}
    const mt=live.filter(x=>{const d=new Date(x.date+'T12:00:00');return d.getMonth()===m&&d.getFullYear()===y;});
    const mi=mt.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
    const me=mt.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
    return{l:new Date(y,m,1).toLocaleString('default',{month:'short'}),m,y,i:mi,e:me,net:mi-me,isCur:m===vm&&y===vy};
  }),[live,vm,vy]);

  // Chart dimensions — responsive
  const W=320,BH=120,pad=8;

  // Weekly bars — FIXED: proper clip and bounded heights
  const maxW=Math.max(...weeks.map(w=>Math.max(w.i,w.e)),1);
  const barW=28;const barGap=6;const slotW=W/4;

  // Running balance — FIXED: proper y-axis scaling with padding
  const balVals=balPts.map(p=>p.y);
  const balMin=balVals.length?Math.min(...balVals):0;
  const balMax=balVals.length?Math.max(...balVals):1;
  const balRange=balMax-balMin||1;
  const balH=90;
  const balPad=12;
  // y normalizer — maps value to pixel y within [balPad, balH-balPad]
  const balY=v=>balPad+(1-(v-balMin)/balRange)*(balH-balPad*2);
  const balLine=balPts.map((p,i)=>(i===0?'M':'L')+(balPad+i*(W-balPad*2)/Math.max(balPts.length-1,1)).toFixed(1)+','+balY(p.y).toFixed(1)).join(' ');
  const balArea=balLine+(balPts.length?' L'+(balPad+((balPts.length-1)*(W-balPad*2)/Math.max(balPts.length-1,1))).toFixed(1)+','+balH+' L'+balPad+','+balH+' Z':'');
  const balZeroY=balY(Math.max(balMin,0));
  // grid lines for running balance
  const balGridVals=[balMin,balMin+(balRange*.25),balMin+(balRange*.5),balMin+(balRange*.75),balMax];

  // 6-month trend
  const maxSix=Math.max(...sixMonths.flatMap(m=>[m.i,m.e]),1);
  const trendBH=100;
  const sixBarW=Math.floor((W-20)/sixMonths.length/2-4);

  // Net savings line
  const netVals=sixMonths.map(m=>m.net);
  const netMin=Math.min(...netVals);const netMax=Math.max(...netVals);const netRange=netMax-netMin||1;
  const NH=80;
  const netY=v=>balPad+(1-(v-netMin)/netRange)*(NH-balPad*2);
  const netLine=sixMonths.map((m,i)=>{const cx=balPad+i*(W-balPad*2)/5;const cy=netY(m.net);return(i===0?'M':'L')+cx.toFixed(1)+','+cy.toFixed(1);}).join(' ');
  const netZeroY=netY(Math.max(netMin,0));

  const handleTip=(e,lines)=>{
    const rect=e.currentTarget.getBoundingClientRect();
    const parentRect=chartRef.current?.getBoundingClientRect()||{left:0,top:0};
    const cx=rect.left-parentRect.left+rect.width/2;
    const cy=rect.top-parentRect.top-10;
    setTip({x:Math.max(60,Math.min(cx,260)),y:Math.max(0,cy),lines});
  };

  const CHARTS=[{id:'overview',icon:'📊',l:'Overview'},{id:'spending',icon:'🍩',l:'Spending'},{id:'trends',icon:'📈',l:'Trends'},{id:'calendar',icon:'📅',l:'Calendar'}];

  const kpiCards=[
    {l:'Income',v:inc,prev:prevInc,c:'var(--green)',icon:'💚'},
    {l:'Expenses',v:exp,prev:prevExp,c:'var(--red)',icon:'❤️'},
    {l:'Net',v:net,prev:prevInc-prevExp,c:net>=0?'var(--green)':'var(--red)',icon:net>=0?'📈':'📉'},
    {l:'Savings %',v:inc>0?Math.round(net/inc*100)+'%':'—',prev:null,c:'var(--accent)',icon:'💰'},
  ];

  const pStyle={paddingBottom:'var(--tab-pb)'};

  const selDayData=selDay?days.find(d=>d.d===selDay):null;
  const selCatData=selCat?cats.find(c=>c.id===selCat):null;

  return <div style={{color:'var(--text)',...pStyle}}>
    {/* Sticky header */}
    <div style={{padding:'0 16px 0',paddingTop:'var(--hdr)',background:'var(--bg)',position:'sticky',top:0,zIndex:10,backdropFilter:'blur(10px)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontSize:26,fontWeight:900,letterSpacing:-.5}}>Charts</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>nav(-1)} style={{width:32,height:32,borderRadius:10,background:'var(--card)',border:'1px solid var(--border)',color:'var(--text)',fontSize:18,cursor:'pointer'}}>‹</button>
          <span style={{fontSize:12,color:'var(--sub)',minWidth:96,textAlign:'center',fontWeight:700}}>{monthLbl(vy,vm)}</span>
          <button onClick={()=>nav(1)} disabled={isCurrentMonth} style={{width:32,height:32,borderRadius:10,background:'var(--card)',border:'1px solid var(--border)',color:isCurrentMonth?'var(--muted2)':'var(--text)',fontSize:18,cursor:isCurrentMonth?'default':'pointer'}}>›</button>
        </div>
      </div>
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:12}}>
        {CHARTS.map(ch=><button key={ch.id} onClick={()=>{setActiveChart(ch.id);setTip(null);}} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:99,border:`1px solid ${activeChart===ch.id?'var(--accent)':'var(--border)'}`,background:activeChart===ch.id?'var(--a10)':'var(--card)',color:activeChart===ch.id?'var(--accent)':'var(--muted)',fontSize:13,fontWeight:700,whiteSpace:'nowrap',flexShrink:0,cursor:'pointer',transition:'all .2s'}}>{ch.icon} {ch.l}</button>)}
      </div>
    </div>

    <div style={{padding:'0 16px',position:'relative'}} ref={chartRef} onClick={e=>{if(e.target===chartRef.current)setTip(null);}}>

    {/* ── OVERVIEW ── */}
    {activeChart==='overview'&&<div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
        {kpiCards.map(s=>{const diff=s.prev!=null?s.v-s.prev:null;return<div key={s.l} style={{background:'var(--card)',borderRadius:18,padding:'14px',border:'1px solid var(--border)'}}>
          <div style={{fontSize:20,marginBottom:6}}>{s.icon}</div>
          <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,fontWeight:700,marginBottom:4}}>{s.l}</div>
          <div style={{fontSize:17,fontWeight:900,color:s.c}}>{typeof s.v==='string'?s.v:fmtK(s.v,cur)}</div>
          {diff!=null&&<div style={{fontSize:10,color:diff>=0?'var(--green)':'var(--red)',marginTop:3,fontWeight:700}}>{diff>=0?'▲':'▼'} {fmtK(Math.abs(diff),cur)} vs last mo</div>}
        </div>;})}
      </div>

      {/* Weekly bar chart — FIXED: proper clipping, bounded bars */}
      <div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span style={{fontSize:14,fontWeight:800}}>Weekly Breakdown</span>
          <div style={{display:'flex',gap:12,fontSize:11}}>
            <span style={{color:'var(--green)',fontWeight:700}}>● Income</span>
            <span style={{color:'var(--red)',fontWeight:700}}>● Expense</span>
          </div>
        </div>
        {weeks.every(w=>w.i===0&&w.e===0)?
          <div style={{textAlign:'center',padding:'24px 0',color:'var(--muted)',fontSize:13}}>No data for this month</div>:
          <div style={{position:'relative'}}>
            <svg width="100%" viewBox={`0 0 ${W} ${BH+28}`} style={{overflow:'visible',display:'block'}}>
              <clipPath id="barClip"><rect x="0" y="0" width={W} height={BH}/></clipPath>
              {/* Grid lines inside clip */}
              {[.25,.5,.75,1].map(f=><line key={f} x1="0" y1={BH*(1-f)} x2={W} y2={BH*(1-f)} stroke="rgba(255,255,255,.07)" strokeWidth=".5" strokeDasharray="3,3"/>)}
              {/* Bars — clipped */}
              <g clipPath="url(#barClip)">
                {weeks.map((w,wi)=>{
                  const slotX=wi*slotW;
                  const cx=slotX+(slotW-barW*2-barGap)/2;
                  const ih=Math.min(Math.round((w.i/maxW)*BH),BH);
                  const eh=Math.min(Math.round((w.e/maxW)*BH),BH);
                  return<g key={wi}>
                    <rect x={cx} y={BH-ih} width={barW} height={Math.max(ih,2)} rx="5" fill="#30d158" opacity=".8">
                      <animate attributeName="height" from="0" to={Math.max(ih,2)} dur=".5s" fill="freeze"/>
                      <animate attributeName="y" from={BH} to={BH-ih} dur=".5s" fill="freeze"/>
                    </rect>
                    <rect x={cx+barW+barGap} y={BH-eh} width={barW} height={Math.max(eh,2)} rx="5" fill="#ff453a" opacity=".8">
                      <animate attributeName="height" from="0" to={Math.max(eh,2)} dur=".5s" fill="freeze"/>
                      <animate attributeName="y" from={BH} to={BH-eh} dur=".5s" fill="freeze"/>
                    </rect>
                    {/* Invisible hit targets for tooltip */}
                    <rect x={cx-4} y="0" width={barW*2+barGap+8} height={BH} fill="transparent" style={{cursor:'pointer'}}
                      onMouseMove={e=>handleTip(e,[{t:w.l+' — '+w.count+' txns',bold:true},{t:'Income: '+fmt(w.i,cur),c:'var(--green)'},{t:'Expense: '+fmt(w.e,cur),c:'var(--red)'},{t:'Net: '+fmt(w.i-w.e,cur),c:w.i-w.e>=0?'var(--green)':'var(--red)'}])}
                      onTouchStart={e=>handleTip(e,[{t:w.l+' — '+w.count+' txns',bold:true},{t:'Income: '+fmt(w.i,cur),c:'var(--green)'},{t:'Expense: '+fmt(w.e,cur),c:'var(--red)'},{t:'Net: '+fmt(w.i-w.e,cur),c:w.i-w.e>=0?'var(--green)':'var(--red)'}])}
                      onMouseLeave={()=>setTip(null)}/>
                  </g>;
                })}
              </g>
              {/* X-axis labels (outside clip) */}
              {weeks.map((w,wi)=>{const cx=wi*slotW+(slotW-barW*2-barGap)/2;return<text key={wi} x={cx+barW+barGap/2} y={BH+18} textAnchor="middle" fontSize="11" fill="#888" fontWeight="700">{w.l}</text>;})}
            </svg>
            <Tooltip tip={tip}/>
          </div>
        }
      </div>

      {/* Running balance — FIXED: proper y-axis with grid labels */}
      <div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>Running Balance</div>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:10}}>All-time · Current: <strong style={{color:balPts.length&&balPts[balPts.length-1].y>=0?'var(--green)':'var(--red)'}}>{balPts.length?fmt(balPts[balPts.length-1].y,cur):fmt(0,cur)}</strong></div>
        {balPts.length<2?<div style={{textAlign:'center',padding:'24px 0',color:'var(--muted)',fontSize:13}}>Add more transactions to see trend</div>:<div style={{position:'relative'}}>
          {/* Y-axis labels */}
          <div style={{display:'flex',flexDirection:'column',justifyContent:'space-between',position:'absolute',left:0,top:balPad,bottom:balPad,pointerEvents:'none'}}>
            {[balMax,balMin+(balRange*.5),balMin].map((v,i)=><div key={i} style={{fontSize:9,color:'var(--muted)',lineHeight:1,fontWeight:700}}>{fmtK(v,cur)}</div>)}
          </div>
          <div style={{paddingLeft:36}}>
            <svg width="100%" viewBox={`0 0 ${W} ${balH}`} style={{overflow:'visible',display:'block'}}>
              <defs>
                <linearGradient id="bGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#f5a623" stopOpacity=".35"/>
                  <stop offset="100%" stopColor="#f5a623" stopOpacity="0"/>
                </linearGradient>
                <clipPath id="balClip"><rect x="0" y="0" width={W} height={balH}/></clipPath>
              </defs>
              {/* Grid lines */}
              {balGridVals.map((v,i)=>{const y=balY(v);return<line key={i} x1="0" y1={y.toFixed(1)} x2={W} y2={y.toFixed(1)} stroke="rgba(255,255,255,.07)" strokeWidth=".5" strokeDasharray="3,3"/>;}).filter((_,i)=>i>0&&i<4)}
              {/* Zero line */}
              {balMin<0&&balMax>0&&<line x1="0" y1={balZeroY.toFixed(1)} x2={W} y2={balZeroY.toFixed(1)} stroke="rgba(255,255,255,.13)" strokeWidth="1" strokeDasharray="4,3"/>}
              <g clipPath="url(#balClip)">
                <path d={balArea} fill="url(#bGrad)"/>
                <path d={balLine} fill="none" stroke="#f5a623" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </g>
              {/* Interactive dots */}
              {balPts.filter((_,i)=>i%Math.max(1,Math.floor(balPts.length/8))===0||i===balPts.length-1).map((p,i,arr)=>{
                const idx=balPts.indexOf(p);
                const cx=balPad+idx*(W-balPad*2)/Math.max(balPts.length-1,1);
                const cy=balY(p.y);
                return<circle key={i} cx={cx.toFixed(1)} cy={cy.toFixed(1)} r="5" fill="#f5a623" stroke="#15151e" strokeWidth="2" style={{cursor:'pointer'}}
                  onMouseMove={e=>handleTip(e,[{t:dayStr(p.date),bold:true},{t:'Balance: '+fmt(p.y,cur),c:p.y>=0?'var(--green)':'var(--red)'},{t:'Last: '+p.note}])}
                  onTouchStart={e=>handleTip(e,[{t:dayStr(p.date),bold:true},{t:'Balance: '+fmt(p.y,cur),c:p.y>=0?'var(--green)':'var(--red)'},{t:'Last: '+p.note}])}
                  onMouseLeave={()=>setTip(null)}/>;
              })}
            </svg>
          </div>
          <Tooltip tip={tip}/>
        </div>}
      </div>
    </div>}

    {/* ── SPENDING ── */}
    {activeChart==='spending'&&<div>
      {cats.length===0?<div style={{textAlign:'center',padding:'80px 0',color:'var(--muted)'}}>
        <div style={{fontSize:48,marginBottom:12}}>🍩</div>
        <div style={{fontSize:16,fontWeight:700}}>No expenses this month</div>
        <div style={{fontSize:13,marginTop:6}}>Add some transactions to see breakdown</div>
      </div>:<div>
        <div style={{background:'var(--card)',borderRadius:20,padding:'20px',border:'1px solid var(--border)',marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:800,marginBottom:14}}>Expense Breakdown — tap to drill down</div>
          <div style={{display:'flex',gap:16,alignItems:'center'}}>
            <div style={{flexShrink:0}}>
              <svg width="130" height="130" viewBox="0 0 130 130">
                {(()=>{let a=-Math.PI/2;return cats.map((cat,i)=>{const sweep=(cat.v/exp)*2*Math.PI;const r=54,cx=65,cy=65;const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);const x2=cx+r*Math.cos(a+sweep),y2=cy+r*Math.sin(a+sweep);const large=sweep>Math.PI?1:0;const path=`M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r},0,${large},1,${x2.toFixed(2)},${y2.toFixed(2)} Z`;a+=sweep;return<path key={i} d={path} fill={cat.color||'var(--accent)'} opacity={selCat&&selCat!==cat.id?.35:1} onClick={()=>setSelCat(selCat===cat.id?null:cat.id)} style={{cursor:'pointer',transition:'opacity .2s'}}/>;});})()}
                <circle cx="65" cy="65" r="36" fill="#15151e"/>
                <text x="65" y="61" textAnchor="middle" fontSize="10" fill="#888" fontWeight="700">TOTAL</text>
                <text x="65" y="77" textAnchor="middle" fontSize="13" fill="#f0f0f8" fontWeight="900">{fmtK(exp,cur)}</text>
              </svg>
            </div>
            <div style={{flex:1}}>
              {cats.map(cat=><div key={cat.id} onClick={()=>setSelCat(selCat===cat.id?null:cat.id)} style={{marginBottom:10,cursor:'pointer',opacity:selCat&&selCat!==cat.id?.4:1,transition:'opacity .2s'}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                  <span style={{fontSize:14}}>{cat.icon}</span>
                  <span style={{flex:1,fontSize:11,color:'var(--sub)',fontWeight:600}}>{cat.label}</span>
                  <span style={{fontSize:12,fontWeight:800,color:'var(--red)'}}>{fmtK(cat.v,cur)}</span>
                </div>
                <div style={{height:4,borderRadius:2,background:'var(--card2)',overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${exp>0?Math.round(cat.v/exp*100):0}%`,background:cat.color,borderRadius:2,transition:'width .5s ease'}}/>
                </div>
              </div>)}
            </div>
          </div>
        </div>
        {selCatData&&<div style={{background:'var(--card)',borderRadius:18,padding:'14px',border:'1px solid var(--border)',marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <span style={{fontSize:22}}>{selCatData.icon}</span>
            <div><div style={{fontSize:14,fontWeight:800}}>{selCatData.label}</div><div style={{fontSize:12,color:'var(--sub)'}}>{selCatData.txns.length} transactions · {fmt(selCatData.v,cur)}</div></div>
          </div>
          {selCatData.txns.map(x=><div key={x.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderTop:'1px solid var(--border)'}}>
            <div><div style={{fontSize:13,fontWeight:600}}>{x.note||selCatData.label}</div><div style={{fontSize:11,color:'var(--muted)'}}>{dayStr(x.date)}</div></div>
            <span style={{fontSize:14,fontWeight:800,color:'var(--red)'}}>-{fmt(x.amount,cur)}</span>
          </div>)}
        </div>}
      </div>}
    </div>}

    {/* ── TRENDS ── */}
    {activeChart==='trends'&&<div>
      <div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',marginBottom:12,position:'relative'}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>6-Month Income vs Expenses</div>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:12}}>Tap bars to see values</div>
        <div style={{position:'relative'}}>
          <svg width="100%" viewBox={`0 0 ${W} ${trendBH+28}`} style={{overflow:'visible',display:'block'}}>
            <clipPath id="trendClip"><rect x="0" y="0" width={W} height={trendBH}/></clipPath>
            {[.25,.5,.75,1].map(f=><line key={f} x1="0" y1={trendBH*(1-f)} x2={W} y2={trendBH*(1-f)} stroke="rgba(255,255,255,.07)" strokeWidth=".5" strokeDasharray="3,3"/>)}
            <g clipPath="url(#trendClip)">
              {sixMonths.map((mo,i)=>{
                const slotX=i*(W/6);const cx=slotX+(W/6-sixBarW*2-4)/2;
                const ih=Math.min(Math.round((mo.i/maxSix)*trendBH),trendBH);
                const eh=Math.min(Math.round((mo.e/maxSix)*trendBH),trendBH);
                return<g key={i}>
                  {mo.isCur&&<rect x={slotX} y="0" width={W/6} height={trendBH} fill="#f5a623" opacity=".06" rx="4"/>}
                  <rect x={cx} y={trendBH-ih} width={sixBarW} height={Math.max(ih,2)} rx="4" fill="#30d158" opacity={mo.isCur?1:.6}/>
                  <rect x={cx+sixBarW+4} y={trendBH-eh} width={sixBarW} height={Math.max(eh,2)} rx="4" fill="#ff453a" opacity={mo.isCur?1:.6}/>
                  {/* Hit area with tooltip */}
                  <rect x={slotX} y="0" width={W/6} height={trendBH} fill="transparent" style={{cursor:'pointer'}}
                    onMouseMove={e=>handleTip(e,[{t:mo.l+(mo.isCur?' (current)':''),bold:true},{t:'Income: '+fmt(mo.i,cur),c:'var(--green)'},{t:'Expenses: '+fmt(mo.e,cur),c:'var(--red)'},{t:'Net: '+fmt(mo.net,cur),c:mo.net>=0?'var(--green)':'var(--red)'}])}
                    onTouchStart={e=>handleTip(e,[{t:mo.l+(mo.isCur?' (current)':''),bold:true},{t:'Income: '+fmt(mo.i,cur),c:'var(--green)'},{t:'Expenses: '+fmt(mo.e,cur),c:'var(--red)'},{t:'Net: '+fmt(mo.net,cur),c:mo.net>=0?'var(--green)':'var(--red)'}])}
                    onMouseLeave={()=>setTip(null)}/>
                </g>;
              })}
            </g>
            {sixMonths.map((mo,i)=>{const cx=i*(W/6)+(W/6)/2;return<text key={i} x={cx} y={trendBH+18} textAnchor="middle" fontSize="10" fill={mo.isCur?'var(--accent)':'var(--muted)'} fontWeight={mo.isCur?'900':'400'}>{mo.l}</text>;})}
          </svg>
          <Tooltip tip={tip}/>
        </div>
      </div>

      {/* Net savings line with tooltips */}
      <div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',position:'relative'}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>Net Savings Trend</div>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:10}}>Tap dots for details</div>
        <div style={{position:'relative'}}>
          {/* Y labels */}
          <div style={{display:'flex',flexDirection:'column',justifyContent:'space-between',position:'absolute',left:0,top:balPad,height:NH-balPad*2,pointerEvents:'none'}}>
            {[netMax,netMin].map((v,i)=><div key={i} style={{fontSize:9,color:'var(--muted)',fontWeight:700}}>{fmtK(v,cur)}</div>)}
          </div>
          <div style={{paddingLeft:36}}>
            <svg width="100%" viewBox={`0 0 ${W} ${NH+20}`} style={{overflow:'visible',display:'block'}}>
              <defs><linearGradient id="nGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#f5a623" stopOpacity=".25"/><stop offset="100%" stopColor="#f5a623" stopOpacity="0"/></linearGradient></defs>
              {netMin<0&&netMax>0&&<line x1="0" y1={netZeroY.toFixed(1)} x2={W} y2={netZeroY.toFixed(1)} stroke="rgba(255,255,255,.13)" strokeWidth="1" strokeDasharray="4,3"/>}
              {netMin<0&&<text x="4" y={netZeroY-4} fontSize="9" fill="#888">$0</text>}
              <path d={`${netLine} L${(balPad+5*(W-balPad*2)/5).toFixed(1)},${NH} L${balPad},${NH} Z`} fill="url(#nGrad)"/>
              <path d={netLine} fill="none" stroke="#f5a623" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              {sixMonths.map((mo,i)=>{
                const cx=balPad+i*(W-balPad*2)/5;const cy=netY(mo.net);
                return<g key={i}>
                  <circle cx={cx.toFixed(1)} cy={cy.toFixed(1)} r="6" fill={mo.net>=0?'var(--green)':'var(--red)'} stroke="#15151e" strokeWidth="2.5" style={{cursor:'pointer'}}
                    onMouseMove={e=>handleTip(e,[{t:mo.l+(mo.isCur?' (current)':''),bold:true},{t:'Net: '+fmt(mo.net,cur),c:mo.net>=0?'var(--green)':'var(--red)'},{t:'Income: '+fmt(mo.i,cur),c:'var(--green)'},{t:'Expenses: '+fmt(mo.e,cur),c:'var(--red)'}])}
                    onTouchStart={e=>handleTip(e,[{t:mo.l+(mo.isCur?' (current)':''),bold:true},{t:'Net: '+fmt(mo.net,cur),c:mo.net>=0?'var(--green)':'var(--red)'},{t:'Income: '+fmt(mo.i,cur),c:'var(--green)'},{t:'Expenses: '+fmt(mo.e,cur),c:'var(--red)'}])}
                    onMouseLeave={()=>setTip(null)}/>
                  <text x={cx.toFixed(1)} y={NH+16} textAnchor="middle" fontSize="9" fill={mo.isCur?'var(--accent)':'var(--muted)'}>{mo.l}</text>
                </g>;
              })}
            </svg>
          </div>
          <Tooltip tip={tip}/>
        </div>
      </div>
    </div>}

    {/* ── CALENDAR ── */}
    {activeChart==='calendar'&&<div>
      <div style={{background:'var(--card)',borderRadius:20,padding:'16px',border:'1px solid var(--border)',marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>Day-by-Day Activity</div>
        <div style={{fontSize:12,color:'var(--sub)',marginBottom:12}}>Tap a day to see transactions</div>
        {days.every(d=>d.count===0)?<div style={{textAlign:'center',padding:'24px 0',color:'var(--muted)',fontSize:13}}>No activity this month</div>:<div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:10}}>
            {['Su','Mo','Tu','We','Th','Fr','Sa'].map((d,i)=><div key={i} style={{fontSize:9,color:'var(--muted)',textAlign:'center',fontWeight:700,padding:'2px 0'}}>{d}</div>)}
            {Array.from({length:fd}).map((_,i)=><div key={'e'+i}/>)}
            {days.map(d=>{const isToday=d.d===now.getDate()&&isCurrentMonth;const isSel=selDay===d.d;return<button key={d.d} onClick={()=>setSelDay(selDay===d.d?null:d.d)} style={{aspectRatio:'1',borderRadius:8,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',background:isSel?'var(--accent)':d.count===0?'var(--card2)':d.net>=0?'rgba(48,209,88,.2)':'rgba(255,69,58,.2)',color:isSel?'#000':d.count===0?'var(--muted2)':d.net>=0?'var(--green)':'var(--red)',border:isToday?'2px solid var(--accent)':'1px solid transparent',cursor:'pointer',transition:'all .15s'}}>
              {d.d}
            </button>;})}
          </div>
          <div style={{display:'flex',gap:12,fontSize:11,justifyContent:'center'}}>
            <span style={{color:'var(--green)',fontWeight:700}}>● Positive day</span>
            <span style={{color:'var(--red)',fontWeight:700}}>● Negative day</span>
          </div>
        </div>}
      </div>
      {selDayData&&selDayData.count>0&&<div style={{background:'var(--card)',borderRadius:18,padding:'14px',border:'1px solid var(--border)'}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:10}}>{selDay} {monthLbl(vy,vm)} — {selDayData.count} transaction{selDayData.count!==1?'s':''}</div>
        {selDayData.txns.map(x=>{const cat=getCat(x.type,x.category);return<div key={x.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderTop:'1px solid var(--border)'}}>
          <span style={{fontSize:20}}>{cat.icon}</span>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{x.note||cat.label}</div><div style={{fontSize:11,color:'var(--muted)'}}>{cat.label}</div></div>
          <span style={{fontSize:14,fontWeight:800,color:x.type==='income'?'var(--green)':'var(--red)'}}>{x.type==='income'?'+':'-'}{fmt(x.amount,cur)}</span>
        </div>;})}
        <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between'}}>
          <span style={{fontSize:12,color:'var(--sub)'}}>Day net</span>
          <span style={{fontSize:14,fontWeight:800,color:selDayData.net>=0?'var(--green)':'var(--red)'}}>{selDayData.net>=0?'+':''}{fmt(selDayData.net,cur)}</span>
        </div>
      </div>}
      {selDay&&(!selDayData||selDayData.count===0)&&<div style={{background:'var(--card)',borderRadius:18,padding:'20px',border:'1px solid var(--border)',textAlign:'center',color:'var(--muted)'}}>
        <div style={{fontSize:24,marginBottom:8}}>📅</div><div style={{fontSize:14}}>No transactions on {selDay} {monthLbl(vy,vm).split(' ')[0]}</div>
      </div>}
    </div>}

    </div>
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HISTORY — edit + swipe-delete + filter
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function HistoryScreen({txns,onEdit,onDelete,cur}){
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [showSched,setShowSched]=useState(false);
  const [delConfirm,setDelConfirm]=useState(null);
  const [editSheet,setEditSheet]=useState(null);

  const filtered=txns.filter(x=>{
    if(showSched?!x.scheduled:x.scheduled)return false;
    if(filter!=='all'&&x.type!==filter)return false;
    if(search){const q=search.toLowerCase();const cat=getCat(x.type,x.category);return (x.note||'').toLowerCase().includes(q)||(cat.label||'').toLowerCase().includes(q);}
    return true;
  });
  const sorted=[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const groups=[];
  sorted.forEach(t=>{const last=groups[groups.length-1];if(last&&last.date===t.date)last.items.push(t);else groups.push({date:t.date,items:[t]});});

  return <div style={{color:'var(--text)',padding:'0 16px',paddingBottom:'var(--tab-pb)'}}>
    <div style={{paddingTop:8,marginBottom:12}}>
      <div style={{fontSize:26,fontWeight:900,letterSpacing:-.5,marginBottom:12}}>History</div>
      {/* Search */}
      <div style={{background:'var(--card)',borderRadius:14,padding:'10px 14px',border:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
        <span style={{color:'var(--muted)',fontSize:16}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search transactions…" style={{background:'none',border:'none',color:'var(--text)',fontSize:14,flex:1,outline:'none'}}/>
        {search&&<button onClick={()=>setSearch('')} style={{background:'none',border:'none',color:'var(--muted)',fontSize:16,cursor:'pointer',padding:0}}>×</button>}
      </div>
      {/* Filters */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {['all','income','expense'].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:'7px 14px',borderRadius:99,border:`1px solid ${filter===f?(f==='income'?'var(--green)':f==='expense'?'var(--red)':'var(--accent)'):'var(--border)'}`,background:filter===f?(f==='income'?'var(--g10)':f==='expense'?'var(--r10)':'var(--a10)'):'transparent',color:filter===f?(f==='income'?'var(--green)':f==='expense'?'var(--red)':'var(--accent)'):'var(--muted)',fontSize:13,fontWeight:700,cursor:'pointer'}}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>)}
        <button onClick={()=>setShowSched(!showSched)} style={{padding:'7px 14px',borderRadius:99,border:`1px solid ${showSched?'var(--accent)':'var(--border)'}`,background:showSched?'var(--a10)':'transparent',color:showSched?'var(--accent)':'var(--muted)',fontSize:13,fontWeight:700,cursor:'pointer'}}>📅 Scheduled</button>
      </div>
    </div>

    {sorted.length===0&&<div style={{textAlign:'center',padding:'80px 0',color:'var(--muted)'}}>
      <div style={{fontSize:40,marginBottom:12}}>📋</div>
      <div style={{fontSize:16,fontWeight:700}}>No transactions found</div>
      <div style={{fontSize:13,marginTop:6}}>{search?'Try a different search term':'No transactions match this filter'}</div>
    </div>}

    {groups.map(g=><div key={g.date} style={{marginBottom:16}}>
      <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,marginBottom:6,fontWeight:700}}>{dayStr(g.date)}</div>
      <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',padding:'4px 0'}}>
        {g.items.map((t,i)=>{const cat=getCat(t.type,t.category);return<div key={t.id} style={{display:'flex',alignItems:'center',padding:'11px 14px',borderBottom:i<g.items.length-1?'1px solid var(--border)':'none'}}>
          <div style={{width:36,height:36,borderRadius:11,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,marginRight:10,flexShrink:0}}>{cat.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.note||cat.label}</div>
            <div style={{fontSize:11,color:'var(--sub)',marginTop:1}}>{cat.label}{t.scheduled&&<span style={{color:'var(--accent)',marginLeft:6}}>· 📅 Scheduled</span>}</div>
          </div>
          <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
            <div style={{fontSize:15,fontWeight:800,color:t.type==='income'?'var(--green)':'var(--red)'}}>{t.type==='income'?'+':'-'}{fmt(t.amount,cur)}</div>
            <div style={{display:'flex',gap:6,justifyContent:'flex-end',marginTop:2}}>
              <button onClick={()=>setEditSheet(t)} style={{background:'none',border:'none',color:'var(--blue)',fontSize:11,cursor:'pointer',fontWeight:700,padding:0}}>Edit</button>
              <button onClick={()=>setDelConfirm(t)} style={{background:'none',border:'none',color:'var(--red)',fontSize:11,cursor:'pointer',fontWeight:700,padding:0}}>Delete</button>
            </div>
          </div>
        </div>;})}
      </div>
    </div>)}

    {delConfirm&&<Confirm title="Delete Transaction?" body={`Delete "${delConfirm.note||getCat(delConfirm.type,delConfirm.category).label}" — ${fmt(delConfirm.amount,cur)}? This cannot be undone.`} ok="Delete" danger onOk={()=>{onDelete(delConfirm.id);setDelConfirm(null);}} onCancel={()=>setDelConfirm(null)}/>}
    {editSheet&&<TxSheet cur={cur} tx={editSheet} toast={()=>{}} onClose={()=>setEditSheet(null)} onSave={t=>{onEdit(t);setEditSheet(null);}}/>}
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NOTIFICATIONS PANEL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const REMINDER_SLOTS=['6:00 AM','9:00 AM','12:00 PM','3:00 PM','6:00 PM','9:00 PM'];

function NotificationsPanel({profile,toast}){
  const [pushOn,setPushOn]=useState(()=>LS.get('n_push',false));
  const [emailOn,setEmailOn]=useState(()=>LS.get('n_email',true));
  const [smsOn,setSmsOn]=useState(()=>LS.get('n_sms',false));
  const [summaryOn,setSummaryOn]=useState(()=>LS.get('n_summary',false));
  const [summaryTime,setSummaryTime]=useState(()=>LS.get('n_sum_time','21:00'));
  const [slots,setSlots]=useState(()=>LS.get('n_slots',['9:00 AM','12:00 PM','3:00 PM','6:00 PM']));
  const [perm,setPerm]=useState(()=>'Notification' in window?Notification.permission:'unsupported');
  const [testSent,setTestSent]=useState('');
  const [nextReminder,setNextReminder]=useState('');

  // Persist changes
  useEffect(()=>LS.set('n_push',pushOn),[pushOn]);
  useEffect(()=>LS.set('n_email',emailOn),[emailOn]);
  useEffect(()=>LS.set('n_sms',smsOn),[smsOn]);
  useEffect(()=>LS.set('n_summary',summaryOn),[summaryOn]);
  useEffect(()=>LS.set('n_sum_time',summaryTime),[summaryTime]);
  useEffect(()=>LS.set('n_slots',slots),[slots]);

  // Compute next reminder time
  useEffect(()=>{
    const now=new Date();
    const upcoming=slots.map(s=>{
      const [time,ampm]=s.split(' ');
      const [h,m]=time.split(':');
      let hr=parseInt(h);
      if(ampm==='PM'&&hr!==12)hr+=12;
      if(ampm==='AM'&&hr===12)hr=0;
      const d=new Date();d.setHours(hr,0,0,0);
      if(d<=now)d.setDate(d.getDate()+1);
      return{label:s,d};
    }).sort((a,b)=>a.d-b.d);
    if(upcoming.length){
      const n=upcoming[0];
      const isToday=n.d.getDate()===now.getDate();
      setNextReminder((isToday?'Today':'Tomorrow')+' at '+n.label);
    } else setNextReminder('No reminders scheduled');
  },[slots]);

  const requestPush=async()=>{
    if(!('Notification' in window)){toast({icon:'❌',body:'Push not supported on this browser.',err:true});return;}
    const p=await Notification.requestPermission();
    setPerm(p);
    if(p==='granted'){
      setPushOn(true);
      new Notification('🔔 LedgrTrack',{body:'Push notifications enabled! You\'ll be reminded to log transactions.',icon:'pwa/icons/icon-192.png'});
      toast({icon:'✅',title:'Push enabled!',body:'You\'ll get reminders at your chosen times.'});
    } else {
      toast({icon:'⚠️',title:'Permission denied',body:'Enable notifications in your browser/phone settings.',warn:true});
    }
  };

  const toggleSlot=t=>{
    setSlots(prev=>prev.includes(t)?prev.filter(x=>x!==t):[...prev,t].sort((a,b)=>REMINDER_SLOTS.indexOf(a)-REMINDER_SLOTS.indexOf(b)));
  };

  const sendTestPush=()=>{
    if(perm!=='granted'){toast({icon:'⚠️',body:'Enable push first.',warn:true});return;}
    new Notification('💰 Budget Reminder',{body:'Time to log your transactions! Don\'t forget to track today\'s spending.',icon:'pwa/icons/icon-192.png',tag:'ledgr-test'});
    setTestSent('push');setTimeout(()=>setTestSent(''),3000);
    toast({icon:'📱',title:'Test push sent!',body:'Check your notification center.'});
  };

  const sendTestEmail=async()=>{
    if(!profile.email){toast({icon:'⚠️',body:'Add your email in Profile first.',warn:true});return;}
    setTestSent('email');
    const res=await sendEmail(profile.email,'💰 LedgrTrack — Test Reminder',
      `<div style="font-family:-apple-system,sans-serif;max-width:480px;margin:0 auto;background:#0a0a12;border-radius:20px;padding:32px;color:#f0f0f8">
        <div style="font-size:24px;font-weight:900;color:#f5a623;margin-bottom:16px">$ LedgrTrack</div>
        <h2 style="margin:0 0 12px;font-size:20px">⏰ Budget Reminder</h2>
        <p style="color:#a0a0c0;line-height:1.6;margin:0 0 20px">This is a test reminder from LedgrTrack. Your reminder schedule is set to: <strong style="color:#f0f0f8">${slots.join(', ')}</strong>.</p>
        <p style="color:#a0a0c0;margin:0">Keep tracking your finances! 💰</p>
      </div>`
    );
    if(res.ok) toast({icon:'📧',title:'Test email sent!',body:'Check '+profile.email});
    else toast({icon:'❌',title:'Email failed',body:res.err||'Check your EmailJS config',err:true});
    setTimeout(()=>setTestSent(''),3000);
  };

  const permColor=perm==='granted'?'var(--green)':perm==='denied'?'var(--red)':'var(--accent)';
  const permLabel=perm==='granted'?'✓ Granted':perm==='denied'?'✗ Denied':perm==='unsupported'?'Not supported':'Not requested';

  return <div style={{display:'flex',flexDirection:'column',gap:12}}>
    {/* Push banner */}
    <div style={{background:'linear-gradient(135deg,rgba(245,166,35,.15),rgba(245,166,35,.05))',borderRadius:20,padding:'18px',border:'1px solid rgba(245,166,35,.25)',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:-20,right:-20,width:80,height:80,borderRadius:'50%',background:'rgba(245,166,35,.08)'}}/>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
        <div style={{width:44,height:44,borderRadius:14,background:'rgba(245,166,35,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🔔</div>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:800}}>Push Notifications</div>
          <div style={{fontSize:12,color:permColor,marginTop:2,fontWeight:600}}>{permLabel}</div>
        </div>
        <Tog on={pushOn&&perm==='granted'} fn={()=>perm==='granted'?setPushOn(!pushOn):requestPush()}/>
      </div>
      {perm!=='granted'&&<button onClick={requestPush} style={{width:'100%',padding:'12px',borderRadius:14,border:'none',background:'var(--accent)',color:'#000',fontSize:14,fontWeight:800,cursor:'pointer'}}>
        Enable Push Notifications →
      </button>}
      {perm==='denied'&&<div style={{fontSize:12,color:'var(--red)',marginTop:8,lineHeight:1.5}}>⚠️ Blocked in browser. Go to Settings → Notifications → Allow for this site.</div>}
    </div>

    {/* Email reminders */}
    <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',padding:'14px 16px',borderBottom:'1px solid var(--border)'}}>
        <div style={{width:38,height:38,borderRadius:12,background:'var(--b10)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,marginRight:12}}>📧</div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700}}>Email Reminders</div>
          <div style={{fontSize:12,color:'var(--sub)',marginTop:1}}>{profile.email||'Set email in Profile'}</div>
        </div>
        <Tog on={emailOn} fn={()=>setEmailOn(!emailOn)} col='var(--blue)'/>
      </div>
      <div style={{display:'flex',alignItems:'center',padding:'14px 16px'}}>
        <div style={{width:38,height:38,borderRadius:12,background:'var(--g10)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,marginRight:12}}>💬</div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700}}>SMS Reminders</div>
          <div style={{fontSize:12,color:'var(--sub)',marginTop:1}}>{profile.phone||'Set phone in Profile'}</div>
        </div>
        <Tog on={smsOn} fn={()=>setSmsOn(!smsOn)} col='var(--green)'/>
      </div>
    </div>

    {/* Reminder schedule */}
    <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',padding:'16px'}}>
      <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>⏰ Reminder Schedule</div>
      <div style={{fontSize:12,color:'var(--sub)',marginBottom:14}}>Every 3 hours · 6AM–9PM · Tap to toggle</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        {REMINDER_SLOTS.map(s=>{
          const on=slots.includes(s);
          return <button key={s} onClick={()=>toggleSlot(s)} style={{
            padding:'11px 14px',borderRadius:14,
            border:`1.5px solid ${on?'var(--accent)':'var(--border2)'}`,
            background:on?'var(--a10)':'transparent',
            color:on?'var(--accent)':'var(--muted)',
            fontSize:14,fontWeight:700,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'space-between',
            transition:'all .18s',
          }}>
            <span>{s}</span>
            <span style={{fontSize:16}}>{on?'🔔':'○'}</span>
          </button>;
        })}
      </div>
    </div>

    {/* Daily summary email */}
    <div style={{background:'var(--card)',borderRadius:20,border:'1px solid var(--border)',padding:'16px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:summaryOn?14:0}}>
        <div>
          <div style={{fontSize:14,fontWeight:700}}>📊 Daily Summary Email</div>
          <div style={{fontSize:12,color:'var(--sub)',marginTop:2}}>Get a daily recap of your spending</div>
        </div>
        <Tog on={summaryOn} fn={()=>setSummaryOn(!summaryOn)} col='var(--purple)'/>
      </div>
      {summaryOn&&<div>
        <div style={{fontSize:11,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:.8,fontWeight:700}}>Send at</div>
        <input type="time" value={summaryTime} onChange={e=>setSummaryTime(e.target.value)}
          style={{width:'100%',background:'var(--card2)',border:'1px solid var(--border2)',borderRadius:12,color:'var(--text)',fontSize:18,padding:'12px 16px',outline:'none',fontWeight:800}}/>
      </div>}
    </div>

    {/* Next reminder */}
    <div style={{background:'linear-gradient(135deg,var(--card),var(--card2))',borderRadius:20,border:'1px solid var(--border)',padding:'16px'}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:'var(--sub)',textTransform:'uppercase',letterSpacing:.5}}>Next Reminder</div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:46,height:46,borderRadius:16,background:'var(--a10)',border:'1px solid rgba(245,166,35,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>⏰</div>
