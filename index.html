        </div>
        <div style={{fontSize:13,color:'var(--sub)',lineHeight:1.7,marginBottom:14}}>Every transaction saves to the cloud within 2 seconds. Log in with the same email on any device to load your data instantly — no setup needed.</div>
        <button onClick={async()=>{
          const uk=(user?.email||user?.phone||'').toLowerCase().trim();
          if(!uk){toast({icon:'❌',title:'Not logged in',err:true});return;}
          setSyncing(true);
          toast({icon:'☁️',title:'Syncing...',body:'Uploading your data to cloud...'});
          const res=await cloudSave(uk,packageUserData(txns,budgetGoal,incomeGoal,cur,lang,theme));
          setSyncing(false);
          if(res.ok)toast({icon:'✅',title:'Sync complete!',body:'All data saved. Open on any device to access.'});
          else toast({icon:'❌',title:'Sync failed',body:res.reason,err:true});
        }} style={{width:'100%',padding:'12px',borderRadius:12,border:'none',background:'var(--accent)',color:'#000',fontSize:14,fontWeight:800,cursor:'pointer'}}>Force Sync Now</button>
      </div>
          5. Log in on any phone, tablet or computer → your data loads instantly
        </div>
      </div>
    </div>}

    {/* EXPORT */}
    {sec==='export'&&<div>
      <div style={{background:'var(--card)',borderRadius:18,padding:'18px',border:'1px solid var(--border)',marginBottom:12}}>
        <div style={{fontSize:24,marginBottom:8}}>📄</div>
        <div style={{fontSize:16,fontWeight:800,marginBottom:4}}>Export PDF Report</div>
        <div style={{fontSize:13,color:'var(--sub)',marginBottom:14,lineHeight:1.5}}>Full printable transaction report</div>
        <button onClick={()=>{
          const live2=txns.filter(x=>!x.scheduled).sort((a,b)=>new Date(b.date)-new Date(a.date));
          const bal=live2.reduce((s,x)=>x.type==='income'?s+x.amount:s-x.amount,0);
          const inc2=live2.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
          const exp2=live2.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
          const rows=live2.slice(0,100).map(x=>`<tr><td>${new Date(x.date+'T12:00:00').toLocaleDateString()}</td><td>${x.note||x.category}</td><td style="color:${x.type==='income'?'#1a8040':'#cc1010'};font-weight:700">${x.type==='income'?'+':'-'}${fmtMoney(x.amount,cur)}</td><td style="text-transform:capitalize">${x.category}</td></tr>`).join('');
          const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Ledgr Report</title><style>body{font-family:-apple-system,sans-serif;padding:40px;color:#1c1c1e}h1{font-size:28px;margin:0 0 4px}h2{font-size:15px;color:#888;font-weight:400;margin:0 0 28px}.r{display:flex;gap:20px;margin-bottom:28px}.b{background:#f5f5fa;border-radius:12px;padding:14px 18px}.b .l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}.b .v{font-size:22px;font-weight:900}table{width:100%;border-collapse:collapse}th{background:#f5f5fa;text-align:left;padding:10px 12px;font-size:12px;color:#888}td{padding:10px 12px;border-bottom:1px solid #eee;font-size:13px}.ft{margin-top:30px;font-size:12px;color:#aaa;text-align:center}</style></head><body><h1>Ledgr Report</h1><h2>${user?.name||'Personal'} · ${new Date().toLocaleString('default',{month:'long',year:'numeric'})}</h2><div class="r"><div class="b"><div class="l">Net</div><div class="v" style="color:${bal>=0?'#1a8040':'#cc1010'}">${bal<0?'-':''}${fmtMoney(Math.abs(bal),cur)}</div></div><div class="b"><div class="l">Income</div><div class="v" style="color:#1a8040">${fmtMoney(inc2,cur)}</div></div><div class="b"><div class="l">Expenses</div><div class="v" style="color:#cc1010">${fmtMoney(exp2,cur)}</div></div></div><table><thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Category</th></tr></thead><tbody>${rows}</tbody></table><div class="ft">Generated ${new Date().toLocaleString()} · Ledgr</div><script>window.onload=()=>window.print()<\/script></body></html>`;
          const w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}
        }} style={{width:'100%',padding:'12px',borderRadius:12,border:'none',background:'var(--accent)',color:'#000',fontSize:14,fontWeight:800}}>{t('export')} PDF</button>
      </div>
      <div style={{background:'var(--card)',borderRadius:18,padding:'16px',border:'1px solid var(--border)'}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>📊 Stats</div>
        {[['Transactions',txns.filter(x=>!x.scheduled).length],['Scheduled',txns.filter(x=>x.scheduled).length],['Total income',fmtMoney(txns.filter(x=>!x.scheduled&&x.type==='income').reduce((s,x)=>s+x.amount,0),cur)],['Total expenses',fmtMoney(txns.filter(x=>!x.scheduled&&x.type==='expense').reduce((s,x)=>s+x.amount,0),cur)],['Net',fmtMoney(txns.filter(x=>!x.scheduled).reduce((s,x)=>x.type==='income'?s+x.amount:s-x.amount,0),cur)]].map(([l,v])=><div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
          <span style={{fontSize:13,color:'var(--sub)'}}>{l}</span><span style={{fontSize:13,fontWeight:800}}>{v}</span>
        </div>)}
      </div>
    </div>}

    {/* RESET */}
    {sec==='reset'&&<div>
      <div style={{background:'var(--r10)',borderRadius:20,padding:'20px',border:'1px solid rgba(255,69,58,.2)',marginBottom:14}}>
        <div style={{fontSize:28,marginBottom:8}}>⚠️</div>
        <div style={{fontSize:17,fontWeight:800,color:'var(--red)',marginBottom:8}}>Danger Zone</div>
        <div style={{fontSize:13,color:'var(--sub)',lineHeight:1.6,marginBottom:16}}>Currently showing <strong style={{color:'var(--text)'}}>demo data</strong>. Reset when ready to use your real finances.</div>
        <button onClick={()=>setSR(true)} style={{width:'100%',padding:'14px',borderRadius:14,border:'none',background:'var(--red)',color:'#fff',fontSize:15,fontWeight:800}}>🗑️ Hard Reset — Delete Everything</button>
      </div>
      <div style={{background:'var(--card)',borderRadius:16,padding:'16px',border:'1px solid var(--border)'}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Will delete:</div>
        {['All transactions (past & scheduled)','Auth session & profile','Budget & income goals','Notification settings','Theme preference'].map((item,i,a)=><div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'7px 0',borderBottom:i<a.length-1?'1px solid var(--border)':'none'}}>
          <div style={{width:6,height:6,borderRadius:3,background:'var(--red)',flexShrink:0,marginTop:5}}/>
          <div style={{fontSize:13,color:'var(--sub)'}}>{item}</div>
        </div>)}
      </div>
    </div>}
  </div>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ROOT APP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function App(){
  const [user,setUser]=useState(()=>LS.get('auth_user',null));
  const [tab,setTab]=useState(()=>LS.get('budget_tab',0));
  const [txns,setTxns]=useState(()=>{const s=LS.get('budget_txns',null);return s===null?buildSeed():s;});
  const [theme,setTheme]=useState(()=>{const t=LS.get('budget_theme',null);return t||THEMES[0];});
  const [budgetGoal,setBudget]=useState(()=>LS.get('budget_goal',3000));
  const [incomeGoal,setIncome]=useState(()=>LS.get('income_goal',5000));
  const [cur,setCur]=useState(()=>LS.get('currency','USD'));
  const [lang,setLang]=useState(()=>LS.get('language','en'));
  const [toasts,setToasts]=useState([]);
  const [showAdd,setAdd]=useState(false);
  const [showSched,setSched]=useState(false);
  const [voiceParsed,setVoiceParsed]=useState(null);
  const [notifBanner,setNB]=useState(()=>'Notification' in window&&Notification.permission==='default');
  const [syncing,setSyncing]=useState(false);
  const [syncStatus,setSyncStatus]=useState('');// 'ok'|'error'|''
  const syncTimer=useRef(null);

  useEffect(()=>{applyTheme(theme);},[theme]);
  useEffect(()=>{LS.set('budget_tab',tab);},[tab]);

  // Save to localStorage always. Save to cloud when user is logged in.
  // Key fix: read uk from LS directly (not from user state) so the effect
  // still fires correctly even during the handleAuth state transition.
  useEffect(()=>{
    LS.set('budget_txns',txns);
    const uk=LS.get('active_user_key','');
    if(!uk)return;
    LS.set('txns_'+uk,txns);
    LS.set('budget_goal_'+uk,budgetGoal);
    LS.set('income_goal_'+uk,incomeGoal);
    LS.set('currency_'+uk,cur);
    LS.set('theme_id_'+uk,theme?.id||'dark');
    clearTimeout(syncTimer.current);
    syncTimer.current=setTimeout(async()=>{
      setSyncing(true);
      const result=await cloudSave(uk,packageUserData(txns,budgetGoal,incomeGoal,cur,lang,theme));
      setSyncing(false);
      if(result.ok)setSyncStatus('ok');
      else if(result.reason!=='no_key')setSyncStatus('error');
    },1500);
  },[txns,budgetGoal,incomeGoal,cur,lang,theme]);

  // Splash
  useEffect(()=>{setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),600);}},800);},[]);
  // SW
  useEffect(()=>{'serviceWorker' in navigator&&navigator.serviceWorker.register('./sw.js').catch(()=>{});},[]);
  // Apply language dir
  useEffect(()=>{const l=LANGUAGES.find(x=>x.code===lang);if(l){document.documentElement.dir=l.dir;document.documentElement.lang=l.code;}},[lang]);

  // Scheduled transaction reminders — checks every 30s, sends email at exact remindTime
  useEffect(()=>{
    if(!user)return;
    const fired=new Set();

    const check=async()=>{
      const now=new Date();
      const todayDate=now.toISOString().split('T')[0];
      const tomorrowDate=new Date(now.getTime()+864e5).toISOString().split('T')[0];
      const currentH=now.getHours();
      const currentM=now.getMinutes();

      for(const x of txns.filter(t=>t.scheduled&&t.notifyWhenDue)){
        const isToday=x.date===todayDate;
        const isTomorrow=x.date===tomorrowDate;
        if(!isToday&&!isTomorrow)continue;

        // Parse the reminder time set on the transaction
        const [rh,rm]=(x.remindTime||'09:00').split(':').map(Number);

        // Fire within a 1-minute window of the set time
        const timeMatch=currentH===rh&&currentM>=rm&&currentM<rm+1;
        const fireKey=`sched_${x.id}_${todayDate}_${rh}_${rm}`;

        if(timeMatch&&!fired.has(fireKey)&&!sessionStorage.getItem(fireKey)){
          fired.add(fireKey);
          sessionStorage.setItem(fireKey,'1');

          // Build financial summary for the email
          const live=txns.filter(t=>!t.scheduled);
          const mn=live.filter(t=>{const d=new Date(t.date+'T12:00:00');return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
          const monthIncome=mn.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
          const monthExpense=mn.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
          const balance=live.reduce((s,t)=>t.type==='income'?s+t.amount:s-t.amount,0);

          // Show in-app toast always
          const cat=getCat(x.type,x.category);
          addToast({
            icon:cat.icon,
            title:(isToday?'Due Today: ':'Due Tomorrow: ')+( x.note||cat.label),
            body:(x.type==='income'?'+':'-')+fmtMoney(x.amount,cur)+' · Tap to record',
            warn:isToday,
          });

          // Push notification
          if('Notification' in window&&Notification.permission==='granted'){
            try{new Notification('📅 '+(isToday?'Due Today':'Due Tomorrow')+': '+(x.note||cat.label),{body:(x.type==='income'?'+':'-')+fmtMoney(x.amount,cur),tag:'sched-'+x.id});}catch(e){}
          }

          // Send email — this is the real fix
          if(user.email){
            const res=await sendScheduledEmail({
              toEmail:user.email,
              toName:user.name||user.email.split('@')[0],
              tx:x,
              monthIncome,monthExpense,balance,
              currency:cur,
              isToday,
            });
            if(res.ok){
              addToast({icon:'📧',title:'Reminder email sent!',body:'Check '+user.email+' for transaction details.'});
            }
          }
        }

        // Also show day-of toast (once per day, regardless of remindTime)
        const dayKey=`sched_day_${x.id}_${todayDate}`;
        if(isToday&&!sessionStorage.getItem(dayKey)){
          sessionStorage.setItem(dayKey,'1');
          const cat=getCat(x.type,x.category);
          addToast({icon:cat.icon,title:'Due Today: '+(x.note||cat.label),body:(x.type==='income'?'+':'-')+fmtMoney(x.amount,cur),warn:true});
        }
      }
    };

    check();
    const iv=setInterval(check,30000);// every 30 seconds
    return()=>clearInterval(iv);
  },[txns,user,cur]);

  // addToast MUST be defined before handleAuth so login toasts work
  const addToast=useCallback(t=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p.slice(-2),{...t,id}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),5500);
  },[]);

  const handleTheme=th=>{setTheme(th);LS.set('budget_theme',th);applyTheme(th);};
  const handleBudget=v=>{setBudget(v);LS.set('budget_goal',v);};
  const handleIncome=v=>{setIncome(v);LS.set('income_goal',v);};
  const handleCur=v=>{setCur(v);LS.set('currency',v);};
  const handleLang=v=>{setLang(v);LS.set('language',v);};

  const addTx=tx=>{setTxns(p=>[tx,...p]);addToast({icon:getCat(tx.type,tx.category).icon,title:'Transaction saved',body:`${tx.type==='income'?'+':'-'}${fmtMoney(tx.amount,cur)}`});};
  const editTx=tx=>{setTxns(p=>p.map(x=>x.id===tx.id?tx:x));addToast({icon:'✏️',title:'Updated',body:`${tx.note||tx.category}`});};
  const delTx=id=>{setTxns(p=>p.filter(x=>x.id!==id));addToast({icon:'🗑️',title:'Deleted',body:'Transaction removed.'});};

  const hardReset=()=>{
    ['budget_txns','budget_theme','budget_tab','budget_goal','income_goal','currency','language','notif_en','notif_times','notif_email','notif_phone','auth_user','active_user_key'].forEach(k=>LS.del(k));
    LS.set('budget_txns',[]);LS.set('budget_goal',0);LS.set('income_goal',0);
    setTxns([]);setTheme(THEMES[0]);applyTheme(THEMES[0]);setBudget(0);setIncome(0);setCur('USD');setLang('en');setTab(0);setUser(null);
  };

  const handleAuth=async(u)=>{
    const uk=(u.email||u.phone||u.uid||'').toLowerCase().trim();
    // Set key in LS FIRST — before any state updates — so save effects can use it
    LS.set('active_user_key',uk);
    LS.set('auth_user',u);
    // DO NOT call setUser yet — wait until after local data is loaded
    // so React re-renders with correct data from the start

    // Step 1 — load local data instantly
    const localTxns   =LS.get('txns_'+uk,null);
    const localBudget =LS.get('budget_goal_'+uk,null);
    const localIncome =LS.get('income_goal_'+uk,null);
    const localCur    =LS.get('currency_'+uk,null);
    const localThemeId=LS.get('theme_id_'+uk,null);

    const applyData=(txnsData,budget,income,currency,themeId,source)=>{
      if(txnsData!==null){LS.set('budget_txns',txnsData);setTxns(txnsData);}
      if(budget!=null)setBudget(budget);
      if(income!=null)setIncome(income);
      if(currency)setCur(currency);
      if(themeId){const th=THEMES.find(t=>t.id===themeId)||THEMES[0];setTheme(th);applyTheme(th);}
      const isNew=!txnsData||txnsData.length===0;
      const msg=source==='cloud'
        ?'☁️ Synced from cloud — all transactions loaded!'
        :isNew?'Account ready. Add your first transaction.':'Local data restored.';
      setTimeout(()=>addToast({
        icon:source==='cloud'?'☁️':isNew?'🎉':'👋',
        title:(isNew&&source!=='cloud')?'Welcome, '+(u.name||u.email||u.phone)+'!':'Welcome back, '+(u.name||u.email||u.phone)+'!',
        body:msg,
      }),300);
      return isNew;
    };

    // Apply local data to React state + set user atomically
    if(localTxns!==null){setTxns(localTxns);LS.set('budget_txns',localTxns);}
    if(localBudget!=null)setBudget(localBudget);
    if(localIncome!=null)setIncome(localIncome);
    if(localCur)setCur(localCur);
    if(localThemeId){const th=THEMES.find(t=>t.id===localThemeId)||THEMES[0];setTheme(th);applyTheme(th);}
    setUser(u);// Set user NOW so app renders and save-effects know who is logged in
    applyData(localTxns,localBudget,localIncome,localCur,localThemeId,'local');

    // Step 2 — fetch from cloud (works on any device)
    setSyncing(true);
    addToast({icon:'☁️',title:'Checking cloud...',body:'Loading your latest data from all devices.'});
    const cloud=await cloudLoad(uk);
    setSyncing(false);

    if(cloud&&cloud.txns){
      // Compare timestamps — _savedAt is what we set in cloudSave
      const cloudTs=cloud._savedAt||0;
      const localTs=LS.get('bin_ts_'+uk,0);
      if(cloudTs>=localTs){
        // Cloud is same or newer — always trust cloud on a new device
        LS.set('bin_ts_'+uk,cloudTs);
        applyData(cloud.txns,cloud.budgetGoal,cloud.incomeGoal,cloud.currency,cloud.themeId,'cloud');
        // Cache locally for offline use
        LS.set('txns_'+uk,cloud.txns);
        if(cloud.budgetGoal!=null)LS.set('budget_goal_'+uk,cloud.budgetGoal);
        if(cloud.incomeGoal!=null)LS.set('income_goal_'+uk,cloud.incomeGoal);
        if(cloud.currency)LS.set('currency_'+uk,cloud.currency);
        if(cloud.themeId)LS.set('theme_id_'+uk,cloud.themeId);
      }else{
        addToast({icon:'✅',title:'Already up to date',body:'This device has the latest data.'});
      }
    }else{
      // No cloud data yet — new user or first save has not happened yet
      addToast({icon:'💡',title:'No cloud data yet',body:'Add transactions — they will sync automatically.'});
      // If we have local data, push it to cloud now so other devices can get it
      if(localTxns&&localTxns.length>0){
        cloudSave(uk,packageUserData(localTxns,localBudget||budgetGoal,localIncome||incomeGoal,localCur||cur,lang,theme));
      }
    }

    // Welcome email for first-time users
    if(!localTxns&&!cloud?.txns&&u.email){
      setTimeout(()=>sendWelcomeEmail({toEmail:u.email,toName:u.name,currency:localCur||'USD'}),2000);
    }
  };

  const handleLogout=()=>{
    LS.del('auth_user');
    // Keep user data saved — just clear the session
    setUser(null);setTab(0);
    addToast({icon:'👋',title:'Signed out',body:'Your data is saved. Sign in anytime.'});
  };

  const t=k=>T(lang,k);
  const sharedProps={cur,lang};

  // If not logged in, show auth
  if(!user){
    return<>
      <Toast toasts={toasts}/>
      <AuthScreen onAuth={handleAuth} toast={addToast}/>
    </>;
  }

  return<>
    <Toast toasts={toasts}/>
    {showAdd&&<TxSheet onSave={addTx} onClose={()=>{setAdd(false);setVoiceParsed(null);}} toast={addToast} voiceDefaults={voiceParsed} {...sharedProps}/>}
    {showSched&&<TxSheet onSave={addTx} onClose={()=>setSched(false)} defSched toast={addToast} {...sharedProps}/>}

    {/* Tablet sidebar */}
    <div id="sidebar" style={{display:'none',width:230,flexShrink:0,background:'var(--card)',borderRight:'1px solid var(--border)',flexDirection:'column',paddingTop:`calc(var(--safe-t) + 24px)`,paddingBottom:24}}>
      <div style={{padding:'0 20px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:12}}>
        <svg width="40" height="40" viewBox="0 0 100 100" style={{borderRadius:10,flexShrink:0}}>
          <rect width="100" height="100" rx="20" fill="#0a0a12"/>
          <rect x="8" y="8" width="84" height="84" rx="14" fill="url(#sg2)"/>
          <defs><linearGradient id="sg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#f5a623"/><stop offset="100%" stopColor="#c8720a"/></linearGradient></defs>
          <text x="50" y="68" textAnchor="middle" fontSize="48" fontWeight="800" fill="white" fontFamily="-apple-system,sans-serif">$</text>
        </svg>
        <div><div style={{fontSize:18,fontWeight:900}}>Ledgr</div><div style={{fontSize:11,color:'var(--sub)'}}>Finance Tracker</div></div>
      </div>
      <div style={{flex:1,padding:'12px 8px'}}>
        {TABS.map((name,i)=><button key={i} onClick={()=>setTab(i)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderRadius:14,border:'none',background:tab===i?'var(--a10)':'transparent',color:tab===i?'var(--accent)':'var(--muted)',fontSize:14,fontWeight:700,marginBottom:4,transition:'all .15s',textAlign:'left'}}>
          {Icons[name](tab===i)}<span>{t(name.toLowerCase())||name}</span>
        </button>)}
      </div>
      <div style={{padding:'0 12px'}}><div style={{fontSize:12,color:'var(--sub)',padding:'12px 2px',borderTop:'1px solid var(--border)'}}>{user.name||user.email||user.phone}</div></div>
    </div>

    {/* Main */}
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
      {/* Notif banner */}
      {syncing&&<div style={{background:'rgba(78,154,241,.12)',borderBottom:'1px solid rgba(78,154,241,.25)',padding:'8px 16px',display:'flex',alignItems:'center',gap:8,flexShrink:0,zIndex:201}}>
        <div style={{width:14,height:14,borderRadius:'50%',border:'2px solid rgba(78,154,241,.3)',borderTopColor:'var(--blue)',animation:'spin .7s linear infinite',flexShrink:0}}/>
        <span style={{fontSize:12,color:'var(--blue)',fontWeight:600}}>Syncing with cloud...</span>
      </div>}
      {notifBanner&&<div style={{background:'var(--card2)',borderBottom:'1px solid var(--border)',padding:'10px 16px',display:'flex',alignItems:'center',gap:10,flexShrink:0,zIndex:300}}>
        <span style={{fontSize:20}}>🔔</span>
        <div style={{flex:1,fontSize:12,color:'var(--sub)',lineHeight:1.4}}>Enable notifications for daily reminders</div>
        <button onClick={async()=>{const p=await Notification.requestPermission();setNB(false);if(p==='granted')addToast({icon:'🔔',title:'Notifications on',body:'Daily reminders will fire at your chosen times.'});}} style={{padding:'7px 14px',borderRadius:10,background:'var(--accent)',border:'none',color:'#000',fontWeight:800,fontSize:12,whiteSpace:'nowrap'}}>Allow</button>
        <button onClick={()=>setNB(false)} style={{background:'none',border:'none',color:'var(--muted)',fontSize:22,lineHeight:1,cursor:'pointer'}}>×</button>
      </div>}

      {/* Screens */}
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {tab===0&&<HomeScreen txns={txns} onNav={setTab} onAdd={()=>setAdd(true)} onSched={()=>setSched(true)} user={user} budgetGoal={budgetGoal} incomeGoal={incomeGoal} {...sharedProps}/>}
        {tab===1&&<div style={{color:'var(--text)',padding:`var(--hdr) 16px`,paddingBottom:`calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 20px)`}}>
          <div style={{fontSize:26,fontWeight:900,letterSpacing:-.5,marginBottom:20}}>{t('add')}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
            {[{icon:'add',title:t('addTransaction'),sub:'Record now',accent:false,fn:()=>setAdd(true)},{icon:'cal',title:t('schedule'),sub:'Plan ahead',accent:true,fn:()=>setSched(true)}].map((b,i)=><button key={i} onClick={b.fn} style={{padding:'22px 16px',borderRadius:22,border:'1.5px solid '+(b.accent?'var(--accent)':'var(--border)'),background:b.accent?'var(--a10)':'var(--card)',display:'flex',flexDirection:'column',alignItems:'center',gap:8,textAlign:'center'}}>
              <span style={{fontSize:34}}>{b.accent?'📅':'➕'}</span>
              <div style={{fontSize:14,fontWeight:800,color:b.accent?'var(--accent)':'var(--text)'}}>{b.title}</div>
              <div style={{fontSize:11,color:'var(--sub)'}}>{b.sub}</div>
            </button>)}
          </div>
          <VoiceButton toast={addToast} onResult={(parsed,raw)=>{if(!parsed.amount){addToast({icon:'warn',title:'No amount heard',body:'"'+raw+'" - try "spent $50 on groceries"',warn:true});return;}setVoiceParsed(parsed);setAdd(true);}}/>
          <div style={{marginTop:8,padding:'10px 14px',borderRadius:12,background:'var(--card2)',border:'1px solid var(--border)'}}>
            <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.7}}>Try: "Spent $45 on groceries" | "Paid $120 rent" | "Got $3000 salary"</div>
          </div>
        </div>}
        {tab===2&&<ChartsScreen txns={txns} {...sharedProps}/>}
        {tab===3&&<HistoryScreen txns={txns} onEdit={editTx} onDelete={delTx} onAddSched={addTx} toast={addToast} {...sharedProps}/>}
        {tab===4&&<SettingsScreen user={user} onLogout={handleLogout} theme={theme} onTheme={handleTheme} txns={txns} onReset={hardReset} toast={addToast} budgetGoal={budgetGoal} incomeGoal={incomeGoal} onBudget={handleBudget} onIncome={handleIncome} cur={cur} onCur={handleCur} lang={lang} onLang={handleLang}/>}
      </div>

      {/* Tab bar */}
      <div id="tabbar" style={{flexShrink:0,background:'var(--card)',borderTop:'.5px solid var(--border)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',paddingTop:8,paddingBottom:`calc(8px + env(safe-area-inset-bottom,0px))`,display:'flex',justifyContent:'space-around',alignItems:'center',zIndex:100}}>
        {TABS.map((name,i)=><button key={i} onClick={()=>setTab(i)} style={{background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 10px',borderRadius:12,opacity:tab===i?1:.4,transition:'opacity .18s',minWidth:48}}>
          {Icons[name](tab===i)}
          <span style={{fontSize:9,color:tab===i?'var(--accent)':'var(--muted)',fontWeight:700,letterSpacing:.3}}>{(t(name.toLowerCase())||name).toUpperCase().slice(0,7)}</span>
        </button>)}
      </div>
    </div>
  </>;
}

try{
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}catch(err){
  // Show error instead of infinite loading
  const s=document.getElementById('splash');
  if(s){s.innerHTML='<div style="text-align:center;padding:40px;color:#ff453a"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">App failed to load</div><div style="font-size:12px;color:#a0506080;margin-bottom:16px">'+err.message+'</div><button onclick="location.reload()" style="background:#f5a623;color:#000;border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px">Reload</button></div>';}
  console.error('App crash:',err);
}
</script>
</body>
</html>
