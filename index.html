// ── Shared UI ────────────────────────────────────────────────
function Card({children,style={}}){return <div style={{background:T.card,borderRadius:20,padding:'16px',border:`1px solid ${T.border}`,...style}}>{children}</div>;}
function Pill({children,active,color,onPress}){const c=color||T.gold;return <button onClick={onPress} style={{padding:'6px 14px',borderRadius:99,border:'none',cursor:'pointer',background:active?c:T.card2,color:active?'#000':T.muted,fontSize:13,fontWeight:600,fontFamily:'-apple-system',transition:'all .18s'}}>{children}</button>;}

function Toggle({on,onToggle,color='var(--accent)'}){return <div onClick={onToggle} style={{width:44,height:26,borderRadius:13,background:on?color:'var(--muted2)',position:'relative',cursor:'pointer',transition:'background .2s',flexShrink:0}}><div style={{position:'absolute',top:3,left:on?20:3,width:20,height:20,borderRadius:'50%',background:'#fff',transition:'left .2s',boxShadow:'0 1px 4px rgba(0,0,0,.3)'}}/></div>;}

function Donut({data,size=110}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return <div style={{width:size,height:size,borderRadius:'50%',background:T.card2,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:T.muted,fontSize:10}}>No data</span></div>;
  const r=44,cx=60,cy=60,sw=14,circ=2*Math.PI*r;let off=0;
  const slices=data.map((d,i)=>{const pct=d.value/total,dash=circ*pct-2,gap=circ-dash;const s=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={sw} strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-off+circ/4} strokeLinecap="butt"/>;off+=circ*pct;return s;});
  return <svg width={size} height={size} viewBox="0 0 120 120"><circle cx={cx} cy={cy} r={r} fill="none" stroke={T.card2} strokeWidth={sw}/>{slices}</svg>;
}
function BarChart({weeks,width=330,height=110}){
  const maxVal=Math.max(...weeks.flatMap(w=>[w.income,w.expense]),1);const bw=24,gap=14,left=6;
  return <svg width={width} height={height} style={{overflow:'visible'}}>{weeks.map((w,i)=>{const x=left+i*(bw*2+gap+10);const ih=(w.income/maxVal)*(height-26),eh=(w.expense/maxVal)*(height-26);return <g key={i}><rect x={x} y={height-26-ih} width={bw} height={ih||2} rx={5} fill="#30d158" opacity={.85}/><rect x={x+bw+4} y={height-26-eh} width={bw} height={eh||2} rx={5} fill="#ff453a" opacity={.85}/><text x={x+bw} y={height-6} textAnchor="middle" fill={T.muted} fontSize={10} fontFamily="-apple-system">{w.label}</text></g>;})}</svg>;
}
function LineChart({points,width=330,height=75}){
  if(points.length<2)return null;
  const vals=points.map(p=>p.y),mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1,pad=8;
  const pts=points.map((p,i)=>({x:pad+i*(width-pad*2)/(points.length-1),y:pad+(1-(p.y-mn)/range)*(height-pad*2)}));
  const d=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const area=`${d} L${pts[pts.length-1].x},${height} L${pts[0].x},${height} Z`;
  return <svg width={width} height={height}><defs><linearGradient id="glg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--accent)" stopOpacity={.3}/><stop offset="100%" stopColor="var(--accent)" stopOpacity={0}/></linearGradient></defs><path d={area} fill="url(#glg)"/><path d={d} fill="none" stroke="var(--accent)" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>{pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={3} fill="var(--accent)"/>)}</svg>;
}

// ── Voice Parser ─────────────────────────────────────────────
function parseVoice(raw){
  const text=raw.toLowerCase();
  const amountMatch=raw.match(/\$?(\d+(?:\.\d{1,2})?)/);
  const amount=amountMatch?parseFloat(amountMatch[1]):null;
  const type=/earn|receiv|got paid|income|salary|deposit|made/.test(text)?'income':'expense';
  const catMap=[
    {id:'food',words:['grocer','food','lunch','dinner','breakfast','restaurant','eat','coffee','pizza','burger','snack','café','cafe','meal']},
    {id:'transport',words:['uber','lyft','taxi','bus','metro','subway','gas','fuel','parking','toll','train','flight','ride']},
    {id:'bills',words:['bill','electric','water','internet','wifi','phone bill','utility','rent','netflix','subscri']},
    {id:'shopping',words:['shop','cloth','amazon','online','store','mall','purchase']},
    {id:'health',words:['doctor','pharmacy','medicine','gym','health','medical','dentist','hospital','drug']},
    {id:'entertainment',words:['movie','concert','game','spotify','fun','show','ticket','club']},
    {id:'education',words:['course','book','school','tuition','class','learn','study','udemy']},
    {id:'salary',words:['salary','paycheck','wage']},
    {id:'freelance',words:['freelance','project','client','invoice']},
    {id:'investment',words:['dividend','stock','crypto','interest','invest']},
  ];
  let category='other';
  for(const c of catMap){if(c.words.some(w=>text.includes(w))){category=c.id;break;}}
  const note=raw.replace(/\$?\d+(?:\.\d{1,2})?\s*(?:dollars?|bucks?|usd)?/gi,'').replace(/\b(spent|paid|bought|received|earned|got|on|for|at|the|a|an|i|my)\b/gi,'').replace(/\s+/g,' ').trim().split(' ').slice(0,3).join(' ');
  return{amount,type,category,note};
}

function ToastContainer({toasts}){
  return <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:9000,display:'flex',flexDirection:'column',gap:8,pointerEvents:'none',width:'calc(100% - 32px)',maxWidth:360}}>
    {toasts.map(t=>(
      <div key={t.id} style={{background:t.type==='error'?'#ff453a':t.type==='warn'?'#f5a623':'#1a1a24',border:`1px solid ${t.type==='error'?'rgba(255,68,58,0.3)':t.type==='warn'?'rgba(245,166,35,0.3)':'rgba(255,255,255,0.12)'}`,borderRadius:14,padding:'12px 16px',display:'flex',alignItems:'center',gap:10,animation:'slideDown .3s ease',boxShadow:'0 8px 32px rgba(0,0,0,.4)'}}>
        <span style={{fontSize:18}}>{t.icon||'🔔'}</span>

          {t.title&&<div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:2}}>{t.title}</div>}

// ── Edit Modal (bottom sheet) ────────────────────────────────
function EditModal({tx,onSave,onClose}){
  const cats=tx.type==='income'?INCOME_CATS:EXPENSE_CATS;
  const [amount,setAmt]=React.useState(String(tx.amount));
  const [cat,setCat]=React.useState(tx.category);
  const [note,setNote]=React.useState(tx.note||'');
  const [date,setDate]=React.useState(tx.date);
  const [type,setType]=React.useState(tx.type);
  const allCats=type==='income'?INCOME_CATS:EXPENSE_CATS;
  const handleSave=()=>{const n=parseFloat(amount);if(!n||n<=0)return;onSave({...tx,type,amount:n,category:cat,note:note.trim(),date});onClose();};
  return (
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:8000,display:'flex',alignItems:'flex-end',animation:'fadeIn .2s'}}>
      <div style={{background:'var(--card)',borderRadius:'24px 24px 0 0',padding:'0 20px 40px',width:'100%',animation:'slideUp .3s ease',maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{width:36,height:4,borderRadius:2,background:'var(--muted2)',margin:'12px auto 20px'}}/>
        <div style={{fontSize:20,fontWeight:700,marginBottom:16,color:'var(--text)'}}>Edit Transaction</div>
        {/* Type toggle */}
        <div style={{display:'flex',background:'var(--card2)',borderRadius:14,padding:4,gap:4,marginBottom:14}}>
          {['expense','income'].map(tp=>(
            <button key={tp} onClick={()=>{setType(tp);setCat('');}} style={{flex:1,padding:'10px',borderRadius:10,border:'none',cursor:'pointer',background:type===tp?(tp==='income'?'#30d158':'#ff453a'):'transparent',color:type===tp?'#fff':T.muted,fontSize:15,fontWeight:700,fontFamily:'-apple-system',transition:'all .18s',textTransform:'capitalize'}}>{tp}</button>
          ))}
        </div>
        {/* Amount */}
        <div style={{background:'var(--card2)',borderRadius:14,padding:'12px 16px',marginBottom:12}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>Amount</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:20,color:'var(--accent)',fontWeight:700}}>$</span>
            <input type="number" value={amount} onChange={e=>setAmt(e.target.value)} style={{background:'none',border:'none',color:'var(--text)',fontSize:24,fontFamily:'-apple-system',flex:1,outline:'none',fontWeight:700}} min="0" step="0.01"/>
          </div>
        </div>
        {/* Category */}
        <div style={{fontSize:11,color:T.muted,marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>Category</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7,marginBottom:14}}>
          {allCats.map(c=>(
            <button key={c.id} onClick={()=>setCat(c.id)} style={{padding:'8px 4px',borderRadius:12,border:`1px solid ${cat===c.id?c.color:T.border}`,background:cat===c.id?c.color+'22':T.card2,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,transition:'all .15s'}}>
              <span style={{fontSize:18}}>{c.icon}</span>
              <span style={{fontSize:10,color:cat===c.id?c.color:T.muted,fontFamily:'-apple-system',fontWeight:600}}>{c.label}</span>
            </button>
          ))}
        </div>
        {/* Note + Date */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
          <div style={{background:'var(--card2)',borderRadius:12,padding:'10px 12px',border:`1px solid ${T.border}`}}>
            <div style={{fontSize:11,color:T.muted,marginBottom:4}}>Note</div>
            <input value={note} onChange={e=>setNote(e.target.value)} style={{background:'none',border:'none',color:'var(--text)',fontSize:14,fontFamily:'-apple-system',width:'100%',outline:'none'}}/>
          </div>
          <div style={{background:'var(--card2)',borderRadius:12,padding:'10px 12px',border:`1px solid ${T.border}`}}>
            <div style={{fontSize:11,color:T.muted,marginBottom:4}}>Date</div>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{background:'none',border:'none',color:'var(--text)',fontSize:13,fontFamily:'-apple-system',width:'100%',outline:'none',colorScheme:'dark'}}/>
          </div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:'14px',borderRadius:16,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:15,fontWeight:700,fontFamily:'-apple-system',cursor:'pointer'}}>Cancel</button>
          <button onClick={handleSave} style={{flex:2,padding:'14px',borderRadius:16,border:'none',background:'var(--accent)',color:'#000',fontSize:15,fontWeight:700,fontFamily:'-apple-system',cursor:'pointer'}}>Save Changes</button>
        </div>
      </div>
    </div>
  );
}

// ── Confirm Dialog ───────────────────────────────────────────
function ConfirmDialog({title,body,danger,onConfirm,onCancel}){
  return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:9500,display:'flex',alignItems:'center',justifyContent:'center',padding:24,animation:'fadeIn .2s'}}>
    <div style={{background:'var(--card)',borderRadius:22,padding:'24px 20px',width:'100%',maxWidth:340}}>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8,color:'var(--text)',textAlign:'center'}}>{title}</div>
      <div style={{fontSize:14,color:'var(--muted)',textAlign:'center',lineHeight:1.5,marginBottom:20}}>{body}</div>
      <div style={{display:'flex',gap:10}}>
        <button onClick={onCancel} style={{flex:1,padding:'12px',borderRadius:14,border:`1px solid ${T.border}`,background:'transparent',color:'var(--muted)',fontSize:14,fontWeight:700,fontFamily:'-apple-system',cursor:'pointer'}}>Cancel</button>
        <button onClick={onConfirm} style={{flex:1,padding:'12px',borderRadius:14,border:'none',background:danger?'var(--red)':'var(--accent)',color:'#fff',fontSize:14,fontWeight:700,fontFamily:'-apple-system',cursor:'pointer'}}>{danger?'Delete':'Confirm'}</button>
      </div>
    </div>

}

// ── Add/Schedule Transaction Modal ───────────────────────────
function AddModal({onSave,onClose,defaultFuture=false}){
  const [type,setType]=React.useState('expense');
  const [amount,setAmt]=React.useState('');
  const [cat,setCat]=React.useState('');
  const [note,setNote]=React.useState('');
  const [date,setDate]=React.useState(today());
  const [isFuture,setFuture]=React.useState(defaultFuture);
  const [notify,setNotify]=React.useState(true);
  const cats=type==='income'?INCOME_CATS:EXPENSE_CATS;
  const numKeys=[['7','8','9'],['4','5','6'],['1','2','3'],['.',  '0','del']];
  const numPad=(v)=>{if(v==='del'){setAmt(a=>a.slice(0,-1));return;}if(v==='.'&&amount.includes('.'))return;if(amount.length>=10)return;setAmt(a=>a===''&&v==='.'?'0.':a+v);};
  const handleSave=()=>{
    const n=parseFloat(amount);if(!n||n<=0||!cat)return;
    const tx={id:Date.now(),type,amount:n,category:cat,note:note.trim(),date,scheduled:isFuture,notifyWhenDue:notify&&isFuture};
    onSave(tx);onClose();
  };
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:8000,display:'flex',alignItems:'flex-end',animation:'fadeIn .2s'}}>
    <div style={{background:'var(--card)',borderRadius:'24px 24px 0 0',width:'100%',animation:'slideUp .3s ease',maxHeight:'95vh',overflowY:'auto'}}>
      <div style={{width:36,height:4,borderRadius:2,background:'var(--muted2)',margin:'12px auto 0'}}/>
      <div style={{padding:'16px 20px 0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:20,fontWeight:700,color:'var(--text)'}}>{isFuture?'Schedule Transaction':'Add Transaction'}</div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setFuture(!isFuture)} style={{padding:'6px 12px',borderRadius:10,border:`1px solid ${isFuture?'var(--accent)':T.border}`,background:isFuture?'var(--accent-10)':'transparent',color:isFuture?'var(--accent)':T.muted,cursor:'pointer',fontFamily:'-apple-system',fontSize:12,fontWeight:600}}>📅 {isFuture?'Scheduled':'Future'}</button>
          <button onClick={onClose} style={{background:'none',border:'none',color:T.muted,fontSize:22,cursor:'pointer',lineHeight:1}}>×</button>
        </div>
      </div>
      {/* Type toggle */}
      <div style={{padding:'12px 20px 0'}}>
        <div style={{display:'flex',background:T.card2,borderRadius:14,padding:4,gap:4}}>
          {['expense','income'].map(tp=>(
            <button key={tp} onClick={()=>{setType(tp);setCat('');}} style={{flex:1,padding:'10px',borderRadius:10,border:'none',cursor:'pointer',background:type===tp?(tp==='income'?'#30d158':'#ff453a'):'transparent',color:type===tp?'#fff':T.muted,fontSize:15,fontWeight:700,fontFamily:'-apple-system',transition:'all .18s',textTransform:'capitalize'}}>{tp}</button>
          ))}
        </div>
      </div>
      {/* Amount display */}
      <div style={{textAlign:'center',padding:'10px 20px 4px'}}>
        <div style={{fontSize:amount.length>8?34:46,fontWeight:800,letterSpacing:-1,color:amount?(type==='income'?'var(--green)':'var(--red)'):'var(--muted2)',minHeight:56,display:'flex',alignItems:'center',justifyContent:'center'}}>
          {amount?`$${parseFloat(amount||0).toLocaleString('en-US',{minimumFractionDigits:amount.includes('.')?Math.min(amount.split('.')[1]?.length||0,2):0})}`:'$0.00'}
        </div>
      </div>
      {/* Numpad */}
      <div style={{padding:'0 20px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
        {numKeys.flat().map(k=>(
          <button key={k} onClick={()=>numPad(k)} style={{height:50,borderRadius:14,border:`1px solid ${T.border}`,background:k==='del'?T.card2:T.card,color:T.text,fontSize:k==='del'?18:22,fontWeight:600,cursor:'pointer',fontFamily:'-apple-system',display:'flex',alignItems:'center',justifyContent:'center'}}>
            {k==='del'?'⌫':k}
          </button>
        ))}
      </div>
      {/* Category */}
      <div style={{padding:'10px 20px 0'}}>
        <div style={{fontSize:12,color:T.muted,marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>Category</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7}}>
          {cats.map(c=>(
            <button key={c.id} onClick={()=>setCat(c.id)} style={{padding:'8px 4px',borderRadius:12,border:`1px solid ${cat===c.id?c.color:T.border}`,background:cat===c.id?c.color+'22':T.card,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,transition:'all .15s'}}>
              <span style={{fontSize:18}}>{c.icon}</span>
              <span style={{fontSize:10,color:cat===c.id?c.color:T.muted,fontFamily:'-apple-system',fontWeight:600}}>{c.label}</span>
            </button>
          ))}
        </div>
      </div>
      {/* Note + Date */}
      <div style={{padding:'10px 20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        <div style={{background:T.card2,borderRadius:12,padding:'10px 12px',border:`1px solid ${T.border}`}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:4}}>Note</div>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Optional" style={{background:'none',border:'none',color:T.text,fontSize:14,fontFamily:'-apple-system',width:'100%',outline:'none'}}/>
        </div>
        <div style={{background:T.card2,borderRadius:12,padding:'10px 12px',border:`1px solid ${T.border}`}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:4}}>{isFuture?'Due Date':'Date'}</div>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{background:'none',border:'none',color:T.text,fontSize:13,fontFamily:'-apple-system',width:'100%',outline:'none',colorScheme:'dark'}}/>
        </div>
      </div>
      {/* Notification option for future */}
      {isFuture&&(
        <div style={{padding:'0 20px 10px'}}>
          <div style={{background:T.card2,borderRadius:14,padding:'12px 16px',border:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div>
              <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>🔔 Notify when due</div>
              <div style={{fontSize:12,color:T.muted,marginTop:2}}>Get reminded on the due date</div>
            </div>
            <Toggle on={notify} onToggle={()=>setNotify(!notify)}/>
          </div>
        </div>
      )}
      <div style={{padding:'4px 20px 40px'}}>
        <button onClick={handleSave} style={{width:'100%',padding:'15px',borderRadius:16,border:'none',cursor:'pointer',background:!amount||!cat?T.card2:'var(--accent)',color:!amount||!cat?T.muted:'#000',fontSize:16,fontWeight:700,fontFamily:'-apple-system',transition:'all .2s'}}>
          {isFuture?'📅 Schedule Transaction':'Save Transaction'}
        </button>
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════════
// HOME SCREEN
// ═══════════════════════════════════════════════════════════
function HomeScreen({transactions,onNav,userName,onAddModal,onScheduleModal,budgetGoal,incomeGoal}){
  const now=new Date();
  const monthTxns=transactions.filter(t=>{const d=new Date(t.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()&&!t.scheduled;});
  const income=monthTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=monthTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance=transactions.filter(t=>!t.scheduled).reduce((s,t)=>t.type==='income'?s+t.amount:s-t.amount,0);
  const recent=[...transactions].filter(t=>!t.scheduled).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const upcoming=[...transactions].filter(t=>t.scheduled&&new Date(t.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,3);
  const hr=now.getHours();
  const greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const name=userName||'Friend';
  const budgetUsed=budgetGoal>0?Math.min(100,Math.round(expense/budgetGoal*100)):0;
  const incomeUsed=incomeGoal>0?Math.min(100,Math.round(income/incomeGoal*100)):0;

  return (
    <div style={{padding:'0 16px var(--screen-pb,100px)',color:T.text,fontFamily:'-apple-system,system-ui'}}>
      <div style={{paddingTop:'var(--screen-pt,72px)',paddingBottom:8}}>
        <div style={{fontSize:14,color:T.muted,marginBottom:2}}>{greet}, {name} 👋</div>
        <div style={{fontSize:28,fontWeight:700,letterSpacing:-0.5}}>Your Finances</div>
      </div>
      {/* Demo banner — shown when using seed data (no real user data yet) */}
      {transactions.length>=40&&(
        <div style={{background:'linear-gradient(90deg,rgba(245,166,35,0.15),rgba(245,166,35,0.05))',border:'1px solid rgba(245,166,35,0.3)',borderRadius:14,padding:'10px 14px',marginTop:10,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:20}}>👋</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>You're viewing demo data</div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>Explore the app, then go to Settings → Reset to start fresh.</div>
          </div>
        </div>
      )}
      {/* Balance Hero */}
      <Card style={{marginTop:12,background:'linear-gradient(135deg,var(--hero-a),var(--hero-b))',border:'none',padding:'22px 20px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-30,right:-30,width:120,height:120,borderRadius:'50%',background:'var(--accent-10)'}}/>
        <div style={{fontSize:13,color:T.muted,marginBottom:6}}>Total Balance</div>
        <div style={{fontSize:38,fontWeight:800,letterSpacing:-1,color:balance>=0?T.text:'var(--red)'}}>{balance<0?'-':''}{fmt(balance)}</div>
        <div style={{fontSize:12,color:T.muted,marginTop:4}}>{monthName(now)}</div>
      </Card>
      {/* Income/Expense */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:10}}>
        <Card style={{padding:'14px 16px'}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>Income</div>
          <div style={{fontSize:20,fontWeight:700,color:'var(--green)'}}>{fmtS(income)}</div>
          {incomeGoal>0&&<div style={{marginTop:6}}><div style={{height:4,borderRadius:2,background:T.card2,overflow:'hidden'}}><div style={{height:'100%',width:`${incomeUsed}%`,background:'var(--green)',borderRadius:2}}/></div><div style={{fontSize:10,color:T.muted,marginTop:3}}>{incomeUsed}% of goal</div></div>}
        </Card>
        <Card style={{padding:'14px 16px'}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>Expenses</div>
          <div style={{fontSize:20,fontWeight:700,color:'var(--red)'}}>{fmtS(expense)}</div>
          {budgetGoal>0&&<div style={{marginTop:6}}><div style={{height:4,borderRadius:2,background:T.card2,overflow:'hidden'}}><div style={{height:'100%',width:`${budgetUsed}%`,background:budgetUsed>80?'var(--red)':'var(--accent)',borderRadius:2}}/></div><div style={{fontSize:10,color:T.muted,marginTop:3}}>{budgetUsed}% of budget</div></div>}
        </Card>
      </div>
      {/* Quick buttons */}
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:10,marginTop:10}}>
        <button onClick={onAddModal} style={{padding:'14px',borderRadius:16,background:'var(--accent)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontFamily:'-apple-system',fontSize:16,fontWeight:700,color:'#000'}}>
          <span style={{fontSize:20}}>+</span> Add Transaction
        </button>
        <button onClick={onScheduleModal} style={{padding:'14px',borderRadius:16,background:T.card,border:`1px solid ${T.border}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,fontFamily:'-apple-system',fontSize:13,fontWeight:600,color:'var(--accent)'}}>📅 Schedule</button>
      </div>
      {/* Upcoming scheduled */}
      {upcoming.length>0&&(
        <div style={{marginTop:20}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:10,display:'flex',alignItems:'center',gap:8}}>📅 Upcoming <span style={{fontSize:12,color:T.muted,fontWeight:400}}>scheduled</span></div>
          <Card style={{padding:'4px 0'}}>
            {upcoming.map((t,i)=>{
              const cats=t.type==='income'?INCOME_CATS:EXPENSE_CATS;
              const cat=cats.find(c=>c.id===t.category)||cats[cats.length-1];
              const daysAway=Math.ceil((new Date(t.date)-new Date())/(1000*86400));
              return <div key={t.id} style={{display:'flex',alignItems:'center',padding:'12px 16px',borderBottom:i<upcoming.length-1?`1px solid ${T.border}`:'none'}}>
                <div style={{width:38,height:38,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:12,flexShrink:0}}>{cat.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600}}>{t.note||cat.label}</div>
                  <div style={{fontSize:11,color:T.muted,marginTop:1}}>in {daysAway} day{daysAway!==1?'s':''} · {dayStr(t.date)}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:14,fontWeight:700,color:t.type==='income'?'var(--green)':'var(--red)'}}>{t.type==='income'?'+':'-'}{fmt(t.amount)}</div>
                  {t.notifyWhenDue&&<div style={{fontSize:10,color:'var(--accent)',marginTop:2}}>🔔 reminder set</div>}
                </div>
              </div>;
            })}
          </Card>
        </div>
      )}
      {/* Recent */}
      {recent.length>0?(
        <div style={{marginTop:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:16,fontWeight:700}}>Recent</div>
            <button onClick={()=>onNav(3)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:13,cursor:'pointer',fontFamily:'-apple-system'}}>See all</button>
          </div>
          <Card style={{padding:'4px 0'}}>
            {recent.map((t,i)=>{const cats=t.type==='income'?INCOME_CATS:EXPENSE_CATS;const cat=cats.find(c=>c.id===t.category)||cats[cats.length-1];return(
              <div key={t.id} style={{display:'flex',alignItems:'center',padding:'12px 16px',borderBottom:i<recent.length-1?`1px solid ${T.border}`:'none'}}>
                <div style={{width:38,height:38,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginRight:12,flexShrink:0}}>{cat.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.note||cat.label}</div>
                  <div style={{fontSize:11,color:T.muted,marginTop:1}}>{dayStr(t.date)}</div>
                </div>
                <div style={{fontSize:15,fontWeight:700,color:t.type==='income'?'var(--green)':'var(--red)',marginLeft:8}}>{t.type==='income'?'+':'-'}{fmt(t.amount)}</div>
              </div>);
            })}
          </Card>
        </div>
      ):(
        <div style={{textAlign:'center',marginTop:48,color:T.muted}}>
          <div style={{fontSize:40,marginBottom:8}}>💰</div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>No transactions yet</div>
          <div style={{fontSize:13}}>Tap Add Transaction to get started</div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// PORTFOLIO SCREEN
// ═══════════════════════════════════════════════════════════
function PortfolioScreen({transactions}){
  const now=new Date();
  const [vm,setVm]=React.useState(now.getMonth());
  const [vy,setVy]=React.useState(now.getFullYear());
  const nav=(d)=>{let m=vm+d,y=vy;if(m<0){m=11;y--;}if(m>11){m=0;y++;}setVm(m);setVy(y);};
  const mTxns=transactions.filter(t=>{const d=new Date(t.date);return d.getMonth()===vm&&d.getFullYear()===vy&&!t.scheduled;});
  const income=mTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=mTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const weeks=['W1','W2','W3','W4'].map((label,wi)=>{const w=mTxns.filter(t=>Math.floor((new Date(t.date).getDate()-1)/7)===wi);return{label,income:w.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),expense:w.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)};});
  const catBreak=EXPENSE_CATS.map(c=>({label:c.label,color:c.color,value:mTxns.filter(t=>t.type==='expense'&&t.category===c.id).reduce((s,t)=>s+t.amount,0)})).filter(c=>c.value>0).sort((a,b)=>b.value-a.value);
  const dim=new Date(vy,vm+1,0).getDate(),fd=new Date(vy,vm,1).getDay();
  const dayData=Array.from({length:dim},(_,i)=>{const day=i+1,dt=mTxns.filter(t=>new Date(t.date).getDate()===day);const inc=dt.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);const exp=dt.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);return{day,inc,exp,net:inc-exp,has:dt.length>0};});
  const sorted=[...mTxns].sort((a,b)=>new Date(a.date)-new Date(b.date));let run=0;const runPts=sorted.map(t=>{run+=t.type==='income'?t.amount:-t.amount;return{y:run};});if(runPts.length>0)runPts.unshift({y:0});
  const ml=new Date(vy,vm,1).toLocaleString('default',{month:'long',year:'numeric'});
  return (
    <div style={{color:T.text,fontFamily:'-apple-system,system-ui',padding:'0 16px var(--screen-pb,100px)'}}>
      <div style={{paddingTop:'var(--screen-pt,72px)',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5}}>Portfolio</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>nav(-1)} style={{background:T.card,border:`1px solid ${T.border}`,color:T.text,width:30,height:30,borderRadius:9,cursor:'pointer',fontSize:14}}>‹</button>
          <div style={{fontSize:12,color:T.muted,minWidth:88,textAlign:'center'}}>{ml}</div>
          <button onClick={()=>nav(1)} style={{background:T.card,border:`1px solid ${T.border}`,color:T.text,width:30,height:30,borderRadius:9,cursor:'pointer',fontSize:14}}>›</button>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
        {[{label:'Income',val:income,color:'var(--green)'},{label:'Expense',val:expense,color:'var(--red)'},{label:'Net',val:income-expense,color:(income-expense)>=0?'var(--green)':'var(--red)'}].map(s=>(
          <Card key={s.label} style={{padding:'10px 12px',textAlign:'center'}}><div style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>{s.label}</div><div style={{fontSize:14,fontWeight:700,color:s.color}}>{fmtS(s.val)}</div></Card>
        ))}
      </div>
      <Card style={{marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10,display:'flex',gap:14,alignItems:'center'}}>Weekly Overview <span style={{color:'var(--green)',fontSize:11}}>● Income</span><span style={{color:'var(--red)',fontSize:11}}>● Expense</span></div>
        <BarChart weeks={weeks} width={330} height={108}/>
      </Card>
      {catBreak.length>0&&(<Card style={{marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Expense Breakdown</div>
        <div style={{display:'flex',gap:12,alignItems:'center'}}><Donut data={catBreak} size={100}/><div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>{catBreak.slice(0,5).map(c=>(<div key={c.label} style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:8,height:8,borderRadius:2,background:c.color,flexShrink:0}}/><div style={{flex:1,fontSize:12,color:T.muted}}>{c.label}</div><div style={{fontSize:12,fontWeight:600,color:'var(--red)'}}>{fmtS(c.value)}</div></div>))}</div></div>
      </Card>)}
      {runPts.length>1&&(<Card style={{marginBottom:12}}><div style={{fontSize:13,fontWeight:600,marginBottom:8}}>Running Balance</div><LineChart points={runPts} width={330} height={70}/></Card>)}
      <Card>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Day-by-Day</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,textAlign:'center'}}>
          {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} style={{fontSize:10,color:T.muted,padding:'2px 0'}}>{d}</div>)}
          {Array.from({length:fd}).map((_,i)=><div key={'e'+i}/>)}
          {dayData.map(d=>(<div key={d.day} style={{aspectRatio:'1',borderRadius:7,fontSize:10,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',background:!d.has?'transparent':d.net>=0?T.g20:T.r20,color:!d.has?T.muted2:d.net>=0?'var(--green)':'var(--red)',border:d.day===now.getDate()&&vm===now.getMonth()&&vy===now.getFullYear()?`1px solid var(--accent)`:'1px solid transparent'}}>{d.day}</div>))}
        </div>
        <div style={{display:'flex',gap:12,marginTop:8,justifyContent:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:T.muted}}><div style={{width:8,height:8,borderRadius:2,background:'rgba(48,209,88,0.3)'}}/>Income</div>
          <div style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:T.muted}}><div style={{width:8,height:8,borderRadius:2,background:'rgba(255,68,58,0.3)'}}/>Expense</div>
        </div>
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// HISTORY SCREEN  — edit + delete + future transactions
// ═══════════════════════════════════════════════════════════
function HistoryScreen({transactions,onDelete,onEdit,onDeleteScheduled,onAddScheduled}){
  const [filter,setFilter]=React.useState('all');
  const [view,setView]=React.useState('history'); // history | scheduled
  const [editTx,setEditTx]=React.useState(null);
  const [deleteTx,setDeleteTx]=React.useState(null);
  const [showAddSched,setShowAddSched]=React.useState(false);

  const past=[...transactions].filter(t=>!t.scheduled);
  const scheduled=[...transactions].filter(t=>t.scheduled).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const filtered=past.filter(t=>filter==='all'||t.type===filter);
  const sorted=[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const groups=[];sorted.forEach(t=>{const last=groups[groups.length-1];if(last&&last.date===t.date)last.items.push(t);else groups.push({date:t.date,items:[t]});});

  return (
    <div style={{color:T.text,fontFamily:'-apple-system,system-ui',padding:'0 16px var(--screen-pb,100px)'}}>
      {editTx&&<EditModal tx={editTx} onSave={onEdit} onClose={()=>setEditTx(null)}/>}
      {deleteTx&&<ConfirmDialog title="Delete Transaction" body={`Delete "${deleteTx.note||deleteTx.category}" for ${fmt(deleteTx.amount)}? This cannot be undone.`} danger onConfirm={()=>{(deleteTx.scheduled?onDeleteScheduled:onDelete)(deleteTx.id);setDeleteTx(null);}} onCancel={()=>setDeleteTx(null)}/>}
      {showAddSched&&<AddModal onSave={onAddScheduled} onClose={()=>setShowAddSched(false)} defaultFuture/>}

      <div style={{paddingTop:'var(--screen-pt,72px)',marginBottom:14}}>
        <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginBottom:12}}>History</div>
        {/* View toggle */}
        <div style={{display:'flex',background:T.card2,borderRadius:14,padding:4,gap:4,marginBottom:12}}>
          <button onClick={()=>setView('history')} style={{flex:1,padding:'9px',borderRadius:10,border:'none',cursor:'pointer',background:view==='history'?T.card:'transparent',color:view==='history'?T.text:T.muted,fontSize:13,fontWeight:600,fontFamily:'-apple-system',transition:'all .18s'}}>📋 Past</button>
          <button onClick={()=>setView('scheduled')} style={{flex:1,padding:'9px',borderRadius:10,border:'none',cursor:'pointer',background:view==='scheduled'?T.card:'transparent',color:view==='scheduled'?T.text:T.muted,fontSize:13,fontWeight:600,fontFamily:'-apple-system',transition:'all .18s'}}>📅 Scheduled {scheduled.length>0&&<span style={{background:'var(--accent)',color:'#000',borderRadius:8,padding:'1px 6px',fontSize:10,marginLeft:4}}>{scheduled.length}</span>}</button>
        </div>

        {view==='history'&&<div style={{display:'flex',gap:8}}>
          {['all','income','expense'].map(f=>(
            <Pill key={f} active={filter===f} onPress={()=>setFilter(f)} color={f==='income'?'#30d158':f==='expense'?'#ff453a':undefined}>{f.charAt(0).toUpperCase()+f.slice(1)}</Pill>
          ))}
        </div>}
      </div>

      {/* SCHEDULED VIEW */}
      {view==='scheduled'&&(
        <div>
          <button onClick={()=>setShowAddSched(true)} style={{width:'100%',padding:'13px',borderRadius:14,border:`1px dashed var(--accent)`,background:'var(--accent-10)',color:'var(--accent)',fontSize:14,fontWeight:700,fontFamily:'-apple-system',cursor:'pointer',marginBottom:14}}>+ Add Scheduled Transaction</button>
          {scheduled.length===0&&<div style={{textAlign:'center',marginTop:40,color:T.muted}}><div style={{fontSize:36,marginBottom:8}}>📅</div><div>No scheduled transactions</div></div>}
          {scheduled.map((t,i)=>{
            const cats=t.type==='income'?INCOME_CATS:EXPENSE_CATS;
            const cat=cats.find(c=>c.id===t.category)||cats[cats.length-1];
            const daysAway=Math.ceil((new Date(t.date)-new Date())/(1000*86400));
            const isPast=daysAway<0;
            return <Card key={t.id} style={{marginBottom:10,padding:'14px 16px',border:`1px solid ${isPast?'rgba(255,68,58,0.3)':daysAway<=3?'rgba(245,166,35,0.3)':T.border}`}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:40,height:40,borderRadius:12,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{cat.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600}}>{t.note||cat.label}</div>
                  <div style={{fontSize:12,color:T.muted,marginTop:2}}>{dayStr(t.date)} · {isPast?'⚠️ Overdue':`in ${daysAway} day${daysAway!==1?'s':''}`}</div>
                  {t.notifyWhenDue&&<div style={{fontSize:11,color:'var(--accent)',marginTop:2}}>🔔 Notify on due date</div>}
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:16,fontWeight:700,color:t.type==='income'?'var(--green)':'var(--red)'}}>{t.type==='income'?'+':'-'}{fmt(t.amount)}</div>
                  <div style={{display:'flex',gap:8,marginTop:6,justifyContent:'flex-end'}}>
                    <button onClick={()=>setEditTx(t)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:12,cursor:'pointer',fontFamily:'-apple-system',padding:0}}>edit</button>
                    <button onClick={()=>setDeleteTx(t)} style={{background:'none',border:'none',color:T.red,fontSize:12,cursor:'pointer',fontFamily:'-apple-system',padding:0}}>delete</button>
                  </div>
                </div>
              </div>
            </Card>;
          })}
        </div>
      )}

      {/* PAST VIEW */}
      {view==='history'&&(
        <div>
          {groups.length===0&&<div style={{textAlign:'center',marginTop:60,color:T.muted}}><div style={{fontSize:36,marginBottom:8}}>📋</div><div>No transactions found</div></div>}
          {groups.map(g=>(
            <div key={g.date} style={{marginBottom:16}}>
              <div style={{fontSize:12,color:T.muted,textTransform:'uppercase',letterSpacing:.5,marginBottom:6}}>{dayStr(g.date)}</div>
              <Card style={{padding:'4px 0'}}>
                {g.items.map((t,i)=>{
                  const cats=t.type==='income'?INCOME_CATS:EXPENSE_CATS;
                  const cat=cats.find(c=>c.id===t.category)||cats[cats.length-1];
                  return (
                    <div key={t.id} style={{display:'flex',alignItems:'center',padding:'11px 14px',borderBottom:i<g.items.length-1?`1px solid ${T.border}`:'none'}}>
                      <div style={{width:36,height:36,borderRadius:11,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,marginRight:10,flexShrink:0}}>{cat.icon}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.note||cat.label}</div>
                        <div style={{fontSize:11,color:T.muted,marginTop:1}}>{cat.label}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:15,fontWeight:700,color:t.type==='income'?'var(--green)':'var(--red)'}}>{t.type==='income'?'+':'-'}{fmt(t.amount)}</div>
                        <div style={{display:'flex',gap:8,marginTop:4,justifyContent:'flex-end'}}>
                          <button onClick={()=>setEditTx(t)} style={{background:'none',border:'none',color:'var(--accent)',fontSize:11,cursor:'pointer',fontFamily:'-apple-system',padding:0}}>edit</button>
                          <button onClick={()=>setDeleteTx(t)} style={{background:'none',border:'none',color:T.muted2,fontSize:11,cursor:'pointer',fontFamily:'-apple-system',padding:0}}>delete</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </Card>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// SETTINGS SCREEN — Full working notifications + reset
// ═══════════════════════════════════════════════════════════
function SettingsScreen({profile,onProfileChange,onThemeChange,currentTheme,transactions,onReset,onToast,budgetGoal,incomeGoal,onBudgetGoal,onIncomeGoal}){
  const [section,setSection]=React.useState('profile');
  const [notifEnabled,setNE]=React.useState(()=>JSON.parse(localStorage.getItem('notif_en')||'{"push":true,"email":false,"sms":false}'));
  const [activeReminders,setAR]=React.useState(()=>JSON.parse(localStorage.getItem('notif_times')||JSON.stringify(['9:00 AM','6:00 PM'])));
  const [emailAddr,setEmailAddr]=React.useState(()=>localStorage.getItem('notif_email')||'');
  const [phoneNum,setPhoneNum]=React.useState(()=>localStorage.getItem('notif_phone')||'');
  const [testSent,setTS]=React.useState('');
  const [showResetConfirm,setShowReset]=React.useState(false);
  const [notifPerm,setNP]=React.useState(()=>'Notification' in window?Notification.permission:'denied');
  const [saving,setSaving]=React.useState(false);

  const saveNE=(v)=>{setNE(v);localStorage.setItem('notif_en',JSON.stringify(v));};
  const toggleTime=(t)=>{const next=activeReminders.includes(t)?activeReminders.filter(r=>r!==t):[...activeReminders,t];setAR(next);localStorage.setItem('notif_times',JSON.stringify(next));};

  const requestPushPermission=async()=>{
    if(!('Notification' in window)){onToast({icon:'❌',title:'Not supported',body:'Push notifications are not supported in this browser.',type:'error'});return;}
    const perm=await Notification.requestPermission();
    setNP(perm);
    if(perm==='granted'){onToast({icon:'🔔',title:'Push enabled',body:'You will receive on-screen notifications.'});saveNE({...notifEnabled,push:true});}
    else{onToast({icon:'❌',title:'Permission denied',body:'Please allow notifications in your browser settings.',type:'error'});}
  };

  const sendTestPush=()=>{
    if(!('Notification' in window)||Notification.permission!=='granted'){onToast({icon:'🔔',title:'Test Notification',body:'This is how your budget reminder will look! Tap to dismiss.',type:'info'});setTS('push');setTimeout(()=>setTS(''),3000);return;}
    new Notification('💰 Budget Reminder (Test)',{body:'This is a test push notification from your Budget App!',icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💰</text></svg>',tag:'budget-test'});
    onToast({icon:'✅',title:'Push sent',body:'Check your notification tray!'});
    setTS('push');setTimeout(()=>setTS(''),3000);
  };

  const sendTestEmail=()=>{
    const addr=emailAddr||profile.email;
    if(!addr){onToast({icon:'❌',title:'No email',body:'Enter your email address in the Profile tab.',type:'error'});return;}
    // Simulate sending via mailto link
    const subject=encodeURIComponent('Budget App - Test Reminder');
    const body=encodeURIComponent(`Hi ${profile.name||'there'},\n\nThis is a test reminder from your Budget App.\n\nYour scheduled reminder times: ${activeReminders.join(', ')}\n\nStay on budget! 💰`);
    window.open(`mailto:${addr}?subject=${subject}&body=${body}`);
    onToast({icon:'📧',title:'Email reminder',body:`Opening mail client for ${addr}`});
    setTS('email');setTimeout(()=>setTS(''),3000);
  };

  const sendTestSMS=()=>{
    const phone=phoneNum||profile.phone;
    if(!phone){onToast({icon:'❌',title:'No phone',body:'Enter your phone number in the Profile tab.',type:'error'});return;}
    const smsBody=encodeURIComponent(`Budget App Reminder: Time to log your transactions! Stay on track 💰`);
    window.open(`sms:${phone}?body=${smsBody}`);
    onToast({icon:'💬',title:'SMS reminder',body:`Opening SMS for ${phone}`});
    setTS('sms');setTimeout(()=>setTS(''),3000);
  };

  const sendTestOnScreen=()=>{
    onToast({icon:'🔔',title:'Budget Reminder',body:`It's time to log your transactions! You've spent ${fmt(transactions.filter(t=>!t.scheduled&&t.type==='expense').reduce((s,t)=>s+t.amount,0))} this month.`});
    setTS('screen');setTimeout(()=>setTS(''),3000);
  };

  const scheduleAllReminders=()=>{
    if(Notification.permission!=='granted'){onToast({icon:'⚠️',title:'Permission needed',body:'Enable push notifications first.',type:'warn'});return;}
    // Schedule next occurrence of each active reminder time
    let count=0;
    activeReminders.forEach(timeStr=>{
      const [time,ampm]=timeStr.split(' ');const [h,m]=time.split(':').map(Number);
      let hour=h;if(ampm==='PM'&&h!==12)hour+=12;if(ampm==='AM'&&h===12)hour=0;
      const now=new Date();const next=new Date(now);next.setHours(hour,m||0,0,0);
      if(next<=now)next.setDate(next.getDate()+1);
      const delay=next-now;
      setTimeout(()=>{
        if(Notification.permission==='granted'){
          new Notification('💰 Budget Reminder',{body:`It's ${timeStr} — time to log your transactions!`,tag:`budget-${timeStr}`,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💰</text></svg>'});
        }
      },delay);
      count++;
    });
    setSaving(true);localStorage.setItem('notif_times',JSON.stringify(activeReminders));
    onToast({icon:'✅',title:'Reminders saved',body:`${count} reminder${count!==1?'s':''} scheduled (${activeReminders.join(', ')})`});
    setTimeout(()=>setSaving(false),2000);
  };

  const exportPDF=()=>{
    const now=new Date();
    const monthTxns=transactions.filter(t=>{const d=new Date(t.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()&&!t.scheduled;});
    const income=monthTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense=monthTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const balance=transactions.filter(t=>!t.scheduled).reduce((s,t)=>t.type==='income'?s+t.amount:s-t.amount,0);
    const sorted=[...transactions].filter(t=>!t.scheduled).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const rows=sorted.slice(0,50).map(t=>`<tr><td>${new Date(t.date).toLocaleDateString()}</td><td>${t.note||t.category}</td><td style="color:${t.type==='income'?'#30d158':'#ff453a'};font-weight:600">${t.type==='income'?'+':'-'}${fmt(t.amount)}</td><td style="text-transform:capitalize">${t.category}</td></tr>`).join('');
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Budget Report</title><style>body{font-family:-apple-system,Helvetica,sans-serif;padding:40px;color:#1c1c1e;background:#fff}h1{font-size:28px;margin-bottom:4px}h2{font-size:16px;color:#888;font-weight:400;margin-bottom:32px}.summary{display:flex;gap:24px;margin-bottom:32px}.box{background:#f5f5fa;border-radius:12px;padding:16px 20px;min-width:120px}.box .label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.box .val{font-size:22px;font-weight:700}table{width:100%;border-collapse:collapse}th{background:#f5f5fa;text-align:left;padding:10px 12px;font-size:13px;color:#888}td{padding:10px 12px;border-bottom:1px solid #eee;font-size:14px}.footer{margin-top:32px;font-size:12px;color:#aaa;text-align:center}</style></head><body><h1>Budget Report</h1><h2>${profile.name||''}${profile.name?' · ':''}${now.toLocaleString('default',{month:'long',year:'numeric'})}</h2><div class="summary"><div class="box"><div class="label">Balance</div><div class="val" style="color:${balance>=0?'#1c1c1e':'#ff453a'}">${balance<0?'-':''}${fmt(Math.abs(balance))}</div></div><div class="box"><div class="label">Income</div><div class="val" style="color:#30d158">${fmt(income)}</div></div><div class="box"><div class="label">Expenses</div><div class="val" style="color:#ff453a">${fmt(expense)}</div></div></div><table><thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Category</th></tr></thead><tbody>${rows}</tbody></table><div class="footer">Generated ${new Date().toLocaleString()} · Budget App</div><script>window.onload=()=>window.print();<\/script></body></html>`;
    const win=window.open('','_blank');if(win){win.document.write(html);win.document.close();}
  };

            <div key={i} style={{background:'var(--card)',borderRadius:20,padding:'18px',border:'1px solid var(--border)',marginBottom:12}}>

            <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>📊 Quick Stats</div>

// ROOT APP
// ═══════════════════════════════════════════════════════════
const TABS_LIST=['Home','Add','Portfolio','History','Settings'];

function App(){
  const [tab,setTab]=React.useState(()=>parseInt(localStorage.getItem('budget_tab')||'0'));
  const [transactions,setTx]=React.useState(()=>{
    try{
      const s=localStorage.getItem('budget_txns');
      if(!s) return SEED; // First visit — load demo data
      const parsed=JSON.parse(s);
      // If reset wiped it to empty array, keep empty (user chose reset)
      return parsed;
    }catch{return SEED;}
  });
  const [profile,setProfile]=React.useState(()=>{try{return JSON.parse(localStorage.getItem('budget_profile')||'{"name":"","email":"","phone":"","goal":""}');}catch{return{name:'',email:'',phone:'',goal:''};} });
  const [theme,setTheme]=React.useState(()=>{try{const t=localStorage.getItem('budget_theme');return t?JSON.parse(t):THEMES[0];}catch{return THEMES[0];}});
  const [budgetGoal,setBudgetGoal]=React.useState(()=>parseFloat(localStorage.getItem('budget_goal')||'3000'));
  const [incomeGoal,setIncomeGoal]=React.useState(()=>parseFloat(localStorage.getItem('income_goal')||'5000'));
  const [notifPerm,setNP]=React.useState('default');
  const [toasts,setToasts]=React.useState([]);
  const [showAddModal,setShowAddModal]=React.useState(false);
  const [showSchedModal,setShowSchedModal]=React.useState(false);

  React.useEffect(()=>{applyTheme(theme);},[theme]);
  React.useEffect(()=>{localStorage.setItem('budget_tab',tab);},[tab]);
  React.useEffect(()=>{localStorage.setItem('budget_txns',JSON.stringify(transactions));},[transactions]);
  React.useEffect(()=>{localStorage.setItem('budget_profile',JSON.stringify(profile));},[profile]);

  // Splash
  React.useEffect(()=>{setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),400);}},900);},[]);
  // SW
  React.useEffect(()=>{'serviceWorker' in navigator&&navigator.serviceWorker.register('./sw.js').catch(()=>{});if('Notification' in window)setNP(Notification.permission);},[]);

  // Toast system
  const addToast=(t)=>{
    const id=Date.now();
    setToasts(p=>[...p,{...t,id}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),4500);
  };

  // Check upcoming scheduled transactions and notify
  React.useEffect(()=>{
    const check=()=>{
      const today2=new Date();today2.setHours(0,0,0,0);
      transactions.filter(t=>t.scheduled&&t.notifyWhenDue).forEach(t=>{
        const due=new Date(t.date);due.setHours(0,0,0,0);
        const diff=Math.ceil((due-today2)/(1000*86400));
        if(diff===0||diff===1){
          const key=`notif_shown_${t.id}`;
          if(!sessionStorage.getItem(key)){
            sessionStorage.setItem(key,'1');
            addToast({icon:'📅',title:diff===0?'Due today!':'Due tomorrow',body:`${t.note||t.category}: ${t.type==='income'?'+':'-'}${fmt(t.amount)}`,type:diff===0?'warn':'info'});
            if(Notification.permission==='granted'){new Notification(`📅 ${diff===0?'Due today':'Due tomorrow'}`,{body:`${t.note||t.category}: ${fmt(t.amount)}`,tag:`sched-${t.id}`});}
          }
        }
      });
    };
    check();
    const interval=setInterval(check,60000);
    return()=>clearInterval(interval);
  },[transactions]);

  const handleThemeChange=(th)=>{setTheme(th);localStorage.setItem('budget_theme',JSON.stringify(th));};

  const addTransaction=(tx)=>{
    if(tx.scheduled){setTx(p=>[tx,...p]);}
    else{setTx(p=>[tx,...p]);}
    addToast({icon:'✅',title:'Transaction added',body:`${tx.type==='income'?'+':'-'}${fmt(tx.amount)} · ${tx.note||tx.category}`});
  };

  const editTransaction=(updated)=>{setTx(p=>p.map(t=>t.id===updated.id?updated:t));addToast({icon:'✏️',title:'Transaction updated',body:`${updated.note||updated.category} updated successfully`});};
  const deleteTransaction=(id)=>{setTx(p=>p.filter(t=>t.id!==id));addToast({icon:'🗑️',title:'Deleted',body:'Transaction removed'});};

  const hardReset=()=>{
    const keys=['budget_txns','budget_profile','budget_theme','budget_tab','notif_en','notif_times','notif_email','notif_phone','budget_goal','income_goal','budget_profile'];
    keys.forEach(k=>localStorage.removeItem(k));
    // Store an empty marker so we know user explicitly reset (don't reload SEED)
    localStorage.setItem('budget_txns', JSON.stringify([]));
    localStorage.setItem('budget_goal', '0');
    localStorage.setItem('income_goal', '0');
    setTx([]);setProfile({name:'',email:'',phone:'',goal:''});setTheme(THEMES[0]);applyTheme(THEMES[0]);setBudgetGoal(0);setIncomeGoal(0);setTab(0);
  };

  // Notification banner
  const [showNotifBanner,setShowNotifBanner]=React.useState(()=>'Notification' in window&&Notification.permission==='default');
  const requestNotifications=async()=>{
    const perm=await Notification.requestPermission();
    setNP(perm);setShowNotifBanner(false);
    if(perm==='granted')addToast({icon:'🔔',title:'Notifications enabled',body:'You will receive reminders as configured.'});
  };

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)',position:'relative',overflow:'hidden'}}>
      <ToastContainer toasts={toasts}/>
      {showAddModal&&<AddModal onSave={addTransaction} onClose={()=>setShowAddModal(false)}/>}
      {showSchedModal&&<AddModal onSave={addTransaction} onClose={()=>setShowSchedModal(false)} defaultFuture/>}

      {/* Notification banner */}
      {showNotifBanner&&(
        <div style={{background:'#1a1a24',borderBottom:'1px solid var(--border)',padding:'10px 16px',display:'flex',alignItems:'center',gap:10,flexShrink:0,zIndex:200}}>
          <span style={{fontSize:22}}>🔔</span>
          <div style={{flex:1,fontSize:12,color:'var(--muted)',lineHeight:1.4}}>Enable on-screen reminders to never miss a transaction</div>
          <button onClick={requestNotifications} style={{padding:'7px 12px',borderRadius:10,background:'var(--accent)',border:'none',color:'#000',fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'-apple-system',whiteSpace:'nowrap'}}>Allow</button>
          <button onClick={()=>setShowNotifBanner(false)} style={{background:'none',border:'none',color:'var(--muted)',fontSize:20,cursor:'pointer',lineHeight:1}}>×</button>
        </div>
      )}

      {/* Screens */}
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',position:'relative'}}>
        {tab===0&&<HomeScreen transactions={transactions} onNav={setTab} userName={profile.name} onAddModal={()=>setShowAddModal(true)} onScheduleModal={()=>setShowSchedModal(true)} budgetGoal={budgetGoal} incomeGoal={incomeGoal}/>}
        {tab===1&&<div style={{color:T.text,fontFamily:'-apple-system,system-ui',padding:'72px 20px 100px'}}>
          <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginBottom:20}}>Add Transaction</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
            <button onClick={()=>{setShowAddModal(true);setTab(0);}} style={{padding:'20px',borderRadius:18,border:`1px solid var(--border)`,background:'var(--card)',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:10,fontFamily:'-apple-system'}}>
              <span style={{fontSize:32}}>+</span>
              <span style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>Add Transaction</span>
              <span style={{fontSize:12,color:'var(--muted)'}}>Record income or expense now</span>
            </button>
            <button onClick={()=>{setShowSchedModal(true);setTab(0);}} style={{padding:'20px',borderRadius:18,border:`1px solid var(--accent)`,background:'var(--accent-10)',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:10,fontFamily:'-apple-system'}}>
              <span style={{fontSize:32}}>📅</span>
              <span style={{fontSize:14,fontWeight:700,color:'var(--accent)'}}>Schedule</span>
              <span style={{fontSize:12,color:'var(--muted)'}}>Plan a future transaction</span>
            </button>
          </div>
          <div style={{background:'var(--card)',borderRadius:16,padding:'16px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Recent quick-add</div>
            {transactions.filter(t=>!t.scheduled).slice(0,3).map(t=>{const cats=t.type==='income'?INCOME_CATS:EXPENSE_CATS;const cat=cats.find(c=>c.id===t.category)||cats[cats.length-1];return(
              <div key={t.id} onClick={()=>{setShowAddModal(true);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
                <div style={{width:34,height:34,borderRadius:10,background:cat.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>{cat.icon}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{t.note||cat.label}</div><div style={{fontSize:11,color:T.muted}}>{dayStr(t.date)}</div></div>
                <div style={{fontSize:14,fontWeight:700,color:t.type==='income'?'var(--green)':'var(--red)'}}>{t.type==='income'?'+':'-'}{fmt(t.amount)}</div>
              </div>
            );})}
          </div>
        </div>}
        {tab===2&&<PortfolioScreen transactions={transactions}/>}
        {tab===3&&<HistoryScreen transactions={transactions} onDelete={deleteTransaction} onEdit={editTransaction} onDeleteScheduled={deleteTransaction} onAddScheduled={addTransaction}/>}
        {tab===4&&<SettingsScreen profile={profile} onProfileChange={setProfile} onThemeChange={handleThemeChange} currentTheme={theme} transactions={transactions} onReset={hardReset} onToast={addToast} budgetGoal={budgetGoal} incomeGoal={incomeGoal} onBudgetGoal={(v)=>{setBudgetGoal(v);localStorage.setItem('budget_goal',String(v));}} onIncomeGoal={(v)=>{setIncomeGoal(v);localStorage.setItem('income_goal',String(v));}}/>}
      </div>

      {/* Tab Bar */}
      <div style={{flexShrink:0,background:theme.isDark?'rgba(10,10,18,0.96)':'rgba(250,250,255,0.96)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderTop:`0.5px solid ${theme.isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.08)'}`,paddingTop:10,paddingBottom:'calc(10px + env(safe-area-inset-bottom))',display:'flex',justifyContent:'space-around',alignItems:'center'}}>
        {TABS_LIST.map((name,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'4px 12px',borderRadius:12,opacity:tab===i?1:.5,transition:'opacity .18s'}}>
            {TabIcon[name](tab===i)}
            <span style={{fontSize:10,fontFamily:'-apple-system',color:tab===i?'var(--accent)':'#666',fontWeight:tab===i?700:400}}>{name}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<style>
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</body>
</html>
